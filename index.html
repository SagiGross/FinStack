<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinStack CFO</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.amcharts.com/lib/5/index.js"></script>
<script src="https://cdn.amcharts.com/lib/5/map.js"></script>
<script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
<script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0B0F1A;--card:#111827;--cardH:#1a2236;--sb:#0d1117;--bd:#1e293b;--bdL:#2a3a52;--tx:#e2e8f0;--txD:#94a3b8;--txM:#64748b;--ac:#3b82f6;--acL:#60a5fa;--acG:rgba(59,130,246,.15);--gn:#10b981;--gnG:rgba(16,185,129,.12);--rd:#ef4444;--rdG:rgba(239,68,68,.12);--am:#f59e0b;--pu:#8b5cf6;--cy:#06b6d4;--pk:#ec4899;--tl:#14b8a6;--f:'Outfit',system-ui,sans-serif;--fm:'JetBrains Mono',monospace}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--bdL);border-radius:3px}
/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:40px;width:380px;text-align:center}
.login-box h1{font-size:28px;font-weight:900;margin-bottom:4px}.login-box h1 span{color:var(--ac)}
.login-box p{color:var(--txM);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;color:var(--tx);font-family:var(--f);font-size:14px;outline:none;margin-bottom:12px;transition:border .2s}
.login-box input:focus{border-color:var(--ac)}
.login-box button{width:100%;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:14px;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.login-box button:hover{background:var(--acL)}
.login-err{color:var(--rd);font-size:12px;margin-top:8px;display:none}
/* App shell */
#appShell{display:none;min-height:100vh}
.app-wrap{display:flex;min-height:100vh}
.sb{width:220px;background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--pu));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.sb-brand h1{font-size:16px;font-weight:800;letter-spacing:-.5px}.sb-brand small{font-size:9px;font-weight:600;color:var(--txM);text-transform:uppercase;letter-spacing:1.5px}
.sb-nav{padding:12px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.sb-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--txD);width:100%;font-family:var(--f);font-size:13px;font-weight:500;transition:all .2s;position:relative}
.sb-btn.act{background:var(--acG);color:var(--acL);font-weight:700}
.sb-btn.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:4px;background:var(--ac)}
.sb-btn:hover:not(.act){background:rgba(255,255,255,.03);color:var(--tx)}
.sb-user{padding:16px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sb-user-name{font-size:12px;font-weight:600}.sb-user-role{font-size:10px;color:var(--txM);text-transform:uppercase}
.sb-logout{background:transparent;border:1px solid var(--bd);border-radius:6px;padding:4px 10px;color:var(--txD);font-size:11px;cursor:pointer;font-family:var(--f)}
.sb-logout:hover{color:var(--rd);border-color:var(--rd)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.hdr{padding:12px 24px;border-bottom:1px solid var(--bd);background:var(--sb);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-kpis{display:flex;gap:28px}.hdr-k{display:flex;align-items:center;gap:8px}
.hdr-k-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--txM)}
.hdr-k-v{font-size:15px;font-weight:800;font-family:var(--fm);letter-spacing:-.5px}
.tog{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;border:1px solid var(--bdL);background:var(--cardH);cursor:pointer;color:var(--tx);font-family:var(--f);font-size:12px;font-weight:600}
.tog-track{width:36px;height:20px;border-radius:10px;position:relative;transition:.25s}.tog-track.on{background:var(--ac)}.tog-track.off{background:var(--txM)}
.tog-thumb{width:16px;height:16px;border-radius:8px;background:#fff;position:absolute;top:2px;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}.tog-track.on .tog-thumb{left:18px}.tog-track.off .tog-thumb{left:2px}
.content{flex:1;overflow:auto;padding:20px}
.page{display:none}.page.act{display:block}
.subtabs{display:flex;gap:2px;margin-bottom:20px;background:var(--cardH);border-radius:12px;padding:4px;border:1px solid var(--bd);width:fit-content}
.stab{padding:9px 22px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--f);background:transparent;color:var(--txD);transition:all .2s}
.stab.act{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}.stab:hover:not(.act){color:var(--tx)}
.stab-content{display:none}.stab-content.act{display:block}
.kg{display:grid;gap:12px;margin-bottom:16px}.kg6{grid-template-columns:repeat(6,1fr)}.kg4{grid-template-columns:repeat(4,1fr)}.kg3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;animation:fsu .5s both}
.kpi-g{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.kpi-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.kpi-i{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.kpi-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txM)}
.kpi-v{font-size:26px;font-weight:800;letter-spacing:-1px;font-family:var(--fm);line-height:1}.kpi-s{font-size:12px;color:var(--txD);margin-top:8px}
.cc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px}
.cc-t{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:700}
.cg{display:grid;gap:14px;margin-bottom:14px}.cg2{grid-template-columns:1fr 1fr}
.tw{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:14px}
.tw-h{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}.tw-h .ct{font-size:11px;color:var(--txM);margin-left:auto}
table{width:100%;border-collapse:collapse}th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txM);border-bottom:1px solid var(--bd)}
td{padding:10px 14px;font-size:12px;border-bottom:1px solid var(--bd)}tr.clickrow{cursor:pointer}tr.clickrow:hover td{background:var(--cardH)}
.pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
.cogs-badge{padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700;background:rgba(245,158,11,.15);color:var(--am)}.mono{font-family:var(--fm)}
/* Stages */
.stage-pills{display:flex;gap:4px;flex-wrap:wrap}.stage-pill{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid var(--bd);color:var(--txM);cursor:pointer;transition:all .15s}
.stage-pill.done{background:var(--gnG);color:var(--gn);border-color:var(--gn)}.stage-pill.current{background:var(--acG);color:var(--acL);border-color:var(--ac)}
.stage-pill.locked{opacity:.5;cursor:not-allowed}.stage-pill.next{border-style:dashed}
/* Notes */
.notes-list{max-height:200px;overflow-y:auto;margin-bottom:12px}.note-item{padding:10px 12px;border-left:3px solid var(--ac);margin-bottom:8px;background:var(--bg);border-radius:0 8px 8px 0}
.note-meta{font-size:10px;color:var(--txM);margin-bottom:4px}.note-text{font-size:13px;color:var(--tx)}
.note-input{display:flex;gap:8px;margin-top:8px}.note-input textarea{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px;color:var(--tx);font-family:var(--f);font-size:13px;resize:vertical;min-height:60px;outline:none}
.note-input textarea:focus{border-color:var(--ac)}
.note-input button{align-self:flex-end}
/* Forms */
.fc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:24px;margin-bottom:16px}.fc h3{font-size:16px;font-weight:800;margin-bottom:16px}
.fg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.fg-grid.c2{grid-template-columns:1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txM)}
.fg input,.fg select{background:var(--cardH);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:var(--f);font-size:13px;outline:none}.fg input:focus,.fg select:focus{border-color:var(--ac)}
.btn-p{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:12px 24px;font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}.btn-p:hover{background:var(--acL)}
.btn-d{background:transparent;color:var(--rd);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--f)}.btn-d:hover{background:var(--rdG)}
.btn-ghost{background:transparent;color:var(--txD);border:1px solid var(--bd);border-radius:10px;padding:10px 20px;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer}.btn-ghost:hover{color:var(--tx)}
/* Modal */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal-card{background:var(--card);border:1px solid var(--bdL);border-radius:18px;width:620px;max-width:94vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:scaleIn .25s}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-head .mtag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--txD);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}.modal-close:hover{background:var(--rdG);color:var(--rd)}
.modal-body{padding:20px 24px}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mf{display:flex;flex-direction:column;gap:5px}.mf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txM)}
.mf input,.mf select{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:var(--f);font-size:14px;outline:none}.mf input:focus,.mf select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acG)}
.mf .hint{font-size:10px;color:var(--txM);margin-top:2px}
.modal-sep{height:1px;background:var(--bd);margin:16px 0}
.modal-foot{padding:16px 24px 20px;border-top:1px solid var(--bd);display:flex;gap:10px;justify-content:flex-end}.modal-foot .btn-p{margin:0}
.kpi-row{display:flex;gap:12px;margin-bottom:16px}.kpi-mini{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;text-align:center}
.kpi-mini .kv{font-size:20px;font-weight:800;font-family:var(--fm);letter-spacing:-.5px}.kpi-mini .kl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txM);margin-top:4px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txM);margin-bottom:8px;margin-top:16px}
.updated-tag{font-size:9px;color:var(--txM);font-style:italic}
.toast{position:fixed;top:20px;right:20px;background:var(--gn);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;animation:fsu .3s;display:none}
.cp{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:24px;margin-bottom:14px;box-shadow:0 0 40px var(--acG)}
.cp-t{font-size:15px;font-weight:800;margin-bottom:18px}.cp-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px}
.sl{display:flex;flex-direction:column;gap:6px}.sl-h{display:flex;justify-content:space-between}.sl-l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txD)}.sl-v{font-size:15px;font-weight:800;font-family:var(--fm)}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--bd);border-radius:4px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);cursor:pointer}
@keyframes fsu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@media(max-width:1200px){.kg6{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.cg2{grid-template-columns:1fr}.kg6,.kg4{grid-template-columns:repeat(2,1fr)}.fg-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:12px">&#9889;</div>
    <h1><span>Fin</span>Stack</h1>
    <p>CFO Command Center</p>
    <input id="loginUser" placeholder="Username" autofocus>
    <input id="loginPass" placeholder="Password" type="password">
    <button id="loginBtn">Sign In</button>
    <div class="login-err" id="loginErr">Invalid username or password</div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
<div class="app-wrap">
  <div class="sb">
    <div class="sb-logo"><div class="sb-icon">&#9889;</div><div class="sb-brand"><h1>FinStack</h1><small>CFO Suite</small></div></div>
    <div class="sb-nav" id="navBtns"></div>
    <div class="sb-user"><div><div class="sb-user-name" id="userName"></div><div class="sb-user-role" id="userRole"></div></div><button class="sb-logout" id="logoutBtn">Logout</button></div>
  </div>
  <div class="main">
    <div class="hdr"><div class="hdr-kpis" id="hdrK"></div><div style="display:flex;gap:10px;align-items:center"><div id="rateBox" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;border:1px solid var(--bdL);background:var(--cardH);font-size:12px"><span style="color:var(--txM)">$/₪</span><span id="rateValue" class="mono" style="font-weight:700;font-size:13px"></span><span id="rateLock" style="font-size:9px;color:var(--txM);margin-left:2px"></span></div><button class="tog" id="togBtn"><div class="tog-track on" id="togT"><div class="tog-thumb"></div></div><span id="togL">Weighted</span></button></div></div>
    <div class="content" id="mainContent"></div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';s.onload=bootApp;document.head.appendChild(s)})();

var W=true,SD=0,SG=0,SS=15000,D=null,SA=null,charts={},TOKEN=null,USER=null,STAGES=[];
var COUNTRIES=["Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahrain","Bangladesh","Belarus","Belgium","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Cape Verde","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark","Djibouti","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Guatemala","Guinea","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Ivory Coast","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kosovo","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Mauritania","Mauritius","Mexico","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saudi Arabia","Senegal","Serbia","Sierra Leone","Singapore","Slovakia","Slovenia","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Togo","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","UAE","Uganda","Ukraine","United Kingdom","United States","Uruguay","Uzbekistan","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];

function makeCountrySelect(inputId,value){
  var el=document.getElementById(inputId);if(!el)return;
  var wrap=document.createElement('div');wrap.style.cssText='position:relative';
  el.parentNode.insertBefore(wrap,el);wrap.appendChild(el);
  el.setAttribute('list',inputId+'_list');el.setAttribute('autocomplete','off');
  el.value=value||'';
  var dl=document.createElement('datalist');dl.id=inputId+'_list';
  COUNTRIES.forEach(function(c){var o=document.createElement('option');o.value=c;dl.appendChild(o)});
  wrap.appendChild(dl);
}
var MO=['01','02','03','04','05','06','07','08','09','10','11','12'];
function fmt(n){if(n==null)return'\u2014';var a=Math.abs(n);if(a>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(a>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(0)}
function fmtP(n){return n==null?'\u2014':n.toFixed(1)+'%'}
function fmtDate(d){if(!d)return'';try{var dt=new Date(d);return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}catch(e){return d}}

// Searchable table: wraps a tw div with a search input
function makeSearchable(tableBodyId){
  var tbody=document.getElementById(tableBodyId);
  if(!tbody)return;
  var tw=tbody.closest('.tw');
  if(!tw||tw.querySelector('.search-box'))return;
  var header=tw.querySelector('.tw-h');
  if(!header)return;
  var box=document.createElement('div');
  box.className='search-box';
  box.style.cssText='padding:0 16px 10px;border-bottom:1px solid var(--bd)';
  box.innerHTML='<input type="text" placeholder="Search..." style="width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:var(--f);font-size:12px;outline:none" data-target="'+tableBodyId+'">';
  header.after(box);
  box.querySelector('input').addEventListener('input',function(){
    var q=this.value.toLowerCase();
    var rows=document.querySelectorAll('#'+tableBodyId+' tr');
    rows.forEach(function(row){
      if(row.classList.contains('sp-detail')||row.classList.contains('sp-detail2'))return;
      var txt=row.textContent.toLowerCase();
      row.style.display=(!q||txt.indexOf(q)!==-1)?'':'none';
    });
  });
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},2500)}
function kpi(ic,lb,vl,sb,co,dl){return'<div class="kpi" style="animation-delay:'+(dl||0)+'ms"><div class="kpi-g" style="background:'+co+'"></div><div class="kpi-h"><div class="kpi-i" style="background:'+co+'18;color:'+co+'">'+ic+'</div><span class="kpi-l">'+lb+'</span></div><div class="kpi-v">'+vl+'</div><div class="kpi-s">'+sb+'</div></div>'}

// ── Auth ──
function bootApp(){
  TOKEN=localStorage.getItem('fst_token');
  USER=JSON.parse(localStorage.getItem('fst_user')||'null');
  if(TOKEN&&USER){showApp()}else{showLogin()}
}
function showLogin(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginErr').style.display='none';
}
function showApp(){
  document.getElementById('loginScreen').style.display='none';document.getElementById('appShell').style.display='block';
  document.getElementById('userName').textContent=USER.name;document.getElementById('userRole').textContent=USER.role;
  if(USER.role==='admin'){/* rate box always visible */}
  buildNav();loadAll().then(renderAll);
}
document.getElementById('loginBtn').addEventListener('click',doLogin);
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
function doLogin(){
  var u=document.getElementById('loginUser').value,p=document.getElementById('loginPass').value;
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
  .then(function(r){if(!r.ok)throw new Error();return r.json()})
  .then(function(d){TOKEN=d.token;USER={role:d.role,name:d.name,id:d.userId,canSeeAll:d.canSeeAll};localStorage.setItem('fst_token',TOKEN);localStorage.setItem('fst_user',JSON.stringify(USER));showApp()})
  .catch(function(){document.getElementById('loginErr').style.display='block'});
}
document.getElementById('logoutBtn').addEventListener('click',function(){localStorage.removeItem('fst_token');localStorage.removeItem('fst_user');TOKEN=null;USER=null;showLogin()});
document.getElementById('togBtn').addEventListener('click',function(){W=!W;document.getElementById('togT').className='tog-track '+(W?'on':'off');document.getElementById('togL').textContent=W?'Weighted':'Full Pipeline';loadAll().then(renderAll)});

// ── Navigation ──
function buildNav(){
  var items=[];
  if(USER.role==='admin'){
    items=[{id:'dashboard',label:'Dashboard',icon:'&#9632;'},{id:'sales',label:'Sales Pipeline',icon:'&#9632;'},{id:'payments',label:'Payments',icon:'&#9632;'},{id:'settings',label:'Detailed Info',icon:'&#9632;'}];
  }else if(USER.role==='sales_manager'){
    items=[{id:'sales',label:'Sales Pipeline',icon:'&#9632;'},{id:'salesdash',label:'Sales Dashboard',icon:'&#9632;'},{id:'team',label:'Team Settings',icon:'&#9632;'}];
  }else{
    items=[{id:'sales',label:'My Pipeline',icon:'&#9632;'},{id:'salesdash',label:'Sales Dashboard',icon:'&#9632;'}];
  }
  var h='';items.forEach(function(it,i){h+='<button class="sb-btn'+(i===0?' act':'')+'" data-t="'+it.id+'">'+it.icon+' <span class="lbl">'+it.label+'</span></button>'});
  document.getElementById('navBtns').innerHTML=h;
  document.getElementById('navBtns').addEventListener('click',function(e){
    var b=e.target.closest('.sb-btn');if(!b)return;
    document.querySelectorAll('.sb-btn').forEach(function(x){x.classList.remove('act')});b.classList.add('act');
    currentPage=b.dataset.t;renderPage();
  });
  currentPage=items[0].id;
}
var currentPage='dashboard';

function loadAll(){
  return Promise.all([
    authFetch('/api/data?weighted='+W+'&delay='+SD+'&ghosts='+SG+'&salary='+SS).then(function(r){return r.json()}).then(function(d){D=d;STAGES=d.stages||[]}),
    authFetch('/api/sales-analytics?weighted='+W).then(function(r){return r.json()}).then(function(d){SA=d})
  ]);
}

// ── Page Router ──
function renderPage(){
  var c=document.getElementById('mainContent');
  if(currentPage==='dashboard')renderAdminDashboard(c);
  else if(currentPage==='sales')renderSalesPipeline(c);
  else if(currentPage==='salesdash')renderSalesDash(c);
  else if(currentPage==='payments')renderPayments(c);
  else if(currentPage==='settings')renderSettings(c);
  else if(currentPage==='team')renderTeamSettings(c);
  setTimeout(function(){Object.values(charts).forEach(function(ch){try{ch.resize()}catch(e){}})},150);
}
function renderAll(){renderHeader();renderPage()}

function renderHeader(){
  var d=D.summary,last=d[d.length-1],tr=d.reduce(function(s,m){return s+m.revenue},0),ab=d.reduce(function(s,m){return s+m.totalExp},0)/12;

  var expMo6=true;
  var curMonth=new Date().getMonth(); // 0-based (0=Jan, 3=Apr)
  function drawExpMo(){
    var startIdx=expMo6?curMonth:0;
    var endIdx=expMo6?Math.min(curMonth+6,12):12;
    var labels=MO.slice(startIdx,endIdx);
    var vals=d.slice(startIdx,endIdx);
    var monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var rangeLabel=monthNames[startIdx]+' - '+monthNames[endIdx-1]+' 2026';
    document.getElementById('expChTitle').textContent=expMo6?'Monthly Expenses ('+rangeLabel+')':'Monthly Expenses (Full Year)';
    document.getElementById('btnExpExpand').textContent=expMo6?'Expand':'Collapse';
    mk('chExpMo',{type:'bar',data:{labels:labels,datasets:[{label:'Total',data:vals.map(function(m){return m.totalExp}),backgroundColor:'#3b82f6cc',borderRadius:5},{label:'COGS',data:vals.map(function(m){return m.cogs}),backgroundColor:'#f59e0b88',borderRadius:5},{label:'OpEx',data:vals.map(function(m){return m.opex}),backgroundColor:'#8b5cf688',borderRadius:5}]}});
  }
  drawExpMo();
  document.getElementById('btnExpExpand').addEventListener('click',function(){expMo6=!expMo6;drawExpMo()});
}

      aLg("#10b981","Signed");aLg("#3b82f6","Pipeline");aLg("#1a2236","No deals");

}

var cfCurrency='USD';
function renderCashFlow(el){
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--txM)">Loading...</div>';
  authFetch('/api/cashflow-report?currency='+cfCurrency).then(function(r){return r.json()}).then(function(data){
    var months=data.months;var rate=data.exchangeRate;
    var sym=cfCurrency==='ILS'?'\u20AA':cfCurrency==='EUR'?'\u20AC':'$';
    var fmtCF=function(n){if(n==null)return'\u2014';var a=Math.abs(n);var s=n<0?'-':'';if(a>=1e6)return s+sym+(a/1e6).toFixed(2)+'M';if(a>=1e3)return s+sym+(a/1e3).toFixed(1)+'K';return s+sym+a.toFixed(0)};

    // KPIs
    var totalRev=months.reduce(function(s,m){return s+m.revenue},0);
    var totalExp=months.reduce(function(s,m){return s+m.totalExpenses},0);
    var endBal=months[months.length-1].closingBalance;
    var netTotal=totalRev-totalExp;

    var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
    h+='<h2 style="margin:0">Cash Flow Report FY2026</h2>';
    h+='<div style="display:flex;gap:6px">';
    h+='<button class="btn-ghost cf-cur'+(cfCurrency==='USD'?' act':'')+'" data-cur="USD" style="padding:6px 14px;font-size:11px;'+(cfCurrency==='USD'?'background:var(--ac);color:#fff':'')+'">$ USD</button>';
    h+='<button class="btn-ghost cf-cur'+(cfCurrency==='ILS'?' act':'')+'" data-cur="ILS" style="padding:6px 14px;font-size:11px;'+(cfCurrency==='ILS'?'background:var(--ac);color:#fff':'')+'">₪ ILS</button>';
    h+='<button class="btn-ghost" id="cfUpload" style="padding:6px 14px;font-size:11px">\u2191 Upload Bank Statement</button>';
    h+='</div></div>';

    h+='<div class="kg kg4" style="margin-bottom:16px">';
    h+=kpi('\u2197','Total Revenue',fmtCF(totalRev),'FY2026','var(--gn)');
    h+=kpi('\u2198','Total Expenses',fmtCF(totalExp),'FY2026','var(--rd)',50);
    h+=kpi('\u2248','Net Cashflow',fmtCF(netTotal),'FY2026',netTotal>=0?'var(--gn)':'var(--rd)',100);
    h+=kpi('\u2587','End Balance',fmtCF(endBal),'Dec 2026',endBal>=0?'var(--ac)':'var(--rd)',150);
    h+='</div>';

    // Chart
    h+='<div class="cc" style="margin-bottom:16px"><div class="cc-t">Monthly Cash Flow</div><div style="height:260px"><canvas id="chCF"></canvas></div></div>';

    // Table
    h+='<div style="overflow-x:auto"><table style="width:100%;min-width:900px"><thead><tr style="font-size:11px">';
    h+='<th>Month</th><th>Opening</th><th style="color:var(--gn)">Revenue</th><th style="color:var(--am)">Labor</th><th style="color:var(--pu)">Vendors</th><th style="color:var(--rd)">Total Exp.</th><th>Net</th><th>Closing</th><th>Status</th><th></th>';
    h+='</tr></thead><tbody id="cfTbl">';

    months.forEach(function(m){
      var rowBg=m.isPast?'':'';
      var statusPill=m.isPast?'<span class="pill" style="background:var(--gn)18;color:var(--gn)">Actual</span>':m.isCurrent?'<span class="pill" style="background:var(--am)18;color:var(--am)">Current</span>':'<span class="pill" style="background:var(--txM)18;color:var(--txM)">Forecast</span>';
      h+='<tr style="'+rowBg+'">';
      h+='<td style="font-weight:700">'+m.monthLabel+'</td>';
      h+='<td class="mono cf-bal-cell" data-month="'+m.month+'" data-field="opening" style="cursor:pointer;'+(m.isManual?'color:var(--cy)':'')+'">'+fmtCF(m.openingBalance)+(m.isManual?' \u270E':'')+'</td>';
      h+='<td class="mono" style="color:var(--gn)">'+fmtCF(m.revenue)+'</td>';
      h+='<td class="mono" style="color:var(--am)">'+fmtCF(m.laborCost)+'</td>';
      h+='<td class="mono" style="color:var(--pu)">'+fmtCF(m.vendorExpenses)+'</td>';
      h+='<td class="mono" style="color:var(--rd);font-weight:700">'+fmtCF(m.totalExpenses)+'</td>';
      h+='<td class="mono" style="font-weight:700;color:'+(m.netCashflow>=0?'var(--gn)':'var(--rd)')+'">'+fmtCF(m.netCashflow)+'</td>';
      h+='<td class="mono cf-bal-cell" data-month="'+m.month+'" data-field="closing" style="cursor:pointer;font-weight:700;'+(m.isManual?'color:var(--cy)':'')+'">'+fmtCF(m.closingBalance)+(m.isManual?' \u270E':'')+'</td>';
      h+='<td>'+statusPill+'</td>';
      h+='<td>'+(m.notes?'<span title="'+m.notes+'" style="cursor:help;color:var(--txM)">\u{1F4DD}</span>':'')+'</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="margin-top:8px;font-size:10px;color:var(--txM)">Click Opening/Closing to edit manually. Rate: $1 = \u20AA'+rate.toFixed(2)+'. <span style="color:var(--cy)">\u270E = Manual override</span></div>';

    el.innerHTML=h;

    // Chart
    mk('chCF',{type:'bar',data:{labels:months.map(function(m){return m.monthLabel}),datasets:[
      {label:'Revenue',data:months.map(function(m){return m.revenue}),backgroundColor:'#10b981aa',borderRadius:4},
      {label:'Expenses',data:months.map(function(m){return-m.totalExpenses}),backgroundColor:'#ef444488',borderRadius:4},
      {label:'Balance',data:months.map(function(m){return m.closingBalance}),type:'line',borderColor:'#3b82f6',borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#111827',pointBorderColor:'#3b82f6',pointBorderWidth:2,tension:.4,order:0}
    ]}});

    // Currency toggle
    document.querySelectorAll('.cf-cur').forEach(function(btn){
      btn.addEventListener('click',function(){cfCurrency=this.dataset.cur;renderCashFlow(el)});
    });

    // Click to edit balance
    document.querySelectorAll('.cf-bal-cell').forEach(function(cell){
      cell.addEventListener('click',function(){
        var month=this.dataset.month;var field=this.dataset.field;
        var currentVal=this.textContent.replace(/[^0-9.\-]/g,'');
        var newVal=prompt((field==='opening'?'Opening':'Closing')+' balance for '+month+' (in USD):',currentVal);
        if(newVal===null)return;
        var num=parseFloat(newVal);if(isNaN(num))return;
        var body={month:month};
        if(field==='opening')body.openingBalance=num;else body.closingBalance=num;
        authFetch('/api/cashflow-report/balance',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
          .then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Balance updated');renderCashFlow(el)}});
      });
    });

    // Upload handler
    document.getElementById('cfUpload').addEventListener('click',function(){
      var inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls,.csv';
      inp.onchange=function(){
        if(!inp.files[0])return;
        var fd=new FormData();fd.append('file',inp.files[0]);
        authFetch('/api/cashflow-report/upload',{method:'POST',body:fd})
          .then(function(r){return r.json()}).then(function(res){
            if(res.ok){
              toast('File parsed: '+res.rows+' rows');
              // Show preview modal
              var ph='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:700px"><div class="modal-head"><h2>Bank Statement Preview</h2><button class="modal-close" id="modalClose">\u2715</button></div><div class="modal-body">';
              ph+='<div style="font-size:12px;color:var(--txM);margin-bottom:12px">'+res.rows+' rows found. Columns: '+res.columns.join(', ')+'</div>';
              ph+='<div style="overflow-x:auto;max-height:300px"><table><thead><tr>';
              if(res.preview[0])res.preview[0].forEach(function(c){ph+='<th style="font-size:10px">'+c+'</th>'});
              ph+='</tr></thead><tbody>';
              res.preview.slice(1).forEach(function(row){ph+='<tr>';row.forEach(function(c){ph+='<td style="font-size:11px">'+c+'</td>'});ph+='</tr>'});
              ph+='</tbody></table></div>';
              ph+='<div style="margin-top:12px;font-size:11px;color:var(--txM)">Review the data above. Manual balance updates can be made by clicking cells in the Cash Flow table.</div>';
              ph+='</div><div class="modal-foot"><button class="btn-ghost" id="mcX">Close</button></div></div></div>';
              document.body.insertAdjacentHTML('beforeend',ph);
              document.getElementById('modalClose').addEventListener('click',closeModal);
              document.getElementById('mcX').addEventListener('click',closeModal);
              document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
            } else {toast('Error: '+(res.error||'Unknown'))}
          });
      };
      inp.click();
    });
  });
}

{lat:54,lng:-2},"US":{lat:40,lng:-100},"UY":{lat:-33,lng:-56},"VE":{lat:7,lng:-66},"VN":{lat:16,lng:106},"YE":{lat:15,lng:44},"ZM":{lat:-15,lng:28},"ZW":{lat:-20,lng:30},"PS":{lat:32,lng:35.3}};

  el.innerHTML='<div id="amMapRoot" style="width:100%;height:560px;border-radius:16px;overflow:hidden;background:linear-gradient(145deg,#080c18 0%,#0f172a 40%,#0c1222 100%)"></div>';

  function doBuild(){
    try{
      if(window._amRoot){try{window._amRoot.dispose()}catch(e){}}

      var root=am5.Root.new("amMapRoot");
      window._amRoot=root;
      root.setThemes([am5themes_Animated.new(root)]);
      root.interfaceColors.set("grid",am5.color("#1e293b"));

      var chart=root.container.children.push(am5map.MapChart.new(root,{
        panX:"rotateX",panY:"translateY",
        projection:am5map.geoNaturalEarth1(),
        homeZoomLevel:1.05,
        homeGeoPoint:{longitude:25,latitude:15},
        wheelY:"zoom"
      }));

      // Background
      chart.chartContainer.set("background",am5.Rectangle.new(root,{fill:am5.color("#00000000")}));

      // --- Polygon Series (countries) ---
      var polygonSeries=chart.series.push(am5map.MapPolygonSeries.new(root,{
        geoJSON:am5geodata_worldLow,
        exclude:["AQ"]
      }));

      // Base styling
      polygonSeries.mapPolygons.template.setAll({
        fill:am5.color("#1a2236"),
        stroke:am5.color("#0d1117"),
        strokeWidth:0.4,
        fillOpacity:0.85,
        interactive:true
      });

      // Hover state
      polygonSeries.mapPolygons.template.states.create("hover",{
        fill:am5.color("#334155"),
        fillOpacity:1,
        stroke:am5.color("#94a3b8"),
        strokeWidth:1.2
      });

      // Dynamic fill for active countries
      polygonSeries.mapPolygons.template.adapters.add("fill",function(fill,target){
        var id=target.dataItem.get("id");
        var nm=Object.keys(nameToIso).find(function(k){return nameToIso[k]===id});
        if(nm&&countryData[nm]){
          var d=countryData[nm];
          if(d.signed>0)return am5.color("#10b981");
          return am5.color("#2563eb");
        }
        return fill;
      });

      polygonSeries.mapPolygons.template.adapters.add("fillOpacity",function(op,target){
        var id=target.dataItem.get("id");
        var nm=Object.keys(nameToIso).find(function(k){return nameToIso[k]===id});
        return(nm&&countryData[nm])?1:0.5;
      });

      // Rich HTML Tooltip (hover only - summary)
      var ttip=am5.Tooltip.new(root,{
        getFillFromSprite:false,getLabelFillFromSprite:false,autoTextColor:false,
        paddingLeft:0,paddingRight:0,paddingTop:0,paddingBottom:0,
        pointerOrientation:"vertical"
      });
      ttip.get("background").setAll({fill:am5.color("#00000000"),strokeWidth:0});
      polygonSeries.mapPolygons.template.set("tooltip",ttip);

      polygonSeries.mapPolygons.template.adapters.add("tooltipHTML",function(html,target){
        var id=target.dataItem.get("id");
        var nm=Object.keys(nameToIso).find(function(k){return nameToIso[k]===id});
        if(!nm||!countryData[nm])return"";
        var d=countryData[nm];var total=d.signed+d.pipeline;
        var barW=total>0?Math.round(d.signed/total*100):0;
        return '<div style="background:rgba(15,23,42,0.95);backdrop-filter:blur(12px);border:1px solid rgba(100,116,139,0.3);border-radius:14px;padding:16px 20px;min-width:220px;font-family:Outfit,sans-serif;box-shadow:0 8px 32px rgba(0,0,0,0.5)">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
          +'<div style="width:8px;height:8px;border-radius:50%;background:'+(d.signed>0?"#10b981":"#3b82f6")+'"></div>'
          +'<div style="font-size:15px;font-weight:800;color:#f1f5f9">'+nm+'</div>'
          +'</div>'
          +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'
          +'<div style="background:rgba(16,185,129,0.1);border-radius:8px;padding:8px 10px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Signed</div><div style="font-size:16px;font-weight:800;color:#10b981">'+fmt(d.signed)+'</div></div>'
          +'<div style="background:rgba(59,130,246,0.1);border-radius:8px;padding:8px 10px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Pipeline</div><div style="font-size:16px;font-weight:800;color:#3b82f6">'+fmt(d.pipeline)+'</div></div>'
          +'</div>'
          +'<div style="background:#1e293b;border-radius:6px;height:4px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:6px"></div></div>'
          +'<div style="font-size:11px;color:#94a3b8;text-align:center">'+d.deals+' deal'+(d.deals>1?"s":"")+' \u2022 Click for details</div>'
          +'</div>';
      });

      // Click handler - opens detail panel with client list
      polygonSeries.mapPolygons.template.events.on("click",function(ev){
        var id=ev.target.dataItem.get("id");
        var nm=Object.keys(nameToIso).find(function(k){return nameToIso[k]===id});
        if(!nm||!countryData[nm])return;
        openCountryPanel(nm,countryData[nm]);
      });

      // --- Pulsating Point Markers ---
      var pointSeries=chart.series.push(am5map.MapPointSeries.new(root,{}));
      var activeList=[];
      Object.keys(countryData).forEach(function(nm){
        var iso=nameToIso[nm];if(!iso||!coords[iso])return;
        var d=countryData[nm];
        activeList.push({name:nm,iso:iso,total:d.signed+d.pipeline,signed:d.signed,deals:d.deals,lat:coords[iso].lat,lng:coords[iso].lng});
      });
      activeList.sort(function(a,b){return b.total-a.total});

      activeList.forEach(function(item,idx){
        var di=pointSeries.pushDataItem({latitude:item.lat,longitude:item.lng});
        var container=am5.Container.new(root,{});
        var baseR=idx<3?9:idx<6?7:5;
        var color=item.signed>0?am5.color("#10b981"):am5.color("#3b82f6");

        // Outer glow
        var glow=container.children.push(am5.Circle.new(root,{radius:baseR+6,fill:color,fillOpacity:0.12}));
        // Main circle
        var circ=container.children.push(am5.Circle.new(root,{
          radius:baseR,fill:color,fillOpacity:0.9,
          stroke:am5.color("#ffffff"),strokeWidth:2,strokeOpacity:0.8,
          cursorOverStyle:"pointer",
          tooltipText:item.name+"\n"+fmt(item.total)
        }));

        // Pulse animation for top 3
        if(idx<3){
          var pulse=container.children.push(am5.Circle.new(root,{radius:baseR,fill:color,fillOpacity:0}));
          pulse.animate({key:"radius",to:baseR+18,duration:2000,loops:Infinity,easing:am5.ease.out(am5.ease.cubic)});
          pulse.animate({key:"fillOpacity",from:0.35,to:0,duration:2000,loops:Infinity,easing:am5.ease.out(am5.ease.cubic)});
        }

        // Hover scale
        circ.events.on("pointerover",function(){circ.animate({key:"scale",to:1.5,duration:200})});
        circ.events.on("pointerout",function(){circ.animate({key:"scale",to:1,duration:200})});

        di.set("bullet",am5.Bullet.new(root,{sprite:container}));
      });

      // --- Zoom Controls ---
      var zc=chart.set("zoomControl",am5map.ZoomControl.new(root,{}));
      zc.plusButton.setAll({fill:am5.color("#1e293b"),stroke:am5.color("#334155")});
      zc.minusButton.setAll({fill:am5.color("#1e293b"),stroke:am5.color("#334155")});

      // --- Legend ---
      var legend=chart.children.push(am5.Container.new(root,{
        layout:root.horizontalLayout,x:20,y:am5.percent(95),centerY:am5.percent(100)
      }));
      function addLeg(color,label){
        var c=legend.children.push(am5.Container.new(root,{layout:root.horizontalLayout,paddingRight:16}));
        c.children.push(am5.Circle.new(root,{radius:5,fill:am5.color(color),dy:1}));
        c.children.push(am5.Label.new(root,{text:label,fill:am5.color("#94a3b8"),fontSize:11,paddingLeft:6}));
      }
      addLeg("#10b981","Signed");addLeg("#3b82f6","Pipeline");addLeg("#1a2236","No deals");

      chart.appear(1000,100);
    }catch(err){
      console.error("Map error:",err);
      document.getElementById("amMapRoot").innerHTML='<div style="padding:40px;text-align:center;color:#ef4444;font-family:var(--f)">Error: '+err.message+'</div>';
    }
  }

  // Load or use cached
  if(typeof am5!=="undefined"&&typeof am5map!=="undefined"&&typeof am5geodata_worldLow!=="undefined"){
    setTimeout(doBuild,50);
  } else {
    document.getElementById("amMapRoot").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-family:var(--f)"><div style="text-align:center"><div style="font-size:28px;margin-bottom:8px">\u{1F30D}</div>Loading map...</div></div>';
    // Scripts are in <head>, just wait for them
    var waits=0;
    var wi=setInterval(function(){
      waits++;
      if(typeof am5!=="undefined"&&typeof am5map!=="undefined"&&typeof am5geodata_worldLow!=="undefined"){
        clearInterval(wi);setTimeout(doBuild,50);
      } else if(waits>50){
        clearInterval(wi);
        document.getElementById("amMapRoot").innerHTML='<div style="padding:40px;text-align:center;color:#ef4444;font-family:var(--f)">Failed to load map libraries</div>';
      }
    },200);
  }
}

function closeModal(){var el=document.getElementById('modalOverlay');if(el)el.remove()}

function openCountryBreakdown(contracts){
  // Group by country
  var byC={};
  contracts.forEach(function(c){
    var co=c.country||'Unknown';
    if(!byC[co]) byC[co]={total:0,weighted:0,signed:0,signedVal:0,pipeline:0,deals:[]};
    byC[co].total+=c.value;
    byC[co].weighted+=c.weighted;
    if(c.stage==='Signed'){byC[co].signed++;byC[co].signedVal+=c.value}
    else{byC[co].pipeline++}
    byC[co].deals.push(c);
  });
  var sorted=Object.keys(byC).sort(function(a,b){return byC[b].total-byC[a].total});

  var h='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:750px">';
  h+='<div class="modal-head"><h2>Revenue by Country</h2>';
  h+='<button class="modal-close" id="modalClose">\u2715</button></div>';
  h+='<div class="modal-body">';

  // Summary chart
  h+='<div style="height:'+Math.max(200,sorted.length*32)+'px;margin-bottom:20px"><canvas id="chCountryFull"></canvas></div>';

  // Detail table
  h+='<table style="width:100%"><thead><tr>';
  h+='<th>Country</th><th>Total Value</th><th>Weighted</th>';
  h+='<th>Signed</th><th>Pipeline</th><th>Deals</th>';
  h+='</tr></thead><tbody>';
  sorted.forEach(function(co){
    var d=byC[co];
    h+='<tr style="cursor:pointer" class="country-row" data-country="'+co+'">';
    h+='<td style="font-weight:700">'+co+'</td>';
    h+='<td class="mono" style="font-weight:700">'+fmt(d.total)+'</td>';
    h+='<td class="mono" style="color:var(--acL)">'+fmt(d.weighted)+'</td>';
    h+='<td><span class="pill" style="background:var(--gnG);color:var(--gn)">'+d.signed+' ('+fmt(d.signedVal)+')</span></td>';
    h+='<td class="mono">'+d.pipeline+'</td>';
    h+='<td class="mono">'+(d.signed+d.pipeline)+'</td>';
    h+='</tr>';
    // Expandable deals list
    h+='<tr class="deal-detail" data-country="'+co+'" style="display:none"><td colspan="6" style="padding:0">';
    h+='<div style="padding:8px 20px 12px;background:var(--bg)">';
    d.deals.forEach(function(deal){
      var stC={'Signed':'var(--gn)','Negotiation':'var(--am)','Demo':'var(--ac)','Email Sent':'var(--cy)'}[deal.stage]||'var(--txM)';
      h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px">';
      h+='<span style="font-weight:600">'+deal.client+'</span>';
      h+='<span><span class="pill" style="background:'+stC+'18;color:'+stC+';margin-right:8px">'+deal.stage+'</span>';
      h+='<span class="mono" style="font-weight:700">'+fmt(deal.value)+'</span></span>';
      h+='</div>';
    });
    h+='</div></td></tr>';
  });
  h+='</tbody></table>';
  h+='</div>';
  h+='<div class="modal-foot"><button class="btn-ghost" id="mcX">Close</button></div>';
  h+='</div></div>';

  document.body.insertAdjacentHTML('beforeend',h);
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('mcX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

  // Toggle deal rows on country click
  document.querySelectorAll('.country-row').forEach(function(row){
    row.addEventListener('click',function(){
      var co=this.dataset.country;
      var detail=document.querySelector('.deal-detail[data-country="'+co+'"]');
      if(detail) detail.style.display=detail.style.display==='none'?'table-row':'none';
    });
  });

  // Full chart
  var cLabels=sorted;
  var cVals=sorted.map(function(co){return byC[co].total});
  var cSigned=sorted.map(function(co){return byC[co].signedVal});
  var cPip=sorted.map(function(co){return byC[co].total-byC[co].signedVal});
  mk('chCountryFull',{type:'bar',data:{labels:cLabels,datasets:[
    {label:'Signed',data:cSigned,backgroundColor:'#10b981',borderRadius:3,stack:'s'},
    {label:'Pipeline',data:cPip,backgroundColor:'#3b82f6',borderRadius:{topLeft:3,topRight:3},stack:'s'}
  ]},options:{indexAxis:'y',scales:{x:{stacked:true,ticks:{callback:function(v){return fmt(v)}}},y:{stacked:true,ticks:{font:{size:11}}}}}});
}

function openContractCard(c){
  var canEdit=USER.role==='admin'||USER.role==='sales_manager'||(c.salespersonId===USER.id);
  var chV=c.chance!=null?(c.chance*100).toFixed(0):'';
  var wv=c.chance!=null?c.value*c.chance:0;
  var ic={Government:'var(--ac)',Enterprise:'var(--pk)',Academy:'var(--gn)'};var col=ic[c.industry]||'var(--txM)';
  var stColors={'Initial Contact':'var(--txM)','Email Sent':'var(--cy)','Demo':'var(--ac)','Negotiation':'var(--am)','Signed':'var(--gn)'};
  var curIdx=STAGES.indexOf(c.stage);

  var h='<div class="modal-bg" id="modalOverlay"><div class="modal-card">';
  h+='<div class="modal-head"><h2>'+c.client;
  h+=' <span class="mtag" style="background:'+col+'18;color:'+col+'">';
  h+=c.industry+'</span>';
  h+=' <span class="mtag" style="background:'+(stColors[c.stage]||'var(--txM)')+'18;color:'+(stColors[c.stage]||'var(--txM)')+'">';
  h+=c.stage+'</span>';
  h+='</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
  h+='<div class="modal-body">';

  // KPIs
  h+='<div class="kpi-row">';
  h+='<div class="kpi-mini"><div class="kv">'+fmt(c.value)+'</div><div class="kl">Value</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--acL)">'+(chV?chV+'%':'\u2014')+'</div><div class="kl">Probability</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--gn)">'+fmt(wv)+'</div><div class="kl">Expected</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--txD)">'+c.dso+'d</div><div class="kl">DSO</div></div>';
  h+='</div>';

  // Stage pipeline
  h+='<div class="section-label">Sales Stage</div>';
  h+='<div class="stage-pills" id="stagePills">';
  STAGES.forEach(function(st,i){
    var cls='stage-pill';
    if(i<curIdx)cls+=' done locked';
    else if(i===curIdx)cls+=' current locked';
    else if(i===curIdx+1&&canEdit&&c.stage!=='Signed')cls+=' next';
    else cls+=' locked';
    h+='<div class="'+cls+'" data-stage="'+st+'">'+st+'</div>';
  });
  h+='</div>';
  if(c.stageUpdatedAt) h+='<div class="updated-tag" style="margin-top:6px">Stage updated: '+fmtDate(c.stageUpdatedAt)+'</div>';

  // Contact Info
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Contact Information</div>';
  if(canEdit){
    h+='<div class="modal-grid">';
    h+='<div class="mf"><label>Contact Name</label><input id="mc-cn" value="'+(c.contactName||'')+'"></div>';
    h+='<div class="mf"><label>Phone</label><input id="mc-cp" value="'+(c.contactPhone||'')+'"></div>';
    h+='<div class="mf"><label>Email</label><input id="mc-ce" type="email" value="'+(c.contactEmail||'')+'"></div>';
    h+='<div class="mf"><label>LinkedIn</label><input id="mc-cl2" value="'+(c.contactLinkedin||'')+'"></div>';
    h+='</div>';
  } else {
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">';
    h+='<div><span style="color:var(--txM)">Name:</span> '+(c.contactName||'\u2014')+'</div>';
    h+='<div><span style="color:var(--txM)">Phone:</span> '+(c.contactPhone||'\u2014')+'</div>';
    h+='<div><span style="color:var(--txM)">Email:</span> '+(c.contactEmail||'\u2014')+'</div>';
    if(c.contactLinkedin) h+='<div><a href="'+(c.contactLinkedin.startsWith('http')?c.contactLinkedin:'https://'+c.contactLinkedin)+'" target="_blank" style="color:var(--ac)">LinkedIn Profile</a></div>';
    h+='</div>';
  }

  // Salesperson
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Salesperson</div>';
  if(canEdit){
    var spOpts='<option value="">-- Unassigned --</option>';
    (D.salespeople||[]).forEach(function(sp){
      spOpts+='<option value="'+sp.id+'"'+(c.salespersonId===sp.id?' selected':'')+'>'+sp.name+'</option>';
    });
    h+='<select id="mc-sp" class="mf" style="background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:var(--f);font-size:14px;width:100%;max-width:300px">'+spOpts+'</select>';
  } else {
    h+='<div style="font-size:14px;font-weight:600">'+(c.salespersonName||'Unassigned')+'</div>';
  }

  // Notes
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Notes & Call Log</div>';
  h+='<div class="notes-list" id="notesList">';
  (c.notes||[]).slice().reverse().forEach(function(n){
    h+='<div class="note-item"><div class="note-meta">'+n.by+' \u2022 '+fmtDate(n.at)+'</div><div class="note-text">'+n.text+'</div></div>';
  });
  if(!(c.notes||[]).length) h+='<div style="color:var(--txM);font-size:12px;padding:8px">No notes yet</div>';
  h+='</div>';
  if(canEdit){
    h+='<div class="note-input"><textarea id="noteText" placeholder="Add a note..."></textarea>';
    h+='<button class="btn-p" id="btnNote" style="padding:10px 16px">Add</button></div>';
  }

  // Deal details (editable for canEdit users)
  if(canEdit){
    h+='<div class="modal-sep"></div>';
    h+='<div class="section-label">Deal Details</div>';
    h+='<div class="modal-grid">';
    h+='<div class="mf"><label>Client</label><input id="mc-cl" value="'+(c.client||'')+'"></div>';
    h+='<div class="mf"><label>Country</label><input id="mc-co" value="'+(c.country||'')+'"></div>';
    h+='<div class="mf"><label>Industry</label><select id="mc-in">';
    h+='<option'+(c.industry==='Government'?' selected':'')+'>Government</option>';
    h+='<option'+(c.industry==='Enterprise'?' selected':'')+'>Enterprise</option>';
    h+='<option'+(c.industry==='Academy'?' selected':'')+'>Academy</option>';
    h+='</select></div>';
    h+='<div class="mf"><label>Value (USD)</label><input id="mc-va" type="number" value="'+c.value+'"></div>';
    h+='<div class="mf"><label>DSO (days)</label><input id="mc-ds" type="number" value="'+c.dso+'"></div>';
    h+='<div class="mf"><label>Probability %</label><input id="mc-ch" type="number" value="'+chV+'" min="0" max="100"></div>';
    h+='</div>';
  }

  // Payment Schedule — simple rows
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Payments</div>';
  var splits=c.paymentSplits||[];
  h+='<div id="splitRows">';
  if(splits.length>0){
    splits.forEach(function(sp,i){
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">';
      h+='<span class="mono" style="font-weight:700;font-size:14px;min-width:90px">'+fmt(sp.amount)+'</span>';
      h+='<span style="color:var(--txD);font-size:13px">'+sp.date+'</span>';
      h+='<span style="color:var(--txM);font-size:11px;margin-left:auto">'+(Math.round(sp.amount/c.value*100))+'%</span>';
      if(canEdit) h+='<button class="btn-d split-del" data-idx="'+i+'" style="padding:2px 8px;font-size:10px">\u2715</button>';
      h+='</div>';
    });
    var splitsTotal=splits.reduce(function(s,sp){return s+(sp.amount||0)},0);
    var match=Math.abs(splitsTotal-c.value)<1;
    h+='<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:12px;font-weight:700">';
    h+='<span>Total</span>';
    h+='<span class="mono" style="color:'+(match?'var(--gn)':'var(--am)')+'">'+fmt(splitsTotal)+' / '+fmt(c.value)+'</span></div>';
  } else {
    h+='<div style="color:var(--txM);font-size:12px;padding:4px 0">Single payment by DSO ('+c.dso+' days)</div>';
  }
  h+='</div>';
  if(canEdit){
    h+='<div id="newSplitRows"></div>';
    h+='<button class="btn-ghost" id="btnAddRow" style="margin-top:8px;padding:6px 14px;font-size:12px">+ Add Payment</button>';
  }

  h+='</div>';

  // Footer
  h+='<div class="modal-foot">';
  if(c.updatedAt) h+='<div style="flex:1;font-size:10px;color:var(--txM)">Updated: '+fmtDate(c.updatedAt)+'</div>';
  if(USER.role==='admin') h+='<button class="btn-d" id="mcDel">Delete</button>';
  h+='<button class="btn-ghost" id="mcX">Close</button>';
  if(canEdit) h+='<button class="btn-p" id="mcSave">Save</button>';
  h+='</div></div></div>';

  document.body.insertAdjacentHTML('beforeend',h);
  makeCountrySelect('mc-co',c.country||'');
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('mcX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

  // Stage advancement
  document.querySelectorAll('#stagePills .next').forEach(function(pill){
    pill.addEventListener('click',function(){
      var newStage=this.dataset.stage;
      if(!confirm('Advance to "'+newStage+'"? This cannot be undone.'))return;
      authFetch('/api/contracts/'+c.id+'/stage',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({stage:newStage})}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Stage: '+newStage);loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}else{toast(res.detail||'Error')}});
    });
  });

  // Add note
  if(canEdit&&document.getElementById('btnNote')){
    document.getElementById('btnNote').addEventListener('click',function(){
      var txt=document.getElementById('noteText').value.trim();if(!txt)return;
      authFetch('/api/contracts/'+c.id+'/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt})}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Note added');loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}});
    });
  }

  // Save (all canEdit users)
  if(canEdit&&document.getElementById('mcSave')){
    document.getElementById('mcSave').addEventListener('click',function(){
      var ch=document.getElementById('mc-ch')?document.getElementById('mc-ch').value:'';
      var body={};
      if(document.getElementById('mc-cl')&&document.getElementById('mc-cl').value) body.client=document.getElementById('mc-cl').value;
      if(document.getElementById('mc-co')) body.country=document.getElementById('mc-co').value;
      if(document.getElementById('mc-in')) body.industry=document.getElementById('mc-in').value;
      var val=document.getElementById('mc-va')?parseFloat(document.getElementById('mc-va').value):NaN;
      if(!isNaN(val)) body.value=val;
      var dso=document.getElementById('mc-ds')?parseInt(document.getElementById('mc-ds').value):NaN;
      if(!isNaN(dso)) body.dso=dso;
      if(ch!==''&&!isNaN(parseFloat(ch))) body.chance=parseFloat(ch)/100;
      if(document.getElementById('mc-sp')) body.salespersonId=document.getElementById('mc-sp').value||null;
      if(document.getElementById('mc-cn')) body.contactName=document.getElementById('mc-cn').value;
      if(document.getElementById('mc-cp')) body.contactPhone=document.getElementById('mc-cp').value;
      if(document.getElementById('mc-ce')) body.contactEmail=document.getElementById('mc-ce').value;
      if(document.getElementById('mc-cl2')) body.contactLinkedin=document.getElementById('mc-cl2').value;
      console.log('Saving contract',c.id,body);
      authFetch('/api/contracts/'+c.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
        .then(function(r){
          console.log('Response status:',r.status);
          if(!r.ok){return r.text().then(function(t){console.error('Error:',t);toast('Error: '+r.status);throw new Error(t)})}
          return r.json();
        })
        .then(function(res){if(res&&res.ok){toast('Saved!');loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}})
        .catch(function(err){console.error('Save failed:',err)});
    });
  }

  // Delete (admin only)
  if(USER.role==='admin'&&document.getElementById('mcDel')){
    document.getElementById('mcDel').addEventListener('click',function(){
      if(!confirm('Delete "'+c.client+'"?'))return;
      authFetch('/api/contracts/'+c.id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Deleted');loadAll().then(renderAll)}});
    });
  }

  // Add payment row button
  var splitCounter=0;
  if(canEdit&&document.getElementById('btnAddRow')){
    document.getElementById('btnAddRow').addEventListener('click',function(){
      splitCounter++;
      var container=document.getElementById('newSplitRows');
      var row=document.createElement('div');
      row.style.cssText='display:flex;gap:8px;align-items:flex-end;padding:8px 0;border-bottom:1px solid var(--bd)';
      row.innerHTML='<div class="mf" style="flex:1"><label>Amount</label><input class="sp-new-amt" type="number" placeholder="'+Math.round(c.value/2)+'"></div>'
        +'<div class="mf" style="flex:1"><label>Date</label><input class="sp-new-date" type="date" value="2026-06-15"></div>'
        +'<button class="btn-p sp-new-save" style="padding:8px 14px;margin:0;font-size:11px">Save</button>'
        +'<button class="btn-d sp-new-cancel" style="padding:6px 10px;font-size:10px">\u2715</button>';
      container.appendChild(row);

      row.querySelector('.sp-new-save').addEventListener('click',function(){
        var amt=parseFloat(row.querySelector('.sp-new-amt').value);
        var dt=row.querySelector('.sp-new-date').value;
        if(!amt||!dt){toast('Fill amount and date');return}
        var currentSplits=c.paymentSplits?c.paymentSplits.slice():[];
        currentSplits.push({amount:amt,date:dt});
        authFetch('/api/contracts/'+c.id+'/splits',{
          method:'PUT',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({splits:currentSplits})
        }).then(function(r){return r.json()}).then(function(res){
          if(res.ok){toast('Payment added');loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}
        });
      });

      row.querySelector('.sp-new-cancel').addEventListener('click',function(){
        row.remove();
      });
    });
  }

  // Delete split buttons
  document.querySelectorAll('.split-del').forEach(function(btn){
    btn.addEventListener('click',function(ev){
      ev.stopPropagation();
      var idx=parseInt(this.dataset.idx);
      var currentSplits=c.paymentSplits?c.paymentSplits.slice():[];
      currentSplits.splice(idx,1);
      authFetch('/api/contracts/'+c.id+'/splits',{
        method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({splits:currentSplits})
      }).then(function(r){return r.json()}).then(function(res){
        if(res.ok){toast('Split removed');loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}
      });
    });
  });
}

      frequency:document.getElementById('mx-fr').value,
      currency:document.getElementById('mx-cur').value
    })}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Updated');loadAll().then(function(){closeModal();var updated=D.expenses.find(function(e){return e.id===x.id});if(updated)openExpenseCard(updated)})}});
  });
}

function openEmployeeCard(e){
  if(USER.role!=='admin')return;
  var pct=e.positionPct||100;
  var bonus=e.bonus||0;
  var cur=e.currency||'ILS';
  var curSym=cur==='ILS'?'\u20AA':'$';
  var labor=e.laborCost;

  var h='<div class="modal-bg" id="modalOverlay"><div class="modal-card">';
  h+='<div class="modal-head"><h2>'+e.name;
  h+=' <span class="mtag" style="background:var(--ac)18;color:var(--ac)">'+e.dept+'</span>';
  if(pct<100) h+=' <span class="mtag" style="background:var(--am)18;color:var(--am)">'+pct+'%</span>';
  h+=' <span class="mtag" style="background:'+(cur==='ILS'?'var(--am)':'var(--gn)')+'18;color:'+(cur==='ILS'?'var(--am)':'var(--gn)')+'">'+cur+'</span>';
  h+='</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
  h+='<div class="modal-body">';
  h+='<div class="kpi-row">';
  h+='<div class="kpi-mini"><div class="kv">'+curSym+Math.round(e.gross).toLocaleString()+'</div><div class="kl">Gross ('+cur+')</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--am)">'+pct+'%</div><div class="kl">Position</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--gn)">'+fmt(labor)+'</div><div class="kl">Labor (USD)</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--pu)">'+fmt(labor*12)+'</div><div class="kl">Annual (USD)</div></div>';
  h+='</div>';
  h+='<div class="mf" style="margin-bottom:12px"><label>Formula</label>';
  h+='<div style="font-size:12px;color:var(--txD);padding:4px 0">(Gross + Bonus) \u00d7 1.35 \u00d7 Position%'+(cur==='ILS'?' \u00f7 Exchange Rate':'')+'</div></div>';
  h+='<div class="modal-grid">';
  h+='<div class="mf"><label>Full Name</label><input id="me-nm" value="'+e.name+'"></div>';
  h+='<div class="mf"><label>Department</label><select id="me-dp">';
  h+='<option'+(e.dept==='R&D'?' selected':'')+'>R&D</option>';
  h+='<option'+(e.dept==='S&M'?' selected':'')+'>S&M</option>';
  h+='<option'+(e.dept==='G&A'?' selected':'')+'>G&A</option>';
  h+='<option'+(e.dept==='Training'?' selected':'')+'>Training</option><option'+(x.dept==='Finance'?' selected':'')+'>Finance</option></select></div>';
  h+='<div class="mf"><label>Currency</label><select id="me-cur">';
  h+='<option value="ILS"'+(cur==='ILS'?' selected':'')+'>\u20AA ILS (Shekel)</option>';
  h+='<option value="USD"'+(cur==='USD'?' selected':'')+'>$ USD (Dollar)</option><option value="EUR"'+(cur==='EUR'?' selected':'')+'>€ EUR (Euro)</option>';
  h+='</select></div>';
  h+='<div class="mf"><label>Gross Salary</label><input id="me-gr" type="number" value="'+e.gross+'"></div>';
  h+='<div class="mf"><label>Position %</label><input id="me-pp" type="number" value="'+pct+'" min="0" max="100"></div>';
  h+='<div class="mf"><label>Bonus / Additions</label><input id="me-bn" type="number" value="'+bonus+'"></div>';
  h+='<div class="mf"><label>Termination Date</label><input id="me-td" type="date" value="'+(e.termDate||'')+'"><div class="hint">Empty = active</div></div>';
  h+='</div></div>';
  h+='<div class="modal-foot"><button class="btn-d" id="meDel">Delete</button>';
  h+='<button class="btn-ghost" id="meX">Cancel</button>';
  h+='<button class="btn-p" id="meSave">Save</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('meX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(ev){if(ev.target===this)closeModal()});
  document.getElementById('meDel').addEventListener('click',function(){
    if(!confirm('Delete "'+e.name+'"?'))return;
    authFetch('/api/employees/'+e.id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Deleted');loadAll().then(renderAll)}});
  });
  document.getElementById('meSave').addEventListener('click',function(){
    authFetch('/api/employees/'+e.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      name:document.getElementById('me-nm').value,
      department:document.getElementById('me-dp').value,
      gross:parseFloat(document.getElementById('me-gr').value),
      positionPct:parseFloat(document.getElementById('me-pp').value),
      bonus:parseFloat(document.getElementById('me-bn').value)||0,
      currency:document.getElementById('me-cur').value,
      termDate:document.getElementById('me-td').value||null
    })}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Updated!');loadAll().then(function(){closeModal();var updated=D.employees.find(function(x){return x.id===e.id});if(updated)openEmployeeCard(updated)})}});
  });
}

// ══════════════════════════════════════════
// TEAM SETTINGS (sales_manager only)
// ══════════════════════════════════════════
function renderTeamSettings(el) {
  var h = '<div class="fc">';
  h += '<h3>Team Visibility Settings</h3>';
  h += '<p style="color:var(--txD);font-size:13px;margin-bottom:20px">';
  h += 'Control which team members can see all deals or only their own assigned deals.</p>';
  h += '<div id="teamList" style="border:1px solid var(--bd);border-radius:12px;overflow:hidden"></div>';
  h += '</div>';
  el.innerHTML = h;

  authFetch('/api/team').then(function(r) {
    return r.json();
  }).then(function(team) {
    var tl = '';
    team.forEach(function(m) {
      if (m.id === USER.id) return;
      var isOn = m.can_see_all;
      tl += '<div style="display:flex;align-items:center;';
      tl += 'justify-content:space-between;padding:14px 20px;';
      tl += 'border-bottom:1px solid var(--bd)">';
      tl += '<div>';
      tl += '<div style="font-weight:700;font-size:14px">';
      tl += m.display_name + '</div>';
      tl += '<div style="font-size:11px;color:var(--txM)">';
      tl += m.role + ' \u2022 @' + m.username + '</div>';
      tl += '</div>';
      tl += '<div style="display:flex;align-items:center;gap:10px">';
      tl += '<span style="font-size:12px;color:';
      tl += isOn ? 'var(--gn)' : 'var(--txM)';
      tl += ';font-weight:600">';
      tl += isOn ? 'Sees All Deals' : 'Own Deals Only';
      tl += '</span>';
      tl += '<button class="vis-tog" data-uid="' + m.id + '" ';
      tl += 'data-cur="' + (isOn ? 'true' : 'false') + '" ';
      tl += 'style="width:44px;height:24px;border-radius:12px;';
      tl += 'border:none;cursor:pointer;position:relative;';
      tl += 'background:' + (isOn ? 'var(--gn)' : 'var(--bd)');
      tl += ';transition:all .25s">';
      tl += '<div style="width:18px;height:18px;border-radius:9px;';
      tl += 'background:#fff;position:absolute;top:3px;';
      tl += 'left:' + (isOn ? '23px' : '3px');
      tl += ';transition:all .25s;box-shadow:0 1px 3px rgba(0,0,0,.3)">';
      tl += '</div></button></div></div>';
    });
    if (!tl) {
      tl = '<div style="padding:20px;text-align:center;color:var(--txM)">';
      tl += 'No team members to manage</div>';
    }
    document.getElementById('teamList').innerHTML = tl;

    document.querySelectorAll('.vis-tog').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var uid = this.dataset.uid;
        var cur = this.dataset.cur === 'true';
        authFetch('/api/users/visibility', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: uid, canSeeAll: !cur })
        }).then(function(r) {
          return r.json();
        }).then(function(res) {
          if (res.ok) {
            toast(cur ? 'Set to Own Deals Only' : 'Set to See All Deals');
            renderTeamSettings(el);
          }
        });
      });
    });
  });
}
</script>
