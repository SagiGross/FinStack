<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinStack CFO</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.amcharts.com/lib/5/index.js"></script>
<script src="https://cdn.amcharts.com/lib/5/map.js"></script>
<script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
<script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0B0F1A;--card:#111827;--cardH:#1a2236;--sb:#0d1117;--bd:#1e293b;--bdL:#2a3a52;--tx:#e2e8f0;--txD:#94a3b8;--txM:#64748b;--ac:#3b82f6;--acL:#60a5fa;--acG:rgba(59,130,246,.15);--gn:#10b981;--gnG:rgba(16,185,129,.12);--rd:#ef4444;--rdG:rgba(239,68,68,.12);--am:#f59e0b;--pu:#8b5cf6;--cy:#06b6d4;--pk:#ec4899;--tl:#14b8a6;--f:'Outfit',system-ui,sans-serif;--fm:'JetBrains Mono',monospace}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--bdL);border-radius:3px}
/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:40px;width:380px;text-align:center}
.login-box h1{font-size:28px;font-weight:900;margin-bottom:4px}.login-box h1 span{color:var(--ac)}
.login-box p{color:var(--txM);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;color:var(--tx);font-family:var(--f);font-size:14px;outline:none;margin-bottom:12px;transition:border .2s}
.login-box input:focus{border-color:var(--ac)}
.login-box button{width:100%;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:14px;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.login-box button:hover{background:var(--acL)}
.login-err{color:var(--rd);font-size:12px;margin-top:8px;display:none}
/* App shell */
#appShell{display:none;min-height:100vh}
.app-wrap{display:flex;min-height:100vh}
.sb{width:220px;background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--pu));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.sb-brand h1{font-size:16px;font-weight:800;letter-spacing:-.5px}.sb-brand small{font-size:9px;font-weight:600;color:var(--txM);text-transform:uppercase;letter-spacing:1.5px}
.sb-nav{padding:12px 8px;flex:1;display:flex;flex-direction:column;gap:2px}
.sb-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--txD);width:100%;font-family:var(--f);font-size:13px;font-weight:500;transition:all .2s;position:relative}
.sb-btn.act{background:var(--acG);color:var(--acL);font-weight:700}
.sb-btn.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:4px;background:var(--ac)}
.sb-btn:hover:not(.act){background:rgba(255,255,255,.03);color:var(--tx)}
.sb-user{padding:16px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sb-user-name{font-size:12px;font-weight:600}.sb-user-role{font-size:10px;color:var(--txM);text-transform:uppercase}
.sb-logout{background:transparent;border:1px solid var(--bd);border-radius:6px;padding:4px 10px;color:var(--txD);font-size:11px;cursor:pointer;font-family:var(--f)}
.sb-logout:hover{color:var(--rd);border-color:var(--rd)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.hdr{padding:12px 24px;border-bottom:1px solid var(--bd);background:var(--sb);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-kpis{display:flex;gap:28px}.hdr-k{display:flex;align-items:center;gap:8px}
.hdr-k-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--txM)}
.hdr-k-v{font-size:15px;font-weight:800;font-family:var(--fm);letter-spacing:-.5px}
.tog{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;border:1px solid var(--bdL);background:var(--cardH);cursor:pointer;color:var(--tx);font-family:var(--f);font-size:12px;font-weight:600}
.tog-track{width:36px;height:20px;border-radius:10px;position:relative;transition:.25s}.tog-track.on{background:var(--ac)}.tog-track.off{background:var(--txM)}
.tog-thumb{width:16px;height:16px;border-radius:8px;background:#fff;position:absolute;top:2px;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}.tog-track.on .tog-thumb{left:18px}.tog-track.off .tog-thumb{left:2px}
.content{flex:1;overflow:auto;padding:20px}
.page{display:none}.page.act{display:block}
.subtabs{display:flex;gap:2px;margin-bottom:20px;background:var(--cardH);border-radius:12px;padding:4px;border:1px solid var(--bd);width:fit-content}
.stab{padding:9px 22px;border-radius:10px;border:none;cursor:grab;font-size:13px;font-weight:600;font-family:var(--f);background:transparent;color:var(--txD);transition:all .2s}
.stab:active{cursor:grabbing}
.nb{cursor:grab}.nb:active{cursor:grabbing}
.stab.act{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}.stab:hover:not(.act){color:var(--tx)}
.stab-content{display:none}.stab-content.act{display:block}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:all;width:16px;height:16px;background:var(--ac);border:2px solid #fff;border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.4)}
input[type=range]::-moz-range-thumb{pointer-events:all;width:14px;height:14px;background:var(--ac);border:2px solid #fff;border-radius:50%;cursor:pointer}
.kg{display:grid;gap:12px;margin-bottom:16px}.kg6{grid-template-columns:repeat(6,1fr)}.kg4{grid-template-columns:repeat(4,1fr)}.kg3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;animation:fsu .5s both}
.kpi-g{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.kpi-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.kpi-i{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.kpi-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txM)}
.kpi-v{font-size:26px;font-weight:800;letter-spacing:-1px;font-family:var(--fm);line-height:1}.kpi-s{font-size:12px;color:var(--txD);margin-top:8px}
.cc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px}
.cc-t{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:700}
.cg{display:grid;gap:14px;margin-bottom:14px}.cg2{grid-template-columns:1fr 1fr}
.tw{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:14px}
.tw-h{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}.tw-h .ct{font-size:11px;color:var(--txM);margin-left:auto}
table{width:100%;border-collapse:collapse}th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txM);border-bottom:1px solid var(--bd)}
td{padding:10px 14px;font-size:12px;border-bottom:1px solid var(--bd)}tr.clickrow{cursor:pointer}tr.clickrow:hover td{background:var(--cardH)}
.pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
.cogs-badge{padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700;background:rgba(245,158,11,.15);color:var(--am)}.mono{font-family:var(--fm)}
/* Stages */
.stage-pills{display:flex;gap:4px;flex-wrap:wrap}.stage-pill{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid var(--bd);color:var(--txM);cursor:pointer;transition:all .15s}
.stage-pill.done{background:var(--gnG);color:var(--gn);border-color:var(--gn)}.stage-pill.current{background:var(--acG);color:var(--acL);border-color:var(--ac)}
.stage-pill.locked{opacity:.5;cursor:not-allowed}.stage-pill.next{border-style:dashed}
/* Notes */
.notes-list{max-height:200px;overflow-y:auto;margin-bottom:12px}.note-item{padding:10px 12px;border-left:3px solid var(--ac);margin-bottom:8px;background:var(--bg);border-radius:0 8px 8px 0}
.note-meta{font-size:10px;color:var(--txM);margin-bottom:4px}.note-text{font-size:13px;color:var(--tx)}
.note-input{display:flex;gap:8px;margin-top:8px}.note-input textarea{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px;color:var(--tx);font-family:var(--f);font-size:13px;resize:vertical;min-height:60px;outline:none}
.note-input textarea:focus{border-color:var(--ac)}
.note-input button{align-self:flex-end}
/* Forms */
.fc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:24px;margin-bottom:16px}.fc h3{font-size:16px;font-weight:800;margin-bottom:16px}
.fg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.fg-grid.c2{grid-template-columns:1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txM)}
.fg input,.fg select{background:var(--cardH);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:var(--f);font-size:13px;outline:none}.fg input:focus,.fg select:focus{border-color:var(--ac)}
.btn-p{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:12px 24px;font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}.btn-p:hover{background:var(--acL)}
.btn-d{background:transparent;color:var(--rd);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--f)}.btn-d:hover{background:var(--rdG)}
.btn-ghost{background:transparent;color:var(--txD);border:1px solid var(--bd);border-radius:10px;padding:10px 20px;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer}.btn-ghost:hover{color:var(--tx)}
/* Modal */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal-card{background:var(--card);border:1px solid var(--bdL);border-radius:18px;width:620px;max-width:94vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:scaleIn .25s}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-head .mtag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--txD);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}.modal-close:hover{background:var(--rdG);color:var(--rd)}
.modal-body{padding:20px 24px}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mf{display:flex;flex-direction:column;gap:5px}.mf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txM)}
.mf input,.mf select{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:var(--f);font-size:14px;outline:none}.mf input:focus,.mf select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acG)}
.mf .hint{font-size:10px;color:var(--txM);margin-top:2px}
.modal-sep{height:1px;background:var(--bd);margin:16px 0}
.modal-foot{padding:16px 24px 20px;border-top:1px solid var(--bd);display:flex;gap:10px;justify-content:flex-end}.modal-foot .btn-p{margin:0}
.kpi-row{display:flex;gap:12px;margin-bottom:16px}.kpi-mini{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;text-align:center}
.kpi-mini .kv{font-size:20px;font-weight:800;font-family:var(--fm);letter-spacing:-.5px}.kpi-mini .kl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txM);margin-top:4px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txM);margin-bottom:8px;margin-top:16px}
.updated-tag{font-size:9px;color:var(--txM);font-style:italic}
.toast{position:fixed;top:20px;right:20px;background:var(--gn);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;animation:fsu .3s;display:none}
.cp{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:24px;margin-bottom:14px;box-shadow:0 0 40px var(--acG)}
.cp-t{font-size:15px;font-weight:800;margin-bottom:18px}.cp-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px}
.sl{display:flex;flex-direction:column;gap:6px}.sl-h{display:flex;justify-content:space-between}.sl-l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txD)}.sl-v{font-size:15px;font-weight:800;font-family:var(--fm)}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--bd);border-radius:4px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);cursor:pointer}
@keyframes fsu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@media(max-width:1200px){.kg6{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.cg2{grid-template-columns:1fr}.kg6,.kg4{grid-template-columns:repeat(2,1fr)}.fg-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:40px;margin-bottom:12px">&#9889;</div>
    <h1><span>Fin</span>Stack</h1>
    <p>CFO Command Center</p>
    <input id="loginUser" placeholder="Username" autofocus>
    <input id="loginPass" placeholder="Password" type="password">
    <button id="loginBtn">Sign In</button>
    <div class="login-err" id="loginErr">Invalid username or password</div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
<div class="app-wrap">
  <div class="sb">
    <div class="sb-logo"><div class="sb-icon">&#9889;</div><div class="sb-brand"><h1>FinStack</h1><small>CFO Suite</small></div></div>
    <div class="sb-nav" id="navBtns"></div>
    <div class="sb-user"><div><div class="sb-user-name" id="userName"></div><div class="sb-user-role" id="userRole"></div></div><button class="sb-logout" id="logoutBtn">Logout</button></div>
  </div>
  <div class="main">
    <div class="hdr"><div class="hdr-kpis" id="hdrK"></div><div style="display:flex;gap:10px;align-items:center"><div id="alertBell" style="position:relative;cursor:pointer;padding:6px 10px"><span style="font-size:18px">🔔</span><span id="alertBadge" style="display:none;position:absolute;top:2px;right:4px;background:var(--rd);color:#fff;font-size:9px;font-weight:800;border-radius:50%;min-width:16px;height:16px;line-height:16px;text-align:center;padding:0 3px"></span><div id="alertDropdown" style="display:none;position:absolute;top:100%;right:0;width:380px;max-height:420px;overflow-y:auto;background:var(--card);border:1px solid var(--bd);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;margin-top:6px"></div></div><select id="dashMode" style="display:none;background:var(--cardH);border:1px solid var(--bdL);border-radius:10px;padding:6px 12px;color:var(--tx);font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer"><option value="management">Management</option><option value="financial">Financial</option></select><div id="rateBox" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;border:1px solid var(--bdL);background:var(--cardH);font-size:12px"><span style="color:var(--txM)">$/₪</span><span id="rateValue" class="mono" style="font-weight:700;font-size:13px"></span><span id="rateLock" style="font-size:9px;color:var(--txM);margin-left:2px"></span></div><button class="tog" id="togBtn"><div class="tog-track on" id="togT"><div class="tog-thumb"></div></div><span id="togL">Weighted</span></button></div></div>
    <div class="content" id="mainContent"></div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';s.onload=bootApp;document.head.appendChild(s)})();

var W=true,SD=0,SG=0,SS=15000,D=null,SA=null,charts={},TOKEN=null,USER=null,STAGES=[];
var COUNTRIES=["Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahrain","Bangladesh","Belarus","Belgium","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Cape Verde","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark","Djibouti","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Guatemala","Guinea","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Ivory Coast","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kosovo","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Mauritania","Mauritius","Mexico","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saudi Arabia","Senegal","Serbia","Sierra Leone","Singapore","Slovakia","Slovenia","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Togo","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","UAE","Uganda","Ukraine","United Kingdom","United States","Uruguay","Uzbekistan","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];

function pmOptions(selected){
  var pms=D.paymentMethods||[];
  var h='<option value="">-- Select --</option>';
  pms.forEach(function(pm){h+='<option value="'+pm.id+'"'+(pm.id===selected?' selected':'')+'>'+pm.name+'</option>'});
  return h;
}

function makeCountrySelect(inputId,value){
  var el=document.getElementById(inputId);if(!el)return;
  var wrap=document.createElement('div');wrap.style.cssText='position:relative';
  el.parentNode.insertBefore(wrap,el);wrap.appendChild(el);
  el.setAttribute('list',inputId+'_list');el.setAttribute('autocomplete','off');
  el.value=value||'';
  var dl=document.createElement('datalist');dl.id=inputId+'_list';
  COUNTRIES.forEach(function(c){var o=document.createElement('option');o.value=c;dl.appendChild(o)});
  wrap.appendChild(dl);
}
var MO=['01','02','03','04','05','06','07','08','09','10','11','12'];
function fmt(n){if(n==null)return'\u2014';var a=Math.abs(n);if(a>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(a>=1e3)return'$'+(n/1e3).toFixed(1)+'K';return'$'+n.toFixed(0)}
function fmtP(n){return n==null?'\u2014':n.toFixed(1)+'%'}
function fmtDate(d){if(!d)return'';try{var dt=new Date(d);return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}catch(e){return d}}

// Searchable table: wraps a tw div with a search input
function makeSearchable(tableBodyId){
  var tbody=document.getElementById(tableBodyId);

var USER_PREFS={};
function loadPrefs(){
  return authFetch('/api/preferences').then(function(r){return r.json()}).then(function(p){USER_PREFS=p||{};return p}).catch(function(){return{}});

function saveTabOrder(key,tabs){
  var order=[];tabs.querySelectorAll('.stab').forEach(function(t){order.push(t.dataset.st)});
  authFetch('/api/preferences',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:key,value:order})}).catch(function(){});
  USER_PREFS[key]=order;
}
function applySavedOrder(key,container){
  var order=USER_PREFS[key];if(!order||!order.length)return;
  var tabs=Array.from(container.querySelectorAll('.stab'));
  var parent=tabs[0].parentNode;
  order.forEach(function(st){
    var tab=tabs.find(function(t){return t.dataset.st===st});
    if(tab)parent.appendChild(tab);
  });
  // Also reorder content divs
  tabs.forEach(function(t){
    var content=document.getElementById('st-'+t.dataset.st);
    if(content)content.parentNode.appendChild(content);
  });
}
function makeDraggableTabs(container,prefKey){
  container.querySelectorAll('.stab').forEach(function(tab){
    tab.setAttribute('draggable','true');
    tab.addEventListener('dragstart',function(e){
      e.dataTransfer.setData('text/plain',this.dataset.st);
      this.style.opacity='0.4';
    });
    tab.addEventListener('dragend',function(){this.style.opacity='1'});
    tab.addEventListener('dragover',function(e){
      e.preventDefault();
      this.style.borderBottom='2px solid var(--ac)';
    });
    tab.addEventListener('dragleave',function(){this.style.borderBottom=''});
    tab.addEventListener('drop',function(e){
      e.preventDefault();
      this.style.borderBottom='';
      var fromSt=e.dataTransfer.getData('text/plain');
      var toSt=this.dataset.st;
      if(fromSt===toSt)return;
      var fromTab=container.querySelector('.stab[data-st="'+fromSt+'"]');
      if(!fromTab)return;
      var tabs2=Array.from(container.querySelectorAll('.stab'));
      var fromIdx=tabs2.indexOf(fromTab);var toIdx=tabs2.indexOf(this);
      if(fromIdx<toIdx)this.parentNode.insertBefore(fromTab,this.nextSibling);
      else this.parentNode.insertBefore(fromTab,this);
      saveTabOrder(prefKey,container);
    });
  });
  applySavedOrder(prefKey,container);
}
function makeDraggableBlocks(container,prefKey){
  // Find all direct children that are draggable blocks
  var blocks=Array.from(container.children).filter(function(el){
    return el.nodeType===1 && el.tagName!=='SCRIPT' && !el.classList.contains('subtabs') && el.offsetHeight>20;
  });
  if(blocks.length<2)return;
  blocks.forEach(function(block,idx){
    block.dataset.blockIdx=idx;
    block.setAttribute('draggable','true');
    block.style.cursor='grab';
    block.addEventListener('dragstart',function(e){
      if(e.target.closest('input,select,button,canvas,textarea,a'))return;
      e.dataTransfer.setData('text/plain',this.dataset.blockIdx);
      this.style.opacity='0.3';
      this.style.border='1px dashed var(--ac)';
    });
    block.addEventListener('dragend',function(){this.style.opacity='1';this.style.border=''});
    block.addEventListener('dragover',function(e){
      e.preventDefault();
      this.style.boxShadow='0 -3px 0 0 var(--ac)';
    });
    block.addEventListener('dragleave',function(){this.style.boxShadow=''});
    block.addEventListener('drop',function(e){
      e.preventDefault();
      this.style.boxShadow='';
      var fromIdx=parseInt(e.dataTransfer.getData('text/plain'));
      var toIdx=parseInt(this.dataset.blockIdx);
      if(fromIdx===toIdx||isNaN(fromIdx)||isNaN(toIdx))return;
      var allB=Array.from(container.children).filter(function(el){return el.dataset.blockIdx!==undefined});
      var fromB=allB.find(function(b){return parseInt(b.dataset.blockIdx)===fromIdx});
      if(!fromB)return;
      if(fromIdx<toIdx)this.parentNode.insertBefore(fromB,this.nextSibling);
      else this.parentNode.insertBefore(fromB,this);
      var order=[];Array.from(container.children).forEach(function(el,i){if(el.dataset.blockIdx!==undefined){el.dataset.blockIdx=i;order.push(i)}});
      authFetch('/api/preferences',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:prefKey,value:order})}).catch(function(){});
    });
  });
  var saved=USER_PREFS[prefKey];
  if(saved&&saved.length>0){
    var allB2=Array.from(container.children).filter(function(el){return el.dataset.blockIdx!==undefined});
    if(saved.length===allB2.length){
      saved.forEach(function(origIdx){
        var bl=allB2.find(function(b){return parseInt(b.dataset.blockIdx)===origIdx});
        if(bl)container.appendChild(bl);
      });
    }
  }
}
// Auto-apply block drag when any stab-content gets populated
var _blockDragObserver=new MutationObserver(function(mutations){
  mutations.forEach(function(m){
    if(m.type==='childList'&&m.target.classList&&m.target.classList.contains('stab-content')&&m.addedNodes.length>0){
      var id=m.target.id;
      if(id){
        m.target._blockDragApplied=false;
        setTimeout(function(){
          if(!m.target._blockDragApplied){
            m.target._blockDragApplied=true;
            makeDraggableBlocks(m.target,'blocks_'+id);
          }
        },300);
      }
    }
  });
});

  });

var sensScenarios=[];
var sensColors=['#ef4444','#f59e0b','#8b5cf6','#06b6d4','#ec4899'];

function renderSensitivity(){
  var el=document.getElementById('st-sens');if(!el)return;
  var h='<h2 style="margin-bottom:16px">Sensitivity Analysis</h2>';

  // Scenario builder
  h+='<div class="cc" style="margin-bottom:14px"><div class="cc-t" style="justify-content:space-between">Scenarios <button class="btn-p" id="sensAdd" style="padding:5px 12px;font-size:11px">+ Add Scenario</button></div>';
  h+='<div id="sensList"></div></div>';

  // Charts
  h+='<div class="cg cg2" style="margin-bottom:14px">';
  h+='<div class="cc"><div class="cc-t">P&L — Revenue & Net Income</div><div style="height:300px"><canvas id="chSensPL"></canvas></div></div>';
  h+='<div class="cc"><div class="cc-t">Cash Flow — Cumulative Cash</div><div style="height:300px"><canvas id="chSensCF"></canvas></div></div>';
  h+='</div>';

  // KPI comparison table
  h+='<div id="sensKpis"></div>';

  el.innerHTML=h;
  renderSensList();
  runSensitivity();

  document.getElementById('sensAdd').addEventListener('click',function(){
    if(sensScenarios.length>=5){toast('Max 5 scenarios');return}
    sensScenarios.push({name:'Scenario '+(sensScenarios.length+1),revenueChangePct:0,expenseChangePct:0,fxChangePct:0,revenueDelayMonths:0,expenseDelayMonths:0});
    renderSensList();
  });
}

function renderSensList(){
  var el=document.getElementById('sensList');if(!el)return;
  var h='';
  sensScenarios.forEach(function(sc,i){
    var col=sensColors[i%sensColors.length];
    h+='<div style="display:flex;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap" data-si="'+i+'">';
    h+='<div style="width:10px;height:10px;border-radius:50%;background:'+col+';flex-shrink:0"></div>';
    h+='<input class="sens-name" data-si="'+i+'" value="'+sc.name+'" style="width:120px;padding:11px 14px;font-size:13px;font-weight:700;background:var(--bg);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:var(--f)">';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;flex:1">';
    h+='<div class="mf" style="margin:0;flex:1;min-width:80px"><label>Revenue %</label><input class="sens-rv" data-si="'+i+'" type="number" value="'+sc.revenueChangePct+'"></div>';
    h+='<div class="mf" style="margin:0;flex:1;min-width:80px"><label>Expense %</label><input class="sens-ex" data-si="'+i+'" type="number" value="'+sc.expenseChangePct+'"></div>';
    h+='<div class="mf" style="margin:0;flex:1;min-width:70px"><label>FX %</label><input class="sens-fx" data-si="'+i+'" type="number" value="'+sc.fxChangePct+'"></div>';
    h+='<div class="mf" style="margin:0;flex:1;min-width:90px"><label>Rev Delay (mo)</label><input class="sens-rd" data-si="'+i+'" type="number" value="'+sc.revenueDelayMonths+'" min="0" max="6"></div>';
    h+='<div class="mf" style="margin:0;flex:1;min-width:90px"><label>Exp Delay (mo)</label><input class="sens-ed" data-si="'+i+'" type="number" value="'+sc.expenseDelayMonths+'" min="0" max="6"></div>';
    h+='</div>';
    h+='<button class="btn-ghost sens-del" data-si="'+i+'" style="padding:3px 8px;font-size:10px;color:var(--rd)">\u2715</button>';
    h+='</div>';
  });
  el.innerHTML=h;

  // Attach events
  el.querySelectorAll('input').forEach(function(inp){
    inp.addEventListener('change',function(){
      var i=parseInt(this.dataset.si);var sc=sensScenarios[i];if(!sc)return;
      if(this.classList.contains('sens-name'))sc.name=this.value;
      if(this.classList.contains('sens-rv'))sc.revenueChangePct=parseFloat(this.value)||0;
      if(this.classList.contains('sens-ex'))sc.expenseChangePct=parseFloat(this.value)||0;
      if(this.classList.contains('sens-fx'))sc.fxChangePct=parseFloat(this.value)||0;
      if(this.classList.contains('sens-rd'))sc.revenueDelayMonths=parseInt(this.value)||0;
      if(this.classList.contains('sens-ed'))sc.expenseDelayMonths=parseInt(this.value)||0;
      runSensitivity();
    });
  });
  el.querySelectorAll('.sens-del').forEach(function(btn){
    btn.addEventListener('click',function(){
      sensScenarios.splice(parseInt(this.dataset.si),1);
      renderSensList();runSensitivity();
    });
  });
}

function runSensitivity(){
  if(sensScenarios.length===0){
    var k=document.getElementById('sensKpis');if(k)k.innerHTML='';
    return;
  }
  authFetch('/api/sensitivity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(sensScenarios)})
    .then(function(r){return r.json()}).then(function(data){
      var base=data.base;var scenarios=data.scenarios;var labels=base.labels;

      // P&L Chart: base revenue + net as solid, scenarios as colored
      var datasets=[
        {label:'Base Revenue',data:base.revenue,borderColor:'#64748b',borderWidth:2,borderDash:[5,5],pointRadius:2,tension:.4},
        {label:'Base Net Income',data:base.netIncome,borderColor:'#10b981',borderWidth:2,borderDash:[5,5],pointRadius:2,tension:.4}
      ];
      scenarios.forEach(function(sc,i){
        var col=sensColors[i%sensColors.length];
        datasets.push({label:sc.name+' Revenue',data:sc.revenue,borderColor:col,borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#111827',pointBorderColor:col,tension:.4});
        datasets.push({label:sc.name+' Net',data:sc.netIncome,borderColor:col,borderWidth:1.5,borderDash:[3,3],pointRadius:0,tension:.4});
      });
      mk('chSensPL',{type:'line',data:{labels:labels,datasets:datasets},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:9}}}}}});

      // Cash Flow Chart: base cumCash + scenarios
      var cfDatasets=[
        {label:'Base Cash',data:base.cumCash,borderColor:'#64748b',borderWidth:2,borderDash:[5,5],pointRadius:2,tension:.4,fill:{target:'origin',above:'rgba(100,116,139,0.05)'}}
      ];
      scenarios.forEach(function(sc,i){
        var col=sensColors[i%sensColors.length];
        cfDatasets.push({label:sc.name,data:sc.cumCash,borderColor:col,borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#111827',pointBorderColor:col,tension:.4,fill:{target:'origin',above:col+'11'}});
      });
      mk('chSensCF',{type:'line',data:{labels:labels,datasets:cfDatasets},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:9}}}}}});

      // KPI comparison table
      var kh='<div class="cc" style="margin-top:14px"><div class="cc-t">Scenario Comparison</div>';
      kh+='<div style="overflow-x:auto"><table style="width:100%"><thead><tr style="font-size:11px">';
      kh+='<th></th><th>Revenue</th><th>\u0394</th><th>Expenses</th><th>\u0394</th><th>Net Income</th><th>\u0394</th><th>End Cash</th><th>\u0394</th>';
      kh+='</tr></thead><tbody>';
      // Base row
      var bt=data.baseTotals;
      kh+='<tr style="font-weight:700"><td style="color:var(--txM)">\u2500\u2500 Baseline</td>';
      kh+='<td class="mono">'+fmt(bt.revenue)+'</td><td></td>';
      kh+='<td class="mono">'+fmt(bt.expenses)+'</td><td></td>';
      kh+='<td class="mono" style="color:'+(bt.netIncome>=0?'var(--gn)':'var(--rd)')+'">'+fmt(bt.netIncome)+'</td><td></td>';
      kh+='<td class="mono">'+fmt(bt.endCash)+'</td><td></td></tr>';
      // Scenario rows
      scenarios.forEach(function(sc,i){
        var col=sensColors[i%sensColors.length];
        var t=sc.totals;
        var dRev=t.revenue-bt.revenue;var dExp=t.expenses-bt.expenses;
        var dNet=t.netIncome-bt.netIncome;var dCash=t.endCash-bt.endCash;
        kh+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+col+';margin-right:6px"></span>'+sc.name+'</td>';
        kh+='<td class="mono">'+fmt(t.revenue)+'</td><td class="mono" style="font-size:10px;color:'+(dRev>=0?'var(--gn)':'var(--rd)')+'">'+fmt(dRev)+'</td>';
        kh+='<td class="mono">'+fmt(t.expenses)+'</td><td class="mono" style="font-size:10px;color:'+(dExp<=0?'var(--gn)':'var(--rd)')+'">'+fmt(dExp)+'</td>';
        kh+='<td class="mono" style="color:'+(t.netIncome>=0?'var(--gn)':'var(--rd)')+'">'+fmt(t.netIncome)+'</td><td class="mono" style="font-size:10px;color:'+(dNet>=0?'var(--gn)':'var(--rd)')+'">'+fmt(dNet)+'</td>';
        kh+='<td class="mono">'+fmt(t.endCash)+'</td><td class="mono" style="font-size:10px;color:'+(dCash>=0?'var(--gn)':'var(--rd)')+'">'+fmt(dCash)+'</td></tr>';
      });
      kh+='</tbody></table></div></div>';
      document.getElementById('sensKpis').innerHTML=kh;
    });
}

function renderFinExpenses(){
  var el=document.getElementById('st-fexp');if(!el)return;
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var xs=D.expenses||[];

  // Split fixed vs variable
  var fixed=xs.filter(function(x){return x.isFixed!==false});
  var variable=xs.filter(function(x){return x.isFixed===false});
  var fixedTotal=fixed.reduce(function(s,x){return s+x.amount*12},0);
  var varTotal=variable.reduce(function(s,x){return s+x.amount*12},0);
  var grandTotal=fixedTotal+varTotal;

  var h='<h2 style="margin-bottom:16px">Expense Analysis — FY2026</h2>';

  // KPIs
  h+='<div class="kg kg4" style="margin-bottom:16px">';
  h+=kpi('\u2587','Total Expenses',finFmt(grandTotal),'Annual','var(--rd)');
  h+=kpi('■','Fixed Expenses',finFmt(fixedTotal),(grandTotal>0?(fixedTotal/grandTotal*100).toFixed(0)+'% of total':''),'var(--ac)',30);
  h+=kpi('↑','Variable Expenses',finFmt(varTotal),(grandTotal>0?(varTotal/grandTotal*100).toFixed(0)+'% of total':''),'var(--am)',60);
  h+=kpi('☷','Monthly Avg',finFmt(grandTotal/12),'per month','var(--cy)',90);
  h+='</div>';

  // Charts row
  h+='<div class="cg" style="grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px">';

  // Chart 1: Fixed vs Variable donut
  h+='<div class="cc"><div class="cc-t">Fixed vs Variable</div><div style="height:260px"><canvas id="chFxV"></canvas></div></div>';

  // Chart 2: Monthly fixed vs variable stacked bar
  h+='<div class="cc"><div class="cc-t">Monthly Breakdown</div><div style="height:260px"><canvas id="chFxM"></canvas></div></div>';

  // Chart 3: By Department
  h+='<div class="cc"><div class="cc-t">By Department</div><div style="height:260px"><canvas id="chFxD"></canvas></div></div>';

  h+='</div>';

  // Detail tables
  h+='<div class="cg cg2" style="gap:14px">';

  // Fixed table
  h+='<div class="tw"><div class="tw-h" style="color:var(--ac)">■ Fixed Expenses <span class="ct">'+fixed.length+'</span></div>';
  h+='<div style="overflow-x:auto;max-height:300px"><table><thead><tr><th>Vendor</th><th>Dept</th><th>Monthly</th><th>Annual</th></tr></thead><tbody>';
  fixed.sort(function(a,b){return b.amount-a.amount}).forEach(function(x){
    h+='<tr><td style="font-weight:600">'+x.vendor+'</td><td><span class="pill" style="background:var(--tl)18;color:var(--tl)">'+x.dept+'</span></td><td class="mono">'+finFmt(x.amount)+'</td><td class="mono" style="color:var(--txD)">'+finFmt(x.amount*12)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';

  // Variable table
  h+='<div class="tw"><div class="tw-h" style="color:var(--am)">↑ Variable Expenses <span class="ct">'+variable.length+'</span></div>';
  h+='<div style="overflow-x:auto;max-height:300px"><table><thead><tr><th>Vendor</th><th>Dept</th><th>Monthly</th><th>Annual</th></tr></thead><tbody>';
  variable.sort(function(a,b){return b.amount-a.amount}).forEach(function(x){
    h+='<tr><td style="font-weight:600">'+x.vendor+'</td><td><span class="pill" style="background:var(--tl)18;color:var(--tl)">'+x.dept+'</span></td><td class="mono">'+finFmt(x.amount)+'</td><td class="mono" style="color:var(--txD)">'+finFmt(x.amount*12)+'</td></tr>';
  });
  if(variable.length===0) h+='<tr><td colspan="4" style="text-align:center;color:var(--txM);padding:16px">No variable expenses</td></tr>';
  h+='</tbody></table></div></div>';

  h+='</div>';
  el.innerHTML=h;

  // Chart 1: Donut
  mk('chFxV',{type:'doughnut',data:{labels:['Fixed','Variable'],datasets:[{data:[fixedTotal,varTotal],backgroundColor:['#3b82f6','#f59e0b'],borderWidth:0}]},options:{cutout:'55%',plugins:{legend:{position:'bottom'}}}});

  // Chart 2: Monthly stacked
  var fixedMonthly=fixed.reduce(function(s,x){return s+x.amount},0);
  var varMonthly=variable.reduce(function(s,x){return s+x.amount},0);
  mk('chFxM',{type:'bar',data:{labels:months,datasets:[
    {label:'Fixed',data:months.map(function(){return fixedMonthly}),backgroundColor:'#3b82f6aa',borderRadius:4,stack:'s'},
    {label:'Variable',data:months.map(function(){return varMonthly}),backgroundColor:'#f59e0baa',borderRadius:4,stack:'s'}
  ]},options:{scales:{y:{stacked:true,ticks:{callback:function(v){return fmt(v)}}}},plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}}}});

  // Chart 3: By Dept with fixed/variable split
  var depts={};xs.forEach(function(x){
    if(!depts[x.dept])depts[x.dept]={fixed:0,variable:0};
    if(x.isFixed!==false)depts[x.dept].fixed+=x.amount*12;
    else depts[x.dept].variable+=x.amount*12;
  });
  var deptNames=Object.keys(depts).sort(function(a,b){return(depts[b].fixed+depts[b].variable)-(depts[a].fixed+depts[a].variable)});
  mk('chFxD',{type:'bar',data:{labels:deptNames,datasets:[
    {label:'Fixed',data:deptNames.map(function(d){return depts[d].fixed}),backgroundColor:'#3b82f6aa',borderRadius:4,stack:'s'},
    {label:'Variable',data:deptNames.map(function(d){return depts[d].variable}),backgroundColor:'#f59e0baa',borderRadius:4,stack:'s'}
  ]},options:{scales:{y:{stacked:true,ticks:{callback:function(v){return fmt(v)}}}},plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}}}});

function renderPnL(){
  var el=document.getElementById('st-pnl');if(!el)return;
  var d=D.summary;var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h='<h2 style="margin-bottom:16px">Profit & Loss Statement — FY2026</h2>';
  h+='<div style="overflow-x:auto"><table style="width:100%;min-width:1000px"><thead><tr style="font-size:11px"><th style="text-align:left;min-width:180px"></th>';
  months.forEach(function(m){h+='<th style="min-width:75px">'+m+'</th>'});
  h+='<th style="min-width:90px;font-weight:800">Total</th></tr></thead><tbody>';

  function row(label,vals,style,isTotal){
    var s=style||'';var cls=isTotal?'font-weight:800;border-top:2px solid var(--bd);':'';
    var total=vals.reduce(function(a,b){return a+b},0);
    h+='<tr style="'+cls+s+'"><td style="font-weight:'+(isTotal?'800':'600')+';padding-left:'+(label.startsWith('  ')?'24px':'0')+'">'+label.trim()+'</td>';
    vals.forEach(function(v){h+='<td class="mono" style="text-align:right;font-size:12px;'+(finConv(v)<0?'color:var(--rd)':'')+'">'+finFmt(v)+'</td>'});
    h+='<td class="mono" style="text-align:right;font-weight:800;font-size:12px;'+(finConv(total)<0?'color:var(--rd)':'')+'">'+finFmt(total)+'</td></tr>';
  }

  h+='<tr><td colspan="14" style="font-size:10px;color:var(--gn);padding:6px 0 2px;font-weight:700">REVENUE</td></tr>';
  // Revenue by category
  var allRevCats={};
  d.forEach(function(m){var cats=m.revCats||{};Object.keys(cats).forEach(function(cat){allRevCats[cat]=true})});
  Object.keys(allRevCats).sort().forEach(function(cat){
    var vals=d.map(function(m){return(m.revCats||{})[cat]||0});
    if(vals.some(function(v){return v>0})) row('  '+cat,vals,'color:var(--gn)');
  });
  var revenue=d.map(function(m){return m.revenue});
  row('Total Revenue',revenue,'color:var(--gn)',true);

  h+='<tr><td colspan="14" style="font-size:10px;color:var(--txM);padding:6px 0 2px;font-weight:700">COST OF GOODS SOLD</td></tr>';
  var cogsRD=d.map(function(m){return m.lab['R&D']||0});
  var cogsVd=d.map(function(m){return m.vd['R&D']||0});
  var totalCogs=d.map(function(m){return m.cogs});
  row('  R&D Labor',cogsRD);
  row('  R&D Vendors',cogsVd);
  row('Total COGS',totalCogs,'',true);

  var gp=d.map(function(m){return m.grossProfit});
  var gm=d.map(function(m){return m.grossMargin});
  row('Gross Profit',gp,'color:var(--gn);font-weight:700',true);
  h+='<tr><td style="font-size:10px;color:var(--txM)">Gross Margin %</td>';
  gm.forEach(function(v){h+='<td class="mono" style="text-align:right;font-size:10px;color:var(--txM)">'+v.toFixed(1)+'%</td>'});
  var totalGM=revenue.reduce(function(a,b){return a+b},0)>0?((gp.reduce(function(a,b){return a+b},0)/revenue.reduce(function(a,b){return a+b},0))*100).toFixed(1):'0';
  h+='<td class="mono" style="text-align:right;font-size:10px;color:var(--txM)">'+totalGM+'%</td></tr>';

  h+='<tr><td colspan="14" style="font-size:10px;color:var(--txM);padding:10px 0 2px;font-weight:700">OPERATING EXPENSES</td></tr>';
  // Labor by department
  var depts=['S&M','G&A','Training'];
  depts.forEach(function(dept){
    var labor=d.map(function(m){return m.lab[dept]||0});
    if(labor.some(function(v){return v>0})) row('  '+dept+' Labor',labor);
  });
  // Vendor expenses by service category (from vdCats)
  var allCats={};
  d.forEach(function(m){
    var cats=m.vdCats||{};
    Object.keys(cats).forEach(function(cat){allCats[cat]=true});
  });
  // Filter out COGS categories (they're in COGS section) - show only OpEx categories
  Object.keys(allCats).sort().forEach(function(cat){
    var vals=d.map(function(m){return(m.vdCats||{})[cat]||0});
    if(vals.some(function(v){return v>0})) row('  '+cat,vals);
  });
  var opex=d.map(function(m){return m.opex});
  row('Total OpEx',opex,'',true);

  var ebit=d.map(function(m){return m.grossProfit-m.opex});
  row('Operating Income (EBIT)',ebit,'color:'+(ebit.reduce(function(a,b){return a+b},0)>=0?'var(--gn)':'var(--rd)'),true);

  h+='<tr><td colspan="14" style="font-size:10px;color:var(--txM);padding:10px 0 2px;font-weight:700">FINANCE</td></tr>';
  var finLabor=d.map(function(m){return m.lab['Finance']||0});
  var finVendor=d.map(function(m){return m.vd['Finance']||0});
  if(finLabor.some(function(v){return v>0})) row('  Finance Labor',finLabor);
  if(finVendor.some(function(v){return v>0})) row('  Finance Expenses',finVendor);
  // Loan interest is already in Finance dept vendors
  var finance=d.map(function(m){return(m.lab['Finance']||0)+(m.vd['Finance']||0)});

  var netIncome=d.map(function(m,i){return ebit[i]-(finance[i]||0)});
  row('Net Income',netIncome,'font-size:14px;color:'+(netIncome.reduce(function(a,b){return a+b},0)>=0?'var(--gn)':'var(--rd)'),true);

  h+='</tbody></table></div>';

  // P&L Chart
  h+='<div class="cc" style="margin-top:16px"><div class="cc-t">P&L Monthly</div><div style="height:260px"><canvas id="chPnL"></canvas></div></div>';

  el.innerHTML=h;
  mk('chPnL',{type:'bar',data:{labels:months,datasets:[
    {label:'Revenue',data:revenue,backgroundColor:'#10b981aa',borderRadius:4},
    {label:'COGS',data:totalCogs.map(function(v){return-v}),backgroundColor:'#f59e0b88',borderRadius:4},
    {label:'OpEx',data:opex.map(function(v){return-v}),backgroundColor:'#ef444488',borderRadius:4},
    {label:'Net Income',data:netIncome,type:'line',borderColor:'#3b82f6',borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#111827',pointBorderColor:'#3b82f6',pointBorderWidth:2,tension:.4}
  ]}});
}

function renderBalanceSheet(){
  var el=document.getElementById('st-bs');if(!el)return;
  var d=D.summary;var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h='<h2 style="margin-bottom:16px">Balance Sheet — FY2026</h2>';
  h+='<div style="overflow-x:auto"><table style="width:100%;min-width:1000px"><thead><tr style="font-size:11px"><th style="text-align:left;min-width:180px"></th>';
  months.forEach(function(m){h+='<th style="min-width:75px">'+m+'</th>'});
  h+='</tr></thead><tbody>';

  function row(label,vals,style,isTotal){
    var s=style||'';var cls=isTotal?'font-weight:800;border-top:2px solid var(--bd);':'';
    h+='<tr style="'+cls+s+'"><td style="font-weight:'+(isTotal?'800':'600')+';padding-left:'+(label.startsWith('  ')?'24px':'0')+'">'+label.trim()+'</td>';
    vals.forEach(function(v){h+='<td class="mono" style="text-align:right;font-size:12px;'+(finConv(v)<0?'color:var(--rd)':'')+'">'+finFmt(v)+'</td>'});
    h+='</tr>';
  }

  h+='<tr><td colspan="13" style="font-size:10px;color:var(--gn);padding:6px 0 2px;font-weight:700">ASSETS</td></tr>';
  var cash=d.map(function(m){return m.cumCash});
  row('  Cash & Equivalents',cash);
  var ar=d.map(function(m){return m.ar||0});
  row('  Accounts Receivable',ar);
  var totalAssets=d.map(function(m,i){return cash[i]+ar[i]});
  row('Total Assets',totalAssets,'color:var(--gn)',true);

  h+='<tr><td colspan="13" style="font-size:10px;color:var(--rd);padding:10px 0 2px;font-weight:700">LIABILITIES</td></tr>';
  var ap=d.map(function(m){return m.ap||0});
  row('  Accounts Payable',ap);
  
  // Payroll Liabilities breakdown — accrued but not yet paid
  // At end of month i: we accrued this month but pay next month
  var netPayable=d.map(function(m,i){
    // Net salary accrued this month, paid next month
    return i<11?m.accrualGross||0:0;
  });
  var ssPayable=d.map(function(m,i){
    return i<11?(m.accrualSS||0)+(m.accrualDisability||0):0;
  });
  var pensionPayable=d.map(function(m,i){
    return i<11?(m.accrualPension||0)+(m.accrualSF||0):0;
  });
  var taxPayable=d.map(function(m,i){
    return i<11?m.accrualTax||0:0;
  });
  
  h+='<tr><td colspan="13" style="font-size:9px;color:var(--txM);padding:4px 0 0;font-weight:600">  Payroll Liabilities</td></tr>';
  row('    Net Salary Payable',netPayable);
  row('    Social Security & Disability',ssPayable);
  row('    Pension & Study Fund',pensionPayable);
  row('    Tax Payable',taxPayable);
  var totalPayroll=d.map(function(m,i){return netPayable[i]+ssPayable[i]+pensionPayable[i]+taxPayable[i]});
  row('  Total Payroll Liabilities',totalPayroll,'font-weight:700');
  
  var loanBal=d.map(function(m){return m.loanBalance||0});
  row('  Loans Outstanding',loanBal);
  var totalLiab=d.map(function(m,i){return ap[i]+totalPayroll[i]+loanBal[i]});
  row('Total Liabilities',totalLiab,'color:var(--rd)',true);

  h+='<tr><td colspan="13" style="font-size:10px;color:var(--ac);padding:10px 0 2px;font-weight:700">EQUITY</td></tr>';
  var equity=d.map(function(m,i){return totalAssets[i]-totalLiab[i]});
  row('  Retained Earnings',equity);
  row('Total Equity',equity,'color:var(--ac)',true);

  h+='<tr style="border-top:3px double var(--bd)"><td style="font-weight:900;font-size:13px">Liabilities + Equity</td>';
  d.forEach(function(m,i){h+='<td class="mono" style="text-align:right;font-weight:800;font-size:12px">'+finFmt(totalLiab[i]+equity[i])+'</td>'});
  h+='</tr>';

  h+='</tbody></table></div>';
  h+='<div style="margin-top:12px;font-size:10px;color:var(--txM)">Note: Simplified balance sheet based on available data. Add loans/assets in Detailed Info for complete picture.</div>';
  el.innerHTML=h;
}

        periods=sp.months.map(function(m,i){return{label:months[i],months:[m]}});
      } else if(skpiPeriod==='quarterly'){
        for(var q=0;q<4;q++){periods.push({label:'Q'+(q+1),months:sp.months.slice(q*3,q*3+3)})}
      } else if(skpiPeriod==='semi'){
        periods.push({label:'H1',months:sp.months.slice(0,6)});
        periods.push({label:'H2',months:sp.months.slice(6,12)});
      } else {
        periods.push({label:'FY2026',months:sp.months});
      }

      // Compute period data
      var pLabels=periods.map(function(p){return p.label});
      var pRev=periods.map(function(p){return p.months.reduce(function(s,m){return s+m.signedRevenue},0)});
      var pRevT=periods.map(function(p){return p.months.reduce(function(s,m){return s+m.revenueTarget},0)});
      var pDeals=periods.map(function(p){return p.months.reduce(function(s,m){return s+m.signedDeals},0)});
      var pDealsT=periods.map(function(p){return p.months.reduce(function(s,m){return s+m.dealsTarget},0)});
      var pAvg=periods.map(function(p){var d=p.months.reduce(function(s,m){return s+m.signedDeals},0);var r=p.months.reduce(function(s,m){return s+m.signedRevenue},0);return d>0?r/d:0});
      var pCycle=periods.map(function(p){var c=p.months.filter(function(m){return m.avgCycleDays>0}).map(function(m){return m.avgCycleDays});return c.length>0?c.reduce(function(a,b){return a+b},0)/c.length:0});
      var pClose=periods.map(function(p){var s=p.months.reduce(function(a,m){return a+m.signedDeals},0);var t=p.months.reduce(function(a,m){return a+m.totalDeals},0);return t>0?s/t*100:0});
      var pNew=periods.map(function(p){return p.months.reduce(function(s,m){return s+m.newClients},0)});
      var pNewT=periods.map(function(p){return p.months.reduce(function(s,m){return s+m.newClientsTarget},0)});
      var pNewRev=periods.map(function(p){return p.months.reduce(function(s,m){return s+m.newClientRevenue},0)});

      // Row 1: Revenue, Deals, Avg Deal Size
      var dh='<div class="cg" style="grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">';
      dh+='<div class="cc"><div class="cc-t">Revenue vs Target</div><div style="height:220px"><canvas id="chSkR"></canvas></div></div>';
      dh+='<div class="cc"><div class="cc-t">Deals vs Target</div><div style="height:220px"><canvas id="chSkD"></canvas></div></div>';
      dh+='<div class="cc"><div class="cc-t">Avg Deal Size</div><div style="height:220px"><canvas id="chSkA"></canvas></div></div>';
      dh+='</div>';

      // Row 2: Close Rate, Cycle Time, New Clients
      dh+='<div class="cg" style="grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">';
      dh+='<div class="cc"><div class="cc-t">Close Rate %</div><div style="height:220px"><canvas id="chSkCR"></canvas></div></div>';
      dh+='<div class="cc"><div class="cc-t">Avg Cycle Time (days)</div><div style="height:220px"><canvas id="chSkCy"></canvas></div></div>';
      dh+='<div class="cc"><div class="cc-t">New Clients & Revenue</div><div style="height:220px"><canvas id="chSkNC"></canvas></div></div>';
      dh+='</div>';

      // Stage-to-stage conversion funnel
      var allConv={};var convCount=0;
      sp.months.forEach(function(m){if(m.conversions){Object.keys(m.conversions).forEach(function(k){allConv[k]=(allConv[k]||0)+m.conversions[k];convCount++})}});
      if(convCount>0){
        dh+='<div class="cc" style="margin-bottom:12px"><div class="cc-t">Stage-to-Stage Conversion (Avg)</div>';
        dh+='<div style="display:flex;gap:4px;padding:16px 0;align-items:center;justify-content:center;flex-wrap:wrap">';
        var stNames=['Initial Contact','Email Sent','Demo','Negotiation','Signed'];
        var stCols=['#64748b','#06b6d4','#3b82f6','#f59e0b','#10b981'];
        for(var si=0;si<stNames.length;si++){
          if(si>0){
            var key=stNames[si-1]+'\u2192'+stNames[si];
            var pct2=allConv[key]?Math.round(allConv[key]/(sp.months.filter(function(m){return m.conversions&&m.conversions[key]!==undefined}).length||1)):0;
            dh+='<div style="text-align:center;padding:0 6px"><div style="font-size:18px;font-weight:800;color:'+stCols[si]+'">'+pct2+'%</div><div style="font-size:8px;color:var(--txM)">\u2192</div></div>';
          }
          dh+='<div style="text-align:center;padding:8px 12px;background:'+stCols[si]+'18;border-radius:8px;border:1px solid '+stCols[si]+'33"><div style="font-size:11px;font-weight:700;color:'+stCols[si]+'">'+stNames[si]+'</div></div>';
        }
        dh+='</div></div>';
      }

      // Collapsible detail table
      dh+='<div class="cc"><div class="cc-t" style="cursor:pointer" id="skpiTblToggle">\u25B6 Detailed Table <span style="font-size:10px;color:var(--txM);font-weight:400">click to expand</span></div>';
      dh+='<div id="skpiTblWrap" style="display:none;overflow-x:auto;margin-top:8px"><table style="width:100%;font-size:11px"><thead><tr style="font-size:9px">';
      dh+='<th>Period</th><th>Revenue</th><th>Target</th><th>%</th><th>Deals</th><th>Tgt</th><th>%</th><th>Avg Deal</th><th>Cycle</th><th>Close %</th><th>New Cl.</th><th>New Rev</th><th>New %</th>';
      dh+='</tr></thead><tbody>';
      periods.forEach(function(p){
        var rev=p.months.reduce(function(s,m){return s+m.signedRevenue},0);
        var revT=p.months.reduce(function(s,m){return s+m.revenueTarget},0);
        var deals=p.months.reduce(function(s,m){return s+m.signedDeals},0);
        var dealsT=p.months.reduce(function(s,m){return s+m.dealsTarget},0);
        var total=p.months.reduce(function(s,m){return s+m.totalDeals},0);
        var newCl=p.months.reduce(function(s,m){return s+m.newClients},0);
        var newRev=p.months.reduce(function(s,m){return s+m.newClientRevenue},0);
        var newPct=rev>0?(newRev/rev*100):0;
        var rPct=revT>0?(rev/revT*100):0;var dPct=dealsT>0?(deals/dealsT*100):0;
        var conv=total>0?(deals/total*100):0;var avg=deals>0?(rev/deals):0;
        var cycles=p.months.filter(function(m){return m.avgCycleDays>0}).map(function(m){return m.avgCycleDays});
        var avgCycle=cycles.length>0?(cycles.reduce(function(a,b){return a+b},0)/cycles.length):0;
        var rCol=rPct>=100?'var(--gn)':rPct>=70?'var(--am)':'var(--rd)';
        var dCol=dPct>=100?'var(--gn)':dPct>=70?'var(--am)':'var(--rd)';
        dh+='<tr><td style="font-weight:700">'+p.label+'</td>';
        dh+='<td class="mono" style="color:var(--gn)">'+fmt(rev)+'</td>';
        dh+='<td class="mono" style="color:var(--txD)">'+fmt(revT)+'</td>';

        dh+='<td class="mono" style="color:var(--ac)">'+deals+'</td>';

        dh+='<td class="mono">'+(newPct>0?newPct.toFixed(0)+'%':'\u2014')+'</td></tr>';
      });
      dh+='</tbody></table></div></div>';

      det.innerHTML=dh;

      // Table toggle
      document.getElementById('skpiTblToggle').addEventListener('click',function(){
        var w=document.getElementById('skpiTblWrap');

        else{w.style.display='none';this.innerHTML='\u25B6 Detailed Table <span style="font-size:10px;color:var(--txM);font-weight:400">click to expand</span>'}
      });

      // Chart 1: Revenue vs Target
      mk('chSkR',{type:'bar',data:{labels:pLabels,datasets:[
        {label:'Signed Revenue',data:pRev,backgroundColor:'#10b981aa',borderRadius:4},
        {label:'Target',data:pRevT,backgroundColor:'transparent',borderColor:'#f59e0b',borderWidth:2,borderDash:[4,4],type:'line',pointRadius:3,pointBackgroundColor:'#f59e0b',tension:0}
      ]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:8,font:{size:9}}}}}});

      // Chart 2: Deals vs Target
      mk('chSkD',{type:'bar',data:{labels:pLabels,datasets:[
        {label:'Signed Deals',data:pDeals,backgroundColor:'#3b82f6aa',borderRadius:4},
        {label:'Target',data:pDealsT,backgroundColor:'transparent',borderColor:'#f59e0b',borderWidth:2,borderDash:[4,4],type:'line',pointRadius:3,pointBackgroundColor:'#f59e0b',tension:0}
      ]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:8,font:{size:9}}}}}});

      // Chart 3: Avg Deal Size
      mk('chSkA',{type:'bar',data:{labels:pLabels,datasets:[
        {label:'Avg Deal',data:pAvg,backgroundColor:'#8b5cf6aa',borderRadius:4}
      ]},options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return fmt(v)}}}}}});

      // Chart 4: Close Rate
      mk('chSkCR',{type:'line',data:{labels:pLabels,datasets:[
        {label:'Close Rate %',data:pClose,borderColor:'#06b6d4',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#111827',pointBorderColor:'#06b6d4',pointBorderWidth:2,tension:.3,fill:{target:'origin',above:'rgba(6,182,212,0.1)'}}
      ]},options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:function(v){return v+'%'}}}}}});

      // Chart 5: Cycle Time
      mk('chSkCy',{type:'bar',data:{labels:pLabels,datasets:[
        {label:'Avg Days',data:pCycle,backgroundColor:'#f59e0baa',borderRadius:4}
      ]},options:{plugins:{legend:{display:false}}}});

      // Chart 6: New Clients
      mk('chSkNC',{type:'bar',data:{labels:pLabels,datasets:[
        {label:'New Clients',data:pNew,backgroundColor:'#ec489988',borderRadius:4,yAxisID:'y'},
        {label:'New Client Rev',data:pNewRev,type:'line',borderColor:'#10b981',borderWidth:2,pointRadius:3,pointBackgroundColor:'#111827',pointBorderColor:'#10b981',tension:.3,yAxisID:'y1'}
      ]},options:{scales:{y:{position:'left'},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:function(v){return fmt(v)}}}},plugins:{legend:{position:'bottom',labels:{boxWidth:8,font:{size:9}}}}}});
    }
    renderDetail(0);

    document.querySelectorAll('.skpi-sp-card').forEach(function(card){
      card.addEventListener('click',function(){renderDetail(parseInt(this.dataset.idx))});
    });

    // Edit targets modal
    var stBtn=document.getElementById('skpiSetTargets');
    if(stBtn) stBtn.addEventListener('click',function(){
      var ah='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:750px;max-height:85vh;overflow-y:auto">';
      ah+='<div class="modal-head"><h2>Set Sales Targets — FY2026</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
      ah+='<div class="modal-body">';
      data.forEach(function(sp,spIdx){
        var existingTotal=sp.months.reduce(function(s,m){return s+m.revenueTarget},0);
        var existingDeals=sp.months.reduce(function(s,m){return s+m.dealsTarget},0);
        ah+='<div style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--bd)">';
        ah+='<div style="font-weight:800;font-size:15px;color:var(--tx);margin-bottom:10px">'+sp.salespersonName+'</div>';
        // Annual targets - row 1
        ah+='<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">';
        ah+='<div class="mf" style="flex:2;min-width:140px;margin:0"><label style="font-size:10px">Annual Revenue ($)</label><input class="tgt-annual-rev" data-sp="'+sp.salespersonId+'" type="number" value="'+(existingTotal||'')+'" placeholder="500000" style="padding:7px 8px;font-size:13px;font-weight:700"></div>';
        ah+='<div class="mf" style="flex:1;min-width:80px;margin:0"><label style="font-size:10px">Annual Deals</label><input class="tgt-annual-deals" data-sp="'+sp.salespersonId+'" type="number" value="'+(existingDeals||'')+'" placeholder="12" style="padding:7px 8px;font-size:13px;font-weight:700"></div>';
        var existingAvg=sp.months.reduce(function(s,m){return s+m.avgDealTarget},0);
        var existingCycle=sp.months[0].cycleDaysTarget||0;
        var existingClose=sp.months[0].closeRateTarget||0;
        var existingNew=sp.months.reduce(function(s,m){return s+m.newClientsTarget},0);
        ah+='<div class="mf" style="flex:1;min-width:80px;margin:0"><label style="font-size:10px">Avg Deal ($)</label><input class="tgt-annual-avg" data-sp="'+sp.salespersonId+'" type="number" value="'+(existingAvg||'')+'" placeholder="50000" style="padding:7px 8px;font-size:12px"></div>';
        ah+='<div class="mf" style="flex:1;min-width:80px;margin:0"><label style="font-size:10px">Cycle (days)</label><input class="tgt-annual-cycle" data-sp="'+sp.salespersonId+'" type="number" value="'+(existingCycle||'')+'" placeholder="60" style="padding:7px 8px;font-size:12px"></div>';
        ah+='<div class="mf" style="flex:1;min-width:70px;margin:0"><label style="font-size:10px">Close Rate %</label><input class="tgt-annual-close" data-sp="'+sp.salespersonId+'" type="number" value="'+(existingClose||'')+'" placeholder="30" style="padding:7px 8px;font-size:12px"></div>';
        ah+='<div class="mf" style="flex:1;min-width:80px;margin:0"><label style="font-size:10px">New Clients</label><input class="tgt-annual-new" data-sp="'+sp.salespersonId+'" type="number" value="'+(existingNew||'')+'" placeholder="6" style="padding:7px 8px;font-size:12px"></div>';
        ah+='<div style="display:flex;align-items:flex-end;padding-bottom:2px"><button class="btn-ghost tgt-split" data-sp="'+sp.salespersonId+'" style="padding:7px 10px;font-size:10px;white-space:nowrap">\u2198 Split</button></div>';
        ah+='</div>';
        // Monthly breakdown (collapsed)
        ah+='<div style="cursor:pointer;font-size:11px;color:var(--ac);margin-bottom:6px" onclick="var el=this.nextElementSibling;el.style.display=el.style.display===\'none\'?\'block\':\'none\';this.textContent=el.style.display===\'none\'?\'\u25B6 Show monthly breakdown\':\'\u25BC Hide monthly breakdown\'">\u25B6 Show monthly breakdown</div>';
        ah+='<div style="display:none">';
        ah+='<div style="display:flex;gap:3px;margin-bottom:3px"><div style="width:35px;font-size:8px;color:var(--txM)"></div><div style="flex:2;font-size:8px;color:var(--txM)">Revenue</div><div style="flex:1;font-size:8px;color:var(--txM)">Deals</div><div style="flex:1;font-size:8px;color:var(--txM)">New Cl.</div></div>';
        for(var m=1;m<=12;m++){
          var existing=sp.months[m-1];
          ah+='<div style="display:flex;gap:3px;margin-bottom:1px">';
          ah+='<div style="width:35px;font-size:10px;color:var(--txD);padding-top:4px">'+months[m-1]+'</div>';
          ah+='<input class="tgt-rev" data-sp="'+sp.salespersonId+'" data-m="'+m+'" type="number" value="'+(existing.revenueTarget||'')+'" placeholder="0" style="flex:2;padding:2px 5px;font-size:10px">';
          ah+='<input class="tgt-deals" data-sp="'+sp.salespersonId+'" data-m="'+m+'" type="number" value="'+(existing.dealsTarget||'')+'" placeholder="0" style="flex:1;padding:2px 5px;font-size:10px">';

      ah+='</div>';

          var annualDeals=parseInt(document.querySelector('.tgt-annual-deals[data-sp="'+spId+'"]').value)||0;
          var annualNew=parseInt(document.querySelector('.tgt-annual-new[data-sp="'+spId+'"]').value)||0;
          var monthlyRev=Math.round(annualRev/12*100)/100;
          var monthlyDeals=Math.round(annualDeals/12);

      document.getElementById('tgtSave').addEventListener('click',function(){
        var targets=[];

        var spIds={};
        document.querySelectorAll('.tgt-annual-rev').forEach(function(inp){spIds[inp.dataset.sp]=true});
        var annualFields={};

      });
    });

}

function renderSalesSummary(){
  var s=SA,allCons=D.contracts;
  var spList=[{id:'all',name:'All Salespeople'}];
  (D.salespeople||[]).forEach(function(sp){spList.push(sp)});
  var h='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">';
  h+='<label style="font-size:12px;font-weight:700;color:var(--txM)">FILTER BY:</label>';
  h+='<select id="spFilter" style="background:var(--cardH);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;color:var(--tx);font-family:var(--f);font-size:13px;cursor:pointer">';
  spList.forEach(function(sp){h+='<option value="'+sp.id+'"'+(salesFilter===sp.id?' selected':'')+'>'+sp.name+'</option>'});
  h+='</select></div>';
  var cons=salesFilter==='all'?allCons:allCons.filter(function(c){return c.salespersonId===salesFilter});
  var signed=cons.filter(function(c){return c.stage==='Signed'});
  var pipeline=cons.filter(function(c){return c.stage!=='Signed'});
  var signedVal=signed.reduce(function(a,c){return a+c.value},0);
  var pipVal=pipeline.reduce(function(a,c){return a+c.value},0);
  var pipW=pipeline.reduce(function(a,c){return a+c.weighted},0);
  var localSD={};STAGES.forEach(function(st){localSD[st]=0});
  cons.forEach(function(c){localSD[c.stage]=(localSD[c.stage]||0)+1});
  var localByType={},localByCountry={};
  cons.forEach(function(c){
    var v=W?(c.chance!=null?c.value*c.chance:0):c.value;
    var isSigned=c.stage==='Signed';var ind=c.industry||'Other';var co=c.country||'Unknown';
    if(!localByType[ind])localByType[ind]={signed:0,pipeline:0};
    if(!localByCountry[co])localByCountry[co]={signed:0,pipeline:0};
    if(isSigned){localByType[ind].signed+=v;localByCountry[co].signed+=v}
    else{localByType[ind].pipeline+=v;localByCountry[co].pipeline+=v}
  });
  h+='<div class="kg kg6">';
  h+=kpi('\u2714','Signed',fmt(signedVal),signed.length+' deals','var(--gn)');
  h+=kpi('\u25CE','Pipeline',fmt(pipVal),pipeline.length+' deals','var(--ac)',50);
  h+=kpi('\u26A1','Pipeline (Wtd)',fmt(pipW),'Weighted','var(--am)',100);
  h+=kpi('\u2605','Total Deals',''+cons.length,'of '+allCons.length,'var(--pk)',150);
  h+=kpi('\u2609','Conversion',cons.length>0?fmtP(signed.length/cons.length*100):'\u2014','signed/total','var(--cy)',200);
  h+=kpi('%','Avg Deal',cons.length>0?fmt((signedVal+pipVal)/cons.length):'\u2014','per deal','var(--pu)',250);
  h+='</div>';

  h+='<div class="tw"><div class="tw-h" style="color:var(--gn)">\u2714 Signed <span class="ct">'+signed.length+'</span></div><div style="overflow-x:auto;max-height:350px"><table>'+buildSpTbl(signed,'s-','var(--gn)',false)+'</table></div></div>';

        .then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Created');openScenarioBuilder(res.id)}});
    });

    // Open scenario
    document.querySelectorAll('.sc-card').forEach(function(card){
      card.addEventListener('click',function(ev){
        if(ev.target.closest('.sc-del'))return;
        openScenarioBuilder(this.dataset.sid);
      });
    });

    // Delete scenario
    document.querySelectorAll('.sc-del').forEach(function(btn){
      btn.addEventListener('click',function(ev){
        ev.stopPropagation();
        if(!confirm('Delete this scenario?'))return;
        authFetch('/api/scenarios/'+this.dataset.sid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Deleted');renderScenario()}});
      });
    });
  });
}

          fh+=mmField('f','Starting From','06','2026');

        if(t==='hire'){

              }
            });
          }
        }
      }
      showFields();
      document.getElementById('wi-type').addEventListener('change',showFields);

      document.getElementById('wiSave').addEventListener('click',function(){
        var t=document.getElementById('wi-type').value;
        var cfg={};
        if(t==='hire'){
          var dept=document.getElementById('wi-dept').value;
          cfg={role:document.getElementById('wi-role').value,dept:dept,monthlyCost:parseFloat(document.getElementById('wi-cost').value)||0,currency:document.getElementById('wi-cur').value,startDate:getMMYY('s'),startMonth:mmyyToMonth(getMMYY('s'))};
          if(dept==='R&D'){
            cfg.ttmReduction=parseInt(document.getElementById('wi-ttm').value)||0;
          } else {
            cfg.expectedRevenue=parseFloat(document.getElementById('wi-rev').value)||0;
            cfg.revenueStartDate=document.getElementById('wi-mmr')?getMMYY('r'):'';
            cfg.revenueStartMonth=document.getElementById('wi-mmr')?mmyyToMonth(getMMYY('r')):7;
            cfg.revenueGrowthPct=parseFloat(document.getElementById('wi-rg').value)||0;
          }
        } else if(t==='expense_change'){
          cfg={vendor:document.getElementById('wi-vendor').value,dept:document.getElementById('wi-dept').value,oldAmount:parseFloat(document.getElementById('wi-old').value)||0,newAmount:parseFloat(document.getElementById('wi-new').value)||0,currency:document.getElementById('wi-cur').value,fromDate:getMMYY('f'),fromMonth:mmyyToMonth(getMMYY('f'))};
        } else if(t==='revenue_stream'){
          cfg={description:document.getElementById('wi-desc').value,monthlyAmount:parseFloat(document.getElementById('wi-amt').value)||0,fromDate:getMMYY('f'),fromMonth:mmyyToMonth(getMMYY('f')),growthPct:parseFloat(document.getElementById('wi-rg').value)||0};
        }
        authFetch('/api/scenarios/'+sid+'/items',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({itemType:t,config:cfg})})
          .then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Added');openScenarioBuilder(sid)}});
      });
    });
  });
}

          if(res.ok){row.style.opacity='0.3';row.style.textDecoration='line-through';toast('Done!')}
        });

  document.getElementById('btnCancelDeal').addEventListener('click',function(){
    document.getElementById('newDealForm').style.display='none';
  });

  // Save new deal
  document.getElementById('btnSaveDeal').addEventListener('click',function(){
    var cl=document.getElementById('nd-cl').value;
    var va=parseFloat(document.getElementById('nd-va').value);
    if(!cl||!va){toast('Fill client and value');return}
    var ch=document.getElementById('nd-ch').value;
    var body={
      client:cl,
      country:document.getElementById('nd-co').value,
      industry:document.getElementById('nd-in').value,
      value:va,
      signingDate:document.getElementById('nd-sd').value,
      dso:parseInt(document.getElementById('nd-ds').value)||60,

    authFetch('/api/contracts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    }).then(function(r){return r.json()}).then(function(res){
      if(res.ok){

var cfCurrency='USD';

function finFmt(n){if(n==null)return'\u2014';var v=finConv(n);var sym=finCurrency==='ILS'?'\u20AA':'$';var a=Math.abs(v);var s=v<0?'-':'';if(a>=1e6)return s+sym+(a/1e6).toFixed(2)+'M';if(a>=1e3)return s+sym+(a/1e3).toFixed(1)+'K';return s+sym+a.toFixed(0)}
function renderCashFlow(el){
  el.innerHTML='<div style="padding:40px;text-align:center;color:var(--txM)">Loading...</div>';
  authFetch('/api/cashflow-report?currency='+cfCurrency).then(function(r){return r.json()}).then(function(data){
    var months=data.months;var rate=data.exchangeRate;
    var sym=cfCurrency==='ILS'?'\u20AA':cfCurrency==='EUR'?'\u20AC':'$';
    var fmtCF=function(n){if(n==null)return'\u2014';var a=Math.abs(n);var s=n<0?'-':'';if(a>=1e6)return s+sym+(a/1e6).toFixed(2)+'M';if(a>=1e3)return s+sym+(a/1e3).toFixed(1)+'K';return s+sym+a.toFixed(0)};

    h+='<button class="btn-ghost cf-cur'+(cfCurrency==='ILS'?' act':'')+'" data-cur="ILS" style="padding:6px 14px;font-size:11px;'+(cfCurrency==='ILS'?'background:var(--ac);color:#fff':'')+'">₪ ILS</button>';

    h+='</div></div>';

    h+=kpi('\u2198','Total Expenses',fmtCF(totalExp),'FY2026','var(--rd)',50);
    h+=kpi('\u2248','Net Cashflow',fmtCF(netTotal),'FY2026',netTotal>=0?'var(--gn)':'var(--rd)',100);

    h+='</tr></thead><tbody id="cfTbl">';

    months.forEach(function(m,mi){

      var payrollTip='Gross: '+fmtCF(m.cfGross||0)+'\nSS+Disability: '+fmtCF((m.cfSS||0)+(m.cfDisability||0))+' (prev mo)\nPension: '+fmtCF(m.cfPension||0)+' (prev mo)\nStudy Fund: '+fmtCF(m.cfStudyFund||0)+' (prev mo)\nTax: '+fmtCF(m.cfTax||0);

    el.innerHTML=h;

      {label:'Expenses',data:months.map(function(m){return-m.totalExpenses}),backgroundColor:'#ef444488',borderRadius:4},

    document.querySelectorAll('.cf-row').forEach(function(row){
      row.addEventListener('click',function(ev){
        if(ev.target.closest('.cf-bal-cell')||ev.target.closest('.cf-tax-cell'))return;
        var mi=this.dataset.mi;
        var detail=document.querySelector('.cf-detail[data-mi="'+mi+'"]');
        if(!detail)return;
        var arrow=this.querySelector('td:first-child span');
        if(detail.style.display==='none'){detail.style.display='table-row';if(arrow)arrow.textContent='\u25BC'}
        else{detail.style.display='none';if(arrow)arrow.textContent='\u25B6'}
      });
    });

    // Click to edit tax payment
    document.querySelectorAll('.cf-tax-cell').forEach(function(cell){
      cell.addEventListener('click',function(){
        var month=this.dataset.month;var mi=parseInt(this.dataset.mi);
        var m=months[mi];if(!m)return;
        var curTax=m.cfTax||0;
        var th='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:380px">';
        th+='<div class="modal-head"><h2>'+m.monthLabel+' — Income Tax</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
        th+='<div class="modal-body">';
        th+='<div class="mf"><label>Tax Amount ('+sym+')</label><input id="taxAmt" type="number" value="'+curTax+'" style="font-size:16px;font-weight:700"></div>';
        th+='<div class="hint" style="margin-top:6px">This amount will carry forward to all future months until changed.</div>';
        th+='</div>';
        th+='<div class="modal-foot"><button class="btn-ghost" id="taxX">Cancel</button><button class="btn-p" id="taxSave">Save</button></div></div></div>';
