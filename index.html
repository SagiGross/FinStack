        document.getElementById('taxX').addEventListener('click',closeModal);
        document.getElementById('modalOverlay').addEventListener('click',function(ev){if(ev.target===this)closeModal()});
        document.getElementById('taxSave').addEventListener('click',function(){
          var amt=parseFloat(document.getElementById('taxAmt').value)||0;
          var convAmt=cfCurrency==='ILS'?amt/rate:amt;
          authFetch('/api/tax-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({month:mi+1,amount:convAmt})})
            .then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Tax updated');renderCashFlow(el)}});
        });
      });
    });

    // Click to view/edit balance with per-bank breakdown
    document.querySelectorAll('.cf-bal-cell').forEach(function(cell){
      cell.addEventListener('click',function(){
        var month=this.dataset.month;var field=this.dataset.field;
        var m=months.find(function(x){return x.month===month});if(!m)return;
        var val=field==='opening'?m.openingBalance:m.closingBalance;
        var valUsd=field==='opening'?m.openingBalanceUsd:m.closingBalanceUsd;

        var ph='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:480px">';
        ph+='<div class="modal-head"><h2>'+m.monthLabel+' — '+(field==='opening'?'Opening':'Closing')+' Balance</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
        ph+='<div class="modal-body">';
        ph+='<div style="font-size:24px;font-weight:800;color:var(--tx);margin-bottom:16px">'+fmtCF(val)+'</div>';

        // Per-bank breakdown
        if(bankGroups.length>0 && m.banks){
          ph+='<div style="margin-bottom:16px">';
          ph+='<div style="font-size:11px;font-weight:700;color:var(--txM);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Per Bank</div>';
          bankGroups.forEach(function(bg){
            var bd=m.banks[bg]||{opening:0,closing:0,isManual:false};
            var bVal=field==='opening'?bd.opening:bd.closing;
            var lbl=bankLabels[bg]||bg;
            ph+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--cardH);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px">';
            ph+='<span style="font-weight:600;color:var(--tx)">'+lbl+'</span>';
            ph+='<div style="display:flex;align-items:center;gap:8px">';
            ph+='<span class="mono" style="font-weight:700;'+(bd.isManual?'color:var(--cy)':'')+'">'+fmtCF(bVal)+(bd.isManual?' \u270E':'')+'</span>';
            ph+='<button class="btn-ghost bk-edit" data-bank="'+bg+'" style="padding:4px 10px;font-size:10px">Edit</button>';
            ph+='</div></div>';
          });
          ph+='</div>';
        }

        // Total edit
        ph+='<div class="mf"><label>Total (USD)</label><input id="bal-total" type="number" value="'+valUsd.toFixed(2)+'"></div>';
        ph+='</div>';
        ph+='<div class="modal-foot"><button class="btn-ghost" id="balX">Cancel</button><button class="btn-p" id="balSave">Save Total</button></div></div></div>';
        document.body.insertAdjacentHTML('beforeend',ph);
        document.getElementById('modalClose').addEventListener('click',closeModal);
        document.getElementById('balX').addEventListener('click',closeModal);
        document.getElementById('modalOverlay').addEventListener('click',function(ev){if(ev.target===this)closeModal()});

        // Save total
        document.getElementById('balSave').addEventListener('click',function(){
          var num=parseFloat(document.getElementById('bal-total').value);if(isNaN(num))return;
          var body={month:month,bank:'total'};
          if(field==='opening')body.openingBalance=num;else body.closingBalance=num;
          authFetch('/api/cashflow-report/balance',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
            .then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Balance updated');renderCashFlow(el)}});
        });

        // Per-bank edit buttons
        document.querySelectorAll('.bk-edit').forEach(function(btn){
          btn.addEventListener('click',function(){
            var bg=this.dataset.bank;var lbl=bankLabels[bg]||bg;
            var bd=m.banks[bg]||{opening:0,closing:0};
            var curVal=field==='opening'?bd.opening:bd.closing;
            var conv=cfCurrency==='ILS'?data.exchangeRate:1;
            var curUsd=curVal/conv;
            var nv=prompt(lbl+' '+(field==='opening'?'Opening':'Closing')+' (USD):',curUsd.toFixed(2));
            if(nv===null)return;var num=parseFloat(nv);if(isNaN(num))return;
            var body={month:month,bank:bg};
            if(field==='opening')body.openingBalance=num;else body.closingBalance=num;
            authFetch('/api/cashflow-report/balance',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
              .then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast(lbl+' updated');renderCashFlow(el)}});
          });
        });
      });
    });

    // Upload handler
    var cfUpBtn=document.getElementById('cfUpload');
    if(cfUpBtn) cfUpBtn.addEventListener('click',function(){
      var inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls,.csv';
      inp.onchange=function(){
        if(!inp.files[0])return;
        var fd=new FormData();fd.append('file',inp.files[0]);
        authFetch('/api/cashflow-report/upload',{method:'POST',body:fd})
          .then(function(r){return r.json()}).then(function(res){
            if(res.ok){
              toast('File parsed: '+res.rows+' rows');
              // Show preview modal
              var ph='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:700px"><div class="modal-head"><h2>Bank Statement Preview</h2><button class="modal-close" id="modalClose">\u2715</button></div><div class="modal-body">';
              ph+='<div style="font-size:12px;color:var(--txM);margin-bottom:12px">'+res.rows+' rows found. Columns: '+res.columns.join(', ')+'</div>';
              ph+='<div style="overflow-x:auto;max-height:300px"><table><thead><tr>';
              if(res.preview[0])res.preview[0].forEach(function(c){ph+='<th style="font-size:10px">'+c+'</th>'});
              ph+='</tr></thead><tbody>';
              res.preview.slice(1).forEach(function(row){ph+='<tr>';row.forEach(function(c){ph+='<td style="font-size:11px">'+c+'</td>'});ph+='</tr>'});
              ph+='</tbody></table></div>';
              ph+='<div style="margin-top:12px;font-size:11px;color:var(--txM)">Review the data above. Manual balance updates can be made by clicking cells in the Cash Flow table.</div>';
              ph+='</div><div class="modal-foot"><button class="btn-ghost" id="mcX">Close</button></div></div></div>';
              document.body.insertAdjacentHTML('beforeend',ph);
              document.getElementById('modalClose').addEventListener('click',closeModal);
              document.getElementById('mcX').addEventListener('click',closeModal);
              document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
            } else {toast('Error: '+(res.error||'Unknown'))}
          });
      };
      inp.click();
    });
  });
}

function renderSalesMap(el){
  var cons=D.contracts||[];
  var countryData={};
  cons.forEach(function(c){
    var co=c.country||'Unknown';
    if(!countryData[co])countryData[co]={signed:0,pipeline:0,deals:0,clients:[],industries:[],contracts:[]};
    countryData[co].deals++;
    if(c.stage==='Signed')countryData[co].signed+=c.value;
    else countryData[co].pipeline+=c.weighted;

    if(countryData[co].industries.indexOf(c.industry)===-1)countryData[co].industries.push(c.industry);

        }
        return fill;
      });

      polygonSeries.mapPolygons.template.adapters.add("fillOpacity",function(op,target){
        var id=target.dataItem.get("id");
        var nm=Object.keys(nameToIso).find(function(k){return nameToIso[k]===id});
        return(nm&&countryData[nm])?1:0.5;
      });

      // Rich HTML Tooltip (hover only - summary)
      var ttip=am5.Tooltip.new(root,{
        getFillFromSprite:false,getLabelFillFromSprite:false,autoTextColor:false,

        pointerOrientation:"vertical"
      });
      ttip.get("background").setAll({fill:am5.color("#00000000"),strokeWidth:0});
      polygonSeries.mapPolygons.template.set("tooltip",ttip);

      polygonSeries.mapPolygons.template.adapters.add("tooltipHTML",function(html,target){
        var id=target.dataItem.get("id");
        var nm=Object.keys(nameToIso).find(function(k){return nameToIso[k]===id});
        if(!nm||!countryData[nm])return"";
        var d=countryData[nm];var total=d.signed+d.pipeline;
        var barW=total>0?Math.round(d.signed/total*100):0;
        return '<div style="background:rgba(15,23,42,0.95);backdrop-filter:blur(12px);border:1px solid rgba(100,116,139,0.3);border-radius:14px;padding:16px 20px;min-width:220px;font-family:Outfit,sans-serif;box-shadow:0 8px 32px rgba(0,0,0,0.5)">'

      // Click handler - opens detail panel with client list
      polygonSeries.mapPolygons.template.events.on("click",function(ev){

        if(!nm||!countryData[nm])return;
        openCountryPanel(nm,countryData[nm]);
      });

      // --- Pulsating Point Markers ---
      var pointSeries=chart.series.push(am5map.MapPointSeries.new(root,{}));
      var activeList=[];

        var iso=nameToIso[nm];if(!iso||!coords[iso])return;
        var d=countryData[nm];
        activeList.push({name:nm,iso:iso,total:d.signed+d.pipeline,signed:d.signed,deals:d.deals,lat:coords[iso].lat,lng:coords[iso].lng});
      });
      activeList.sort(function(a,b){return b.total-a.total});

      activeList.forEach(function(item,idx){
        var di=pointSeries.pushDataItem({latitude:item.lat,longitude:item.lng});
        var container=am5.Container.new(root,{});
        var baseR=idx<3?9:idx<6?7:5;
        var color=item.signed>0?am5.color("#10b981"):am5.color("#3b82f6");

        // Outer glow
        var glow=container.children.push(am5.Circle.new(root,{radius:baseR+6,fill:color,fillOpacity:0.12}));
        // Main circle
        var circ=container.children.push(am5.Circle.new(root,{

          stroke:am5.color("#ffffff"),strokeWidth:2,strokeOpacity:0.8,
          cursorOverStyle:"pointer",
          tooltipText:item.name+"\n"+fmt(item.total)
        }));

        // Pulse animation for top 3
        if(idx<3){
          var pulse=container.children.push(am5.Circle.new(root,{radius:baseR,fill:color,fillOpacity:0}));
          pulse.animate({key:"radius",to:baseR+18,duration:2000,loops:Infinity,easing:am5.ease.out(am5.ease.cubic)});
          pulse.animate({key:"fillOpacity",from:0.35,to:0,duration:2000,loops:Infinity,easing:am5.ease.out(am5.ease.cubic)});
        }

        // Hover scale
        circ.events.on("pointerover",function(){circ.animate({key:"scale",to:1.5,duration:200})});
        circ.events.on("pointerout",function(){circ.animate({key:"scale",to:1,duration:200})});

        di.set("bullet",am5.Bullet.new(root,{sprite:container}));
      });

      // --- Zoom Controls ---
      var zc=chart.set("zoomControl",am5map.ZoomControl.new(root,{}));
      zc.plusButton.setAll({fill:am5.color("#1e293b"),stroke:am5.color("#334155")});
      zc.minusButton.setAll({fill:am5.color("#1e293b"),stroke:am5.color("#334155")});

      // --- Legend ---
      var legend=chart.children.push(am5.Container.new(root,{
        layout:root.horizontalLayout,x:20,y:am5.percent(95),centerY:am5.percent(100)
      }));
      function addLeg(color,label){
        var c=legend.children.push(am5.Container.new(root,{layout:root.horizontalLayout,paddingRight:16}));
        c.children.push(am5.Circle.new(root,{radius:5,fill:am5.color(color),dy:1}));
        c.children.push(am5.Label.new(root,{text:label,fill:am5.color("#94a3b8"),fontSize:11,paddingLeft:6}));
      }
      addLeg("#10b981","Signed");addLeg("#3b82f6","Pipeline");addLeg("#1a2236","No deals");

      chart.appear(1000,100);
    }catch(err){
      console.error("Map error:",err);
      document.getElementById("amMapRoot").innerHTML='<div style="padding:40px;text-align:center;color:#ef4444;font-family:var(--f)">Error: '+err.message+'</div>';
    }
  }

  // Load or use cached
  if(typeof am5!=="undefined"&&typeof am5map!=="undefined"&&typeof am5geodata_worldLow!=="undefined"){
    setTimeout(doBuild,50);
  } else {
    document.getElementById("amMapRoot").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-family:var(--f)"><div style="text-align:center"><div style="font-size:28px;margin-bottom:8px">☉</div>Loading map...</div></div>';
    // Scripts are in <head>, just wait for them
    var waits=0;
    var wi=setInterval(function(){
      waits++;
      if(typeof am5!=="undefined"&&typeof am5map!=="undefined"&&typeof am5geodata_worldLow!=="undefined"){
        clearInterval(wi);setTimeout(doBuild,50);
      } else if(waits>50){
        clearInterval(wi);
        document.getElementById("amMapRoot").innerHTML='<div style="padding:40px;text-align:center;color:#ef4444;font-family:var(--f)">Failed to load map libraries</div>';
      }

  }
}

function renderPayments(el){

  // Add invoice form
  var vendorOpts='<option value="">-- Select Vendor --</option>';
  (D.expenses||[]).forEach(function(x){vendorOpts+='<option value="'+x.id+'">'+x.vendor+' ('+x.dept+')</option>'});
  h+='<div class="cc" style="margin-bottom:16px"><div class="cc-t">New Invoice</div>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;padding:0 0 12px">';
  h+='<div class="mf" style="min-width:200px"><label>Vendor</label><div style="display:flex;gap:4px"><select id="inv-vendor" style="flex:1">'+vendorOpts+'</select><button class="btn-ghost" id="btnNewVendor" style="padding:8px 10px;font-size:11px;white-space:nowrap">+ New</button></div></div>';
  h+='<div class="mf" style="min-width:120px"><label>Invoice #</label><input id="inv-num" placeholder="INV-001"></div>';
  h+='<div class="mf" style="min-width:100px"><label>Amount</label><input id="inv-amt" type="number" placeholder="5000"></div>';
  h+='<div class="mf" style="min-width:80px"><label>Currency</label><select id="inv-cur"><option value="ILS">\u20AA ILS</option><option value="USD">$ USD</option><option value="EUR">€ EUR</option></select></div>';
  h+='<div class="mf" style="min-width:130px"><label>Due Date</label><input id="inv-due" type="date"></div>';
  h+='<div class="mf" style="min-width:150px"><label>Notes</label><input id="inv-notes" placeholder="Optional"></div>';
  h+='<button class="btn-p" id="btnAddInv" style="padding:10px 18px;white-space:nowrap">+ Add Invoice</button>';
  h+='</div></div>';

  // KPIs
  h+='<div id="invKpis"></div>';
  // Table
  h+='<div class="tw"><div class="tw-h">Invoices</div>';
  h+='<div style="overflow-x:auto;max-height:500px"><table><thead><tr>';
  h+='<th>Vendor</th><th>Invoice #</th><th>Amount</th><th>Cur</th><th>Due Date</th>';
  h+='<th>Vendor Unpaid</th><th>Paid Amount</th><th>Paid Date</th><th>Remaining</th><th>Status</th><th></th>';
  h+='</tr></thead><tbody id="invTbl"></tbody></table></div></div>';
  el.innerHTML=h;

  // Load invoices
  authFetch('/api/invoices').then(function(r){return r.json()}).then(function(allInvoices){
    var rate=D.exchangeRate||3.12;
    // Filter by selected month:
    // 1. Invoices with dueDate in this month
    // 2. Unpaid/partial invoices from PREVIOUS months (carried forward)
    var invoices=allInvoices.filter(function(inv){
      if(!inv.dueDate) return false;
      var d=new Date(inv.dueDate);
      var invMonth=(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+d.getFullYear();
      // Show if due this month
      if(invMonth===pm) return true;
      // Show if unpaid/partial and due BEFORE this month (carried forward)
      if(inv.status!=='paid' && invMonth<pm) return true;
      return false;
    });
    var allCount=allInvoices.length;
    // KPIs - use filtered invoices for pending/unpaid, all for totals
    var totalUnpaid=0,totalPaid=0,countPending=0;
    invoices.forEach(function(inv){
      var amtUsd=inv.currency==='ILS'?inv.amount/rate:inv.amount;
      var paidUsd=inv.currency==='ILS'?inv.paidAmount/rate:inv.paidAmount;
      if(inv.status!=='paid') totalUnpaid+=amtUsd-paidUsd;
      totalPaid+=paidUsd;
      if(inv.status==='pending') countPending++;
    });
    var monthLabel=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][pmM-1]+' '+pmY;

      kpi('\u2717','Unpaid',fmt(totalUnpaid),'this month','var(--rd)',100)+
      kpi('\u2714','Paid',fmt(totalPaid),'this month','var(--gn)',150)+
    '</div>';

    // Split into active (unpaid/partial/pending) and completed (paid)
    var activeInvs=invoices.filter(function(inv){return inv.status!=='paid'});

      rows+='<td style="color:var(--txD);font-size:12px">'+(inv.dueDate||'\u2014')+'</td>';
      rows+='<td class="mono" style="color:var(--rd)">'+fmt(inv.vendorUnpaidTotal)+'</td>';
      rows+='<td class="mono" style="color:var(--gn)">'+sym+(inv.paidAmount?Math.round(inv.paidAmount).toLocaleString():'0')+'</td>';
      rows+='<td style="color:var(--txD);font-size:12px">'+(inv.paidDate||'\u2014')+'</td>';
      rows+='<td class="mono" style="font-weight:700;color:'+(inv.remaining>0?'var(--am)':'var(--gn)')+'">'+sym+Math.round(inv.remaining).toLocaleString()+'</td>';
      rows+='<td><span class="pill" style="background:'+sc+'18;color:'+sc+'">'+inv.status+'</span></td>';
      rows+='<td><button class="btn-p inv-pay" data-iid="'+inv.id+'" style="padding:4px 10px;font-size:10px">Pay</button> ';
      rows+='<button class="btn-ghost inv-edit" data-iid="'+inv.id+'" style="padding:3px 8px;font-size:10px">\u270E</button></td>';
      rows+='</tr>';
    });
    if(activeInvs.length===0) rows+='<tr><td colspan="11" style="text-align:center;color:var(--txM);padding:20px">No pending invoices for this month</td></tr>';
    document.getElementById('invTbl').innerHTML=rows;
    makeSearchable('invTbl');

    // Paid invoices section
    if(paidInvs.length>0){
      var paidSection=document.createElement('div');

function openInvoiceCard(inv){
  var sym=inv.currency==='ILS'?'\u20AA':inv.currency==='EUR'?'\u20AC':'$';
  var h='<div class="modal-bg" id="modalOverlay"><div class="modal-card">';
  h+='<div class="modal-head"><h2>'+inv.vendor+' <span class="mono" style="font-size:14px;color:var(--txD)">'+(inv.invoiceNumber||'No #')+'</span></h2>';
  h+='<button class="modal-close" id="modalClose">\u2715</button></div>';
  h+='<div class="modal-body">';
  h+='<div class="kpi-row">';
  h+='<div class="kpi-mini"><div class="kv">'+sym+Math.round(inv.amount).toLocaleString()+'</div><div class="kl">Invoice Amount</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--gn)">'+sym+(inv.paidAmount?Math.round(inv.paidAmount).toLocaleString():'0')+'</div><div class="kl">Paid</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:'+(inv.remaining>0?'var(--am)':'var(--gn)')+'">'+sym+Math.round(inv.remaining).toLocaleString()+'</div><div class="kl">Remaining</div></div>';
  h+='</div>';

  h+='<div class="section-label">Invoice Details</div>';
  h+='<div class="modal-grid">';
  h+='<div class="mf"><label>Invoice Number</label><input id="iv-num" value="'+(inv.invoiceNumber||'')+'"></div>';
  h+='<div class="mf"><label>Amount</label><input id="iv-amt" type="number" value="'+inv.amount+'"></div>';
  h+='<div class="mf"><label>Currency</label><select id="iv-cur">';
  h+='<option value="ILS"'+(inv.currency==='ILS'?' selected':'')+'>\u20AA ILS</option>';
  h+='<option value="USD"'+(inv.currency==='USD'?' selected':'')+'>$ USD</option><option value="EUR"'+(inv.currency==='EUR'?' selected':'')+'>€ EUR</option>';
  h+='</select></div>';
  h+='<div class="mf"><label>Due Date</label><input id="iv-due" type="date" value="'+(inv.dueDate||'')+'"></div>';
  h+='</div>';

  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Payment</div>';
  h+='<div class="modal-grid">';
  h+='<div class="mf"><label>Paid Amount</label><input id="iv-paid" type="number" value="'+(inv.paidAmount||0)+'"></div>';
  h+='<div class="mf"><label>Paid Date</label><input id="iv-pdate" type="date" value="'+(inv.paidDate||'')+'"></div>';
  h+='<div class="mf"><label>Status</label><select id="iv-status">';
  h+='<option value="pending"'+(inv.status==='pending'?' selected':'')+'>Pending</option>';
  h+='<option value="partial"'+(inv.status==='partial'?' selected':'')+'>Partial</option>';
  h+='<option value="paid"'+(inv.status==='paid'?' selected':'')+'>Paid</option>';
  h+='<option value="overdue"'+(inv.status==='overdue'?' selected':'')+'>Overdue</option>';
  h+='</select></div>';
  h+='<div class="mf"><label>Notes</label><input id="iv-notes" value="'+(inv.notes||'')+'"></div>';
  h+='</div>';

  h+='</div>';
  h+='<div class="modal-foot"><button class="btn-d" id="ivDel">Delete</button>';
  if(inv.paidAmount>0) h+='<button class="btn-ghost" id="ivReset" style="color:var(--am)">Reset Payment</button>';
  h+='<button class="btn-ghost" id="ivX">Cancel</button>';
  h+='<button class="btn-p" id="ivSave">Save</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('ivX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(ev){if(ev.target===this)closeModal()});

  // Reset payment button
  var resetBtn=document.getElementById('ivReset');
  if(resetBtn){resetBtn.addEventListener('click',function(){
    if(!confirm('Reset payment to 0? Invoice will return to pending status.'))return;
    authFetch('/api/invoices/'+inv.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({paidAmount:0,paidDate:'',status:'pending'})})
      .then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Payment reset');var mc=document.getElementById('mainContent');if(mc)renderPayments(mc)}});
  })}

  document.getElementById('ivDel').addEventListener('click',function(){
    if(!confirm('Delete this invoice?'))return;
    authFetch('/api/invoices/'+inv.id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){
      if(res.ok){closeModal();toast('Deleted');var mc=document.getElementById('mainContent');if(mc)renderPayments(mc)}
    });
  });

  document.getElementById('ivSave').addEventListener('click',function(){
    authFetch('/api/invoices/'+inv.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      invoiceNumber:document.getElementById('iv-num').value,
      amount:parseFloat(document.getElementById('iv-amt').value),
      currency:document.getElementById('iv-cur').value,
      dueDate:document.getElementById('iv-due').value||null,
      paidAmount:parseFloat(document.getElementById('iv-paid').value)||0,
      paidDate:document.getElementById('iv-pdate').value||null,
      status:document.getElementById('iv-status').value,
      notes:document.getElementById('iv-notes').value
    })}).then(function(r){return r.json()}).then(function(res){
      if(res.ok){
        closeModal();toast('Saved!');
        var mc=document.getElementById('mainContent');
        if(mc)renderPayments(mc);
      } else {toast('Error saving')}
    }).catch(function(err){console.error('Save error:',err);toast('Save failed')});
  });
}

function closeModal(){var el=document.getElementById('modalOverlay');if(el)el.remove()}

function openCountryBreakdown(contracts){
  // Group by country
  var byC={};
  contracts.forEach(function(c){
    var co=c.country||'Unknown';
    if(!byC[co]) byC[co]={total:0,weighted:0,signed:0,signedVal:0,pipeline:0,deals:[]};
    byC[co].total+=c.value;
    byC[co].weighted+=c.weighted;
    if(c.stage==='Signed'){byC[co].signed++;byC[co].signedVal+=c.value}
    else{byC[co].pipeline++}
    byC[co].deals.push(c);
  });
  var sorted=Object.keys(byC).sort(function(a,b){return byC[b].total-byC[a].total});

  var h='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:750px">';
  h+='<div class="modal-head"><h2>Revenue by Country</h2>';
  h+='<button class="modal-close" id="modalClose">\u2715</button></div>';
  h+='<div class="modal-body">';

  // Summary chart
  h+='<div style="height:'+Math.max(200,sorted.length*32)+'px;margin-bottom:20px"><canvas id="chCountryFull"></canvas></div>';

  // Detail table
  h+='<table style="width:100%"><thead><tr>';
  h+='<th>Country</th><th>Total Value</th><th>Weighted</th>';
  h+='<th>Signed</th><th>Pipeline</th><th>Deals</th>';
  h+='</tr></thead><tbody>';
  sorted.forEach(function(co){
    var d=byC[co];
    h+='<tr style="cursor:pointer" class="country-row" data-country="'+co+'">';
    h+='<td style="font-weight:700">'+co+'</td>';
    h+='<td class="mono" style="font-weight:700">'+fmt(d.total)+'</td>';
    h+='<td class="mono" style="color:var(--acL)">'+fmt(d.weighted)+'</td>';
    h+='<td><span class="pill" style="background:var(--gnG);color:var(--gn)">'+d.signed+' ('+fmt(d.signedVal)+')</span></td>';
    h+='<td class="mono">'+d.pipeline+'</td>';
    h+='<td class="mono">'+(d.signed+d.pipeline)+'</td>';
    h+='</tr>';
    // Expandable deals list
    h+='<tr class="deal-detail" data-country="'+co+'" style="display:none"><td colspan="6" style="padding:0">';
    h+='<div style="padding:8px 20px 12px;background:var(--bg)">';
    d.deals.forEach(function(deal){
      var stC={'Signed':'var(--gn)','Negotiation':'var(--am)','Demo':'var(--ac)','Email Sent':'var(--cy)'}[deal.stage]||'var(--txM)';
      h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px">';
      h+='<span style="font-weight:600">'+deal.client+'</span>';
      h+='<span><span class="pill" style="background:'+stC+'18;color:'+stC+';margin-right:8px">'+deal.stage+'</span>';
      h+='<span class="mono" style="font-weight:700">'+fmt(deal.value)+'</span></span>';
      h+='</div>';
    });
    h+='</div></td></tr>';
  });
  h+='</tbody></table>';
  h+='</div>';
  h+='<div class="modal-foot"><button class="btn-ghost" id="mcX">Close</button></div>';
  h+='</div></div>';

  document.body.insertAdjacentHTML('beforeend',h);
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('mcX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

  // Toggle deal rows on country click
  document.querySelectorAll('.country-row').forEach(function(row){
    row.addEventListener('click',function(){
      var co=this.dataset.country;
      var detail=document.querySelector('.deal-detail[data-country="'+co+'"]');
      if(detail) detail.style.display=detail.style.display==='none'?'table-row':'none';
    });
  });

  // Full chart
  var cLabels=sorted;
  var cVals=sorted.map(function(co){return byC[co].total});
  var cSigned=sorted.map(function(co){return byC[co].signedVal});
  var cPip=sorted.map(function(co){return byC[co].total-byC[co].signedVal});
  mk('chCountryFull',{type:'bar',data:{labels:cLabels,datasets:[
    {label:'Signed',data:cSigned,backgroundColor:'#10b981',borderRadius:3,stack:'s'},
    {label:'Pipeline',data:cPip,backgroundColor:'#3b82f6',borderRadius:{topLeft:3,topRight:3},stack:'s'}
  ]},options:{indexAxis:'y',scales:{x:{stacked:true,ticks:{callback:function(v){return fmt(v)}}},y:{stacked:true,ticks:{font:{size:11}}}}}});
}

function openContractCard(c){
  var canEdit=USER.role==='admin'||USER.role==='sales_manager'||(c.salespersonId===USER.id);
  var chV=c.chance!=null?(c.chance*100).toFixed(0):'';
  var wv=c.chance!=null?c.value*c.chance:0;
  var ic={Government:'var(--ac)',Enterprise:'var(--pk)',Academy:'var(--gn)'};var col=ic[c.industry]||'var(--txM)';
  var stColors={'Initial Contact':'var(--txM)','Email Sent':'var(--cy)','Demo':'var(--ac)','Negotiation':'var(--am)','Signed':'var(--gn)'};
  var curIdx=STAGES.indexOf(c.stage);

  var h='<div class="modal-bg" id="modalOverlay"><div class="modal-card">';
  h+='<div class="modal-head"><h2>'+c.client;
  h+=' <span class="mtag" style="background:'+col+'18;color:'+col+'">';
  h+=c.industry+'</span>';
  h+=' <span class="mtag" style="background:'+(stColors[c.stage]||'var(--txM)')+'18;color:'+(stColors[c.stage]||'var(--txM)')+'">';
  h+=c.stage+'</span>';
  h+='</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
  h+='<div class="modal-body">';

  // KPIs
  h+='<div class="kpi-row">';
  h+='<div class="kpi-mini"><div class="kv">'+fmt(c.value)+'</div><div class="kl">Value</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--acL)">'+(chV?chV+'%':'\u2014')+'</div><div class="kl">Probability</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--gn)">'+fmt(wv)+'</div><div class="kl">Expected</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--txD)">'+c.dso+'d</div><div class="kl">DSO</div></div>';
  h+='</div>';

  // Stage pipeline
  h+='<div class="section-label">Sales Stage</div>';
  h+='<div class="stage-pills" id="stagePills">';
  STAGES.forEach(function(st,i){
    var cls='stage-pill';
    if(i<curIdx)cls+=' done locked';
    else if(i===curIdx)cls+=' current locked';
    else if(i===curIdx+1&&canEdit&&c.stage!=='Signed')cls+=' next';
    else cls+=' locked';
    h+='<div class="'+cls+'" data-stage="'+st+'">'+st+'</div>';
  });
  h+='</div>';
  if(c.stageUpdatedAt) h+='<div class="updated-tag" style="margin-top:6px">Stage updated: '+fmtDate(c.stageUpdatedAt)+'</div>';

  // Contact Info
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Contact Information</div>';
  if(canEdit){
    h+='<div class="modal-grid">';
    h+='<div class="mf"><label>Contact Name</label><input id="mc-cn" value="'+(c.contactName||'')+'"></div>';
    h+='<div class="mf"><label>Phone</label><input id="mc-cp" value="'+(c.contactPhone||'')+'"></div>';
    h+='<div class="mf"><label>Email</label><input id="mc-ce" type="email" value="'+(c.contactEmail||'')+'"></div>';
    h+='<div class="mf"><label>LinkedIn</label><input id="mc-cl2" value="'+(c.contactLinkedin||'')+'"></div>';
    h+='</div>';
  } else {
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">';
    h+='<div><span style="color:var(--txM)">Name:</span> '+(c.contactName||'\u2014')+'</div>';
    h+='<div><span style="color:var(--txM)">Phone:</span> '+(c.contactPhone||'\u2014')+'</div>';
    h+='<div><span style="color:var(--txM)">Email:</span> '+(c.contactEmail||'\u2014')+'</div>';
    if(c.contactLinkedin) h+='<div><a href="'+(c.contactLinkedin.startsWith('http')?c.contactLinkedin:'https://'+c.contactLinkedin)+'" target="_blank" style="color:var(--ac)">LinkedIn Profile</a></div>';
    h+='</div>';
  }

  // Salesperson
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Salesperson</div>';
  var canReassign=USER.role==='admin'||USER.role==='sales_manager';
  if(canEdit){
    var spOpts='<option value="">-- Unassigned --</option>';
    (D.salespeople||[]).forEach(function(sp){
      spOpts+='<option value="'+sp.id+'"'+(c.salespersonId===sp.id?' selected':'')+'>'+sp.name+'</option>';
    });
    if(canReassign){
      h+='<select id="mc-sp" class="mf" style="background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:var(--f);font-size:14px;width:100%;max-width:300px">'+spOpts+'</select>';
    } else {
      h+='<div style="font-size:14px;font-weight:600">'+(c.salespersonName||'Unassigned')+'<input type="hidden" id="mc-sp" value="'+(c.salespersonId||'')+'"></div>';
    }
  } else {
    h+='<div style="font-size:14px;font-weight:600">'+(c.salespersonName||'Unassigned')+'</div>';
  }

  // Notes
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Notes & Call Log</div>';
  h+='<div class="notes-list" id="notesList">';
  (c.notes||[]).slice().reverse().forEach(function(n){
    h+='<div class="note-item"><div class="note-meta">'+n.by+' \u2022 '+fmtDate(n.at)+'</div><div class="note-text">'+n.text+'</div></div>';
  });
  if(!(c.notes||[]).length) h+='<div style="color:var(--txM);font-size:12px;padding:8px">No notes yet</div>';
  h+='</div>';
  if(canEdit){
    h+='<div class="note-input"><textarea id="noteText" placeholder="Add a note..."></textarea>';
    h+='<button class="btn-p" id="btnNote" style="padding:10px 16px">Add</button></div>';
  }

  // Action Items
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label" style="display:flex;justify-content:space-between;align-items:center">Action Items <button class="btn-p" id="btnAddAction" style="padding:5px 12px;font-size:11px">+ Add Action</button></div>';
  h+='<div id="actionsList" style="font-size:12px"><div style="color:var(--txM);padding:8px">Loading...</div></div>';

  // Deal details (editable for canEdit users)
  if(canEdit){
    h+='<div class="modal-sep"></div>';
    h+='<div class="section-label">Deal Details</div>';
    h+='<div class="modal-grid">';
    h+='<div class="mf"><label>Client</label><input id="mc-cl" value="'+(c.client||'')+'"></div>';
    h+='<div class="mf"><label>Country</label><input id="mc-co" value="'+(c.country||'')+'"></div>';
    h+='<div class="mf"><label>Industry</label><select id="mc-in">';

    h+='<option'+(c.industry==='Enterprise'?' selected':'')+'>Enterprise</option>';
    h+='<option'+(c.industry==='Academy'?' selected':'')+'>Academy</option>';
    h+='</select></div>';
    h+='<div class="mf"><label>Value (USD)</label><input id="mc-va" type="number" value="'+c.value+'"></div>';
    h+='<div class="mf"><label>DSO (days)</label><input id="mc-ds" type="number" value="'+c.dso+'"></div>';
    h+='<div class="mf"><label>Probability %</label><input id="mc-ch" type="number" value="'+chV+'" min="0" max="100"></div>';
    h+='<div class="mf"><label>Payment Method</label><select id="mc-pm">'+pmOptions(c.paymentMethod)+'</select></div>';
    h+='<div class="mf"><label>Client Type</label><select id="mc-nc"><option value="1"'+(c.isNewClient!==false?' selected':'')+'>New Client</option><option value="0"'+(c.isNewClient===false?' selected':'')+'>Existing Client</option></select></div>';
    h+='<div class="mf"><label>Invoice Date</label><input id="mc-invd" type="date" value="'+(c.invoiceDate||'')+'"><div class="hint">Date we invoice the client</div></div>';
    h+='<div class="mf"><label>VAT?</label><div style="display:flex;align-items:center;gap:8px;padding:10px 0"><input id="mc-vat" type="checkbox"'+(c.subjectToVat?' checked':'')+' style="width:18px;height:18px"><span style="font-size:12px">+ '+(D.vatRate||18)+'% VAT on CF</span></div></div>';
    h+='</div>';
  }

  // Payment Schedule — simple rows
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Payments</div>';
  var splits=c.paymentSplits||[];
  h+='<div id="splitRows">';
  if(splits.length>0){
    splits.forEach(function(sp,i){
      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">';
      h+='<span class="mono" style="font-weight:700;font-size:14px;min-width:90px">'+fmt(sp.amount)+'</span>';
      h+='<span style="color:var(--txD);font-size:13px">'+sp.date+'</span>';
      h+='<span style="color:var(--txM);font-size:11px;margin-left:auto">'+(Math.round(sp.amount/c.value*100))+'%</span>';
      if(canEdit) h+='<button class="btn-d split-del" data-idx="'+i+'" style="padding:2px 8px;font-size:10px">\u2715</button>';
      h+='</div>';
    });
    var splitsTotal=splits.reduce(function(s,sp){return s+(sp.amount||0)},0);
    var match=Math.abs(splitsTotal-c.value)<1;
    h+='<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:12px;font-weight:700">';
    h+='<span>Total</span>';
    h+='<span class="mono" style="color:'+(match?'var(--gn)':'var(--am)')+'">'+fmt(splitsTotal)+' / '+fmt(c.value)+'</span></div>';
  } else {
    h+='<div style="color:var(--txM);font-size:12px;padding:4px 0">Single payment by DSO ('+c.dso+' days)</div>';
  }
  h+='</div>';
  if(canEdit){
    h+='<div id="newSplitRows"></div>';
    h+='<button class="btn-ghost" id="btnAddRow" style="margin-top:8px;padding:6px 14px;font-size:12px">+ Add Payment</button>';
  }

  h+='</div>';

  // Footer
  h+='<div class="modal-foot">';
  if(c.updatedAt) h+='<div style="flex:1;font-size:10px;color:var(--txM)">Updated: '+fmtDate(c.updatedAt)+'</div>';
  if(USER.role==='admin') h+='<button class="btn-d" id="mcDel">Delete</button>';
  h+='<button class="btn-ghost" id="mcX">Close</button>';
  if(canEdit) h+='<button class="btn-p" id="mcSave">Save</button>';
  h+='</div></div></div>';

  document.body.insertAdjacentHTML('beforeend',h);
  makeCountrySelect('mc-co',c.country||'');
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('mcX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

  // Stage advancement
  document.querySelectorAll('#stagePills .next').forEach(function(pill){
    pill.addEventListener('click',function(){
      var newStage=this.dataset.stage;
      if(!confirm('Advance to "'+newStage+'"? This cannot be undone.'))return;
      authFetch('/api/contracts/'+c.id+'/stage',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({stage:newStage})}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Stage: '+newStage);loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}else{toast(res.detail||'Error')}});
    });
  });

  // Add note
  if(canEdit&&document.getElementById('btnNote')){
    document.getElementById('btnNote').addEventListener('click',function(){
      var txt=document.getElementById('noteText').value.trim();if(!txt)return;
      authFetch('/api/contracts/'+c.id+'/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt})}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Note added');loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}});
    });
  }

  // Load and render actions
  function loadContractActions(){
    authFetch('/api/actions/contract/'+c.id).then(function(r){return r.json()}).then(function(actions){
      var al=document.getElementById('actionsList');if(!al)return;
      if(!actions.length){al.innerHTML='<div style="color:var(--txM);padding:8px">No actions yet</div>';return}
      var today=new Date().toISOString().split('T')[0];
      var ah='';
      actions.forEach(function(a){
        var isOverdue=!a.completed&&a.dueDate<today;
        var isToday=!a.completed&&a.dueDate===today;
        var statusColor=a.completed?'var(--gn)':isOverdue?'var(--rd)':isToday?'var(--am)':'var(--txM)';
        var statusLabel=a.completed?'\u2713 Done':isOverdue?'\u26A0 Overdue':isToday?'\u25CF Today':a.dueDate;
        ah+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)">';
        if(!a.completed) ah+='<button class="btn-ghost act-complete" data-aid="'+a.id+'" style="padding:2px 6px;font-size:10px;color:var(--gn)" title="Mark complete">\u2713</button>';
        else ah+='<span style="padding:2px 6px;font-size:10px;color:var(--gn)">\u2713</span>';
        ah+='<span style="flex:1;'+(a.completed?'text-decoration:line-through;color:var(--txM)':'')+'">'+a.description+'</span>';
        ah+='<span style="font-size:10px;color:'+statusColor+';white-space:nowrap">'+statusLabel+'</span>';
        if(!a.completed) ah+='<button class="btn-ghost act-del" data-aid="'+a.id+'" style="padding:2px 6px;font-size:10px;color:var(--rd)">\u2715</button>';
        ah+='</div>';
      });
      al.innerHTML=ah;
      // Complete handler
      al.querySelectorAll('.act-complete').forEach(function(btn){
        btn.addEventListener('click',function(){
          authFetch('/api/actions/'+this.dataset.aid+'/complete',{method:'PUT'}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Done!');loadContractActions()}});
        });
      });
      // Delete handler
      al.querySelectorAll('.act-del').forEach(function(btn){
        btn.addEventListener('click',function(){
          authFetch('/api/actions/'+this.dataset.aid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){loadContractActions()}});
        });
      });
    });
  }
  loadContractActions();

  // Add action button
  document.getElementById('btnAddAction').addEventListener('click',function(){
    var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
    var tmrStr=tomorrow.toISOString().split('T')[0];
    var aah='<div style="display:flex;gap:6px;align-items:flex-end;padding:8px 0;border-top:1px solid var(--bd);margin-top:6px">';
    aah+='<div class="mf" style="margin:0;flex:2"><label style="font-size:10px">Action</label><input id="actDesc" placeholder="Send proposal, Follow up..."></div>';
    aah+='<div class="mf" style="margin:0;flex:1"><label style="font-size:10px">Due Date</label><input id="actDate" type="date" value="'+tmrStr+'"></div>';
    aah+='<button class="btn-p" id="actSave" style="padding:8px 12px;font-size:11px">Add</button>';
    aah+='</div>';
    var al=document.getElementById('actionsList');
    if(al&&!document.getElementById('actDesc')){
      al.insertAdjacentHTML('afterend',aah);
      document.getElementById('actSave').addEventListener('click',function(){
        var desc=document.getElementById('actDesc').value.trim();
        var dd=document.getElementById('actDate').value;
        if(!desc){toast('Enter action description');return}
        authFetch('/api/actions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          contractId:c.id,description:desc,dueDate:dd
        })}).then(function(r){return r.json()}).then(function(res){
          if(res.ok){toast('Action added');document.getElementById('actDesc').value='';loadContractActions()}
        });
      });
    }
  });

  // Save (all canEdit users)
  if(canEdit&&document.getElementById('mcSave')){
    document.getElementById('mcSave').addEventListener('click',function(){
      var ch=document.getElementById('mc-ch')?document.getElementById('mc-ch').value:'';
      var body={};
      if(document.getElementById('mc-cl')&&document.getElementById('mc-cl').value) body.client=document.getElementById('mc-cl').value;
      if(document.getElementById('mc-co')) body.country=document.getElementById('mc-co').value;
      if(document.getElementById('mc-in')) body.industry=document.getElementById('mc-in').value;
      if(document.getElementById('mc-pm')) body.paymentMethod=document.getElementById('mc-pm').value;
      if(document.getElementById('mc-nc')) body.isNewClient=document.getElementById('mc-nc').value==='1';
      if(document.getElementById('mc-invd')) body.invoiceDate=document.getElementById('mc-invd').value||null;
      if(document.getElementById('mc-vat')) body.subjectToVat=document.getElementById('mc-vat').checked;
      var val=document.getElementById('mc-va')?parseFloat(document.getElementById('mc-va').value):NaN;
      if(!isNaN(val)) body.value=val;
      var dso=document.getElementById('mc-ds')?parseInt(document.getElementById('mc-ds').value):NaN;
      if(!isNaN(dso)) body.dso=dso;
      if(ch!==''&&!isNaN(parseFloat(ch))) body.chance=parseFloat(ch)/100;
      if(document.getElementById('mc-sp')) body.salespersonId=document.getElementById('mc-sp').value||null;
      if(document.getElementById('mc-cn')) body.contactName=document.getElementById('mc-cn').value;
      if(document.getElementById('mc-cp')) body.contactPhone=document.getElementById('mc-cp').value;
      if(document.getElementById('mc-ce')) body.contactEmail=document.getElementById('mc-ce').value;
      if(document.getElementById('mc-cl2')) body.contactLinkedin=document.getElementById('mc-cl2').value;
      console.log('Saving contract',c.id,body);
      if(Object.keys(body).length===0){toast('No changes to save');return}
      authFetch('/api/contracts/'+c.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
        .then(function(r){
          if(!r.ok){return r.text().then(function(t){toast('Error: '+r.status+' '+t);throw new Error(t)})}
          return r.json();
        })
        .then(function(res){if(res&&res.ok){closeModal();toast('Saved!');loadAll().then(renderAll)}})
        .catch(function(err){console.error('Save failed:',err)});
    });
  }

  // Delete (admin only)
  if(USER.role==='admin'&&document.getElementById('mcDel')){
    document.getElementById('mcDel').addEventListener('click',function(){
      if(!confirm('Delete "'+c.client+'"?'))return;
      authFetch('/api/contracts/'+c.id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Deleted');loadAll().then(renderAll)}});
    });
  }

  // Add payment row button
  var splitCounter=0;
  if(canEdit&&document.getElementById('btnAddRow')){
    document.getElementById('btnAddRow').addEventListener('click',function(){
      splitCounter++;
      var container=document.getElementById('newSplitRows');
      var row=document.createElement('div');
      row.style.cssText='display:flex;gap:8px;align-items:flex-end;padding:8px 0;border-bottom:1px solid var(--bd)';
      row.innerHTML='<div class="mf" style="flex:1"><label>Amount</label><input class="sp-new-amt" type="number" placeholder="'+Math.round(c.value/2)+'"></div>'
        +'<div class="mf" style="flex:1"><label>Date</label><input class="sp-new-date" type="date" value="2026-06-15"></div>'
        +'<button class="btn-p sp-new-save" style="padding:8px 14px;margin:0;font-size:11px">Save</button>'
        +'<button class="btn-d sp-new-cancel" style="padding:6px 10px;font-size:10px">\u2715</button>';
      container.appendChild(row);

      row.querySelector('.sp-new-save').addEventListener('click',function(){
        var amt=parseFloat(row.querySelector('.sp-new-amt').value);
        var dt=row.querySelector('.sp-new-date').value;
        if(!amt||!dt){toast('Fill amount and date');return}
        var currentSplits=c.paymentSplits?c.paymentSplits.slice():[];
        currentSplits.push({amount:amt,date:dt});
        authFetch('/api/contracts/'+c.id+'/splits',{
          method:'PUT',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({splits:currentSplits})
        }).then(function(r){return r.json()}).then(function(res){
          if(res.ok){toast('Payment added');loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}
        });
      });

      row.querySelector('.sp-new-cancel').addEventListener('click',function(){
        row.remove();
      });
    });
  }

  // Delete split buttons
  document.querySelectorAll('.split-del').forEach(function(btn){
    btn.addEventListener('click',function(ev){
      ev.stopPropagation();
      var idx=parseInt(this.dataset.idx);
      var currentSplits=c.paymentSplits?c.paymentSplits.slice():[];
      currentSplits.splice(idx,1);
      authFetch('/api/contracts/'+c.id+'/splits',{
        method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({splits:currentSplits})
      }).then(function(r){return r.json()}).then(function(res){
        if(res.ok){toast('Split removed');loadAll().then(function(){closeModal();var updated=D.contracts.find(function(x){return x.id===c.id});if(updated)openContractCard(updated)})}
      });
    });
  });
}

function renderLoansTab(){
  var el=document.getElementById('st-sloans');if(!el)return;
  el.innerHTML='<div style="padding:20px;color:var(--txM)">Loading loans...</div>';
  authFetch('/api/loans').then(function(r){return r.json()}).then(function(loans){
    var repLabels={principal_interest:'Principal + Interest',interest_only:'Interest Only',principal_only:'Principal Only',balloon:'Balloon / Grace'};
    // Opening balance
    var openBal=0;
    try{var obSetting=(D.summary&&D.summary[0])?D.summary[0].loanBalance:0;openBal=obSetting||0}catch(e){}
    var h='<div class="cc" style="margin-bottom:14px"><div class="cc-t">Loan Opening Balance (Start of Year)</div>';
    h+='<div style="display:flex;gap:8px;align-items:flex-end">';
    h+='<div class="mf" style="margin:0;flex:1;max-width:200px"><label style="font-size:10px">Opening Balance ($)</label><input id="loanOpenBal" type="number" value="'+(openBal||0)+'" style="padding:8px 10px;font-size:14px;font-weight:700"></div>';
    h+='<button class="btn-p" id="saveLoanOpen" style="padding:8px 14px;font-size:11px">Save</button>';
    h+='</div></div>';

    h+='<div class="tw"><div class="tw-h" style="display:flex;justify-content:space-between;align-items:center">Loans <button class="btn-p" id="btnAddLoan" style="padding:6px 14px;font-size:11px">+ Add Loan</button></div>';
    h+='<div style="overflow-x:auto"><table><thead><tr><th>Lender</th><th>Amount</th><th>Rate</th><th>Term</th><th>Type</th><th>Start</th><th>Total Interest</th><th>Total Payment</th><th></th></tr></thead><tbody>';
    if(loans.length===0) h+='<tr><td colspan="9" style="text-align:center;color:var(--txM);padding:20px">No loans</td></tr>';
    loans.forEach(function(ln){
      var sym=ln.currency==='ILS'?'\u20AA':'$';
      h+='<tr class="clickrow loan-row" data-lid="'+ln.id+'" style="cursor:pointer">';
      h+='<td style="font-weight:600">'+ln.lender+'</td>';
      h+='<td class="mono">'+sym+Math.round(ln.amount).toLocaleString()+'</td>';
      h+='<td class="mono">'+ln.annualRate+'%</td>';
      h+='<td class="mono">'+ln.termMonths+' mo</td>';
      h+='<td style="font-size:11px">'+(repLabels[ln.repaymentType]||ln.repaymentType)+'</td>';
      h+='<td style="font-size:11px;color:var(--txD)">'+ln.startDate+'</td>';
      h+='<td class="mono" style="color:var(--am)">'+sym+Math.round(ln.totalInterest).toLocaleString()+'</td>';
      h+='<td class="mono" style="font-weight:700">'+sym+Math.round(ln.totalPayment).toLocaleString()+'</td>';
      h+='<td><button class="btn-ghost loan-edit" data-lid="'+ln.id+'" style="padding:3px 8px;font-size:10px;color:var(--ac)">\u270E</button> <button class="btn-ghost loan-del" data-lid="'+ln.id+'" style="padding:3px 8px;font-size:10px;color:var(--rd)">\u2715</button></td>';
      h+='</tr>';
      // Expandable schedule
      h+='<tr class="loan-sched" data-lid="'+ln.id+'" style="display:none"><td colspan="9" style="padding:0;background:var(--cardH)">';
      h+='<div style="padding:12px 16px;overflow-x:auto"><table style="width:100%;font-size:11px"><thead><tr><th>#</th><th>Date</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Remaining</th></tr></thead><tbody>';
      ln.schedule.forEach(function(s){
        h+='<tr><td>'+s.month+'</td><td>'+s.date+'</td><td class="mono">'+sym+Math.round(s.payment).toLocaleString()+'</td>';
        h+='<td class="mono" style="color:var(--ac)">'+sym+Math.round(s.principal).toLocaleString()+'</td>';
        h+='<td class="mono" style="color:var(--am)">'+sym+Math.round(s.interest).toLocaleString()+'</td>';
        h+='<td class="mono">'+sym+Math.round(s.remaining).toLocaleString()+'</td></tr>';
      });
      h+='</tbody></table></div></td></tr>';
    });
    h+='</tbody></table></div></div>';
    el.innerHTML=h;

    // Row click to expand schedule
    document.querySelectorAll('.loan-row').forEach(function(row){
      row.addEventListener('click',function(ev){
        if(ev.target.closest('.loan-del')||ev.target.closest('.loan-edit'))return;
        var lid=this.dataset.lid;
        var sched=document.querySelector('.loan-sched[data-lid="'+lid+'"]');
        if(sched){sched.style.display=sched.style.display==='none'?'table-row':'none'}
      });
    });

    // Edit
    document.querySelectorAll('.loan-edit').forEach(function(btn){
      btn.addEventListener('click',function(ev){
        ev.stopPropagation();
        var lid=this.dataset.lid;
        var ln=loans.find(function(x){return x.id===lid});if(!ln)return;
        var repOpts=[['principal_interest','Principal + Interest'],['interest_only','Interest Only'],['principal_only','Principal Only'],['balloon','Balloon / Grace']];
        var eh='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:520px">';
        eh+='<div class="modal-head"><h2>Edit Loan — '+ln.lender+'</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
        eh+='<div class="modal-body"><div class="modal-grid">';
        eh+='<div class="mf"><label>Lender</label><input id="eln-lender" value="'+ln.lender+'"></div>';
        eh+='<div class="mf"><label>Amount</label><input id="eln-amount" type="number" value="'+ln.amount+'"></div>';
        eh+='<div class="mf"><label>Currency</label><select id="eln-cur"><option value="ILS"'+(ln.currency==='ILS'?' selected':'')+'>\u20AA ILS</option><option value="USD"'+(ln.currency==='USD'?' selected':'')+'>$ USD</option></select></div>';
        eh+='<div class="mf"><label>Annual Rate %</label><input id="eln-rate" type="number" value="'+ln.annualRate+'" step="0.1"></div>';
        eh+='<div class="mf"><label>Term (months)</label><input id="eln-term" type="number" value="'+ln.termMonths+'"></div>';
        eh+='<div class="mf"><label>Repayment Type</label><select id="eln-type">';
        repOpts.forEach(function(o){eh+='<option value="'+o[0]+'"'+(ln.repaymentType===o[0]?' selected':'')+'>'+o[1]+'</option>'});
        eh+='</select></div>';
        eh+='<div class="mf"><label>Start Date</label><input id="eln-start" type="date" value="'+ln.startDate+'"></div>';
        eh+='<div class="mf"><label>Notes</label><input id="eln-notes" value="'+(ln.notes||'')+'"></div>';
        var hasCustomInt=ln.interestStartMonth&&ln.interestStartMonth!=='';
        eh+='<div class="mf"><label>Interest Starts</label><div style="display:flex;align-items:center;gap:8px"><input id="eln-intstart-same" type="checkbox"'+(!hasCustomInt?' checked':'')+' style="width:16px;height:16px"><span style="font-size:12px">Same as loan start</span></div><select id="eln-intmonth" style="'+(hasCustomInt?'':'display:none;')+'margin-top:6px">';
        ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach(function(mn,mi){var mv=(mi+1<10?'0':'')+(mi+1)+'-2026';eh+='<option value="'+mv+'"'+(ln.interestStartMonth===mv?' selected':'')+'>'+mn+' 2026</option>'});
        eh+='</select></div>';
        eh+='</div></div>';
        eh+='<div class="modal-foot"><button class="btn-ghost" id="elnX">Cancel</button><button class="btn-p" id="elnSave">Save</button></div></div></div>';
        document.body.insertAdjacentHTML('beforeend',eh);
        document.getElementById('modalClose').addEventListener('click',closeModal);
        document.getElementById('elnX').addEventListener('click',closeModal);
        document.getElementById('modalOverlay').addEventListener('click',function(ev2){if(ev2.target===this)closeModal()});
        document.getElementById('eln-intstart-same').addEventListener('change',function(){
          document.getElementById('eln-intmonth').style.display=this.checked?'none':'block';
        });
        document.getElementById('elnSave').addEventListener('click',function(){
          var intStart=document.getElementById('eln-intstart-same').checked?'':document.getElementById('eln-intmonth').value;
          authFetch('/api/loans/'+lid,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
            lender:document.getElementById('eln-lender').value,
            amount:parseFloat(document.getElementById('eln-amount').value),
            termMonths:parseInt(document.getElementById('eln-term').value),
            annualRate:parseFloat(document.getElementById('eln-rate').value)||0,
            startDate:document.getElementById('eln-start').value,
            repaymentType:document.getElementById('eln-type').value,
            currency:document.getElementById('eln-cur').value,
            notes:document.getElementById('eln-notes').value,
            interestStartMonth:intStart
          })}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Loan updated');loadAll().then(function(){renderLoansTab()})}});
        });
      });
    });

    // Delete
    document.querySelectorAll('.loan-del').forEach(function(btn){
      btn.addEventListener('click',function(ev){
        ev.stopPropagation();
        if(!confirm('Delete this loan?'))return;
        authFetch('/api/loans/'+this.dataset.lid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Deleted');renderLoansTab()}});
      });
    });

    // Save loan opening balance
    var saveLoanOpenBtn=document.getElementById('saveLoanOpen');
    if(saveLoanOpenBtn) saveLoanOpenBtn.addEventListener('click',function(){
      var amt=parseFloat(document.getElementById('loanOpenBal').value)||0;
      authFetch('/api/loans/opening-balance',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:amt})})
        .then(function(r){return r.json()}).then(function(res){if(res.ok){toast('Opening balance saved');loadAll().then(function(){renderLoansTab()})}});
    });

    // Add loan
    document.getElementById('btnAddLoan').addEventListener('click',function(){
      // Get existing lenders for autocomplete
      var lenders=[];loans.forEach(function(ln){if(lenders.indexOf(ln.lender)===-1)lenders.push(ln.lender)});
      var ah='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:520px">';
      ah+='<div class="modal-head"><h2>Add Loan</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
      ah+='<div class="modal-body"><div class="modal-grid">';
      ah+='<div class="mf"><label>Lender *</label><input id="ln-lender" list="ln-lenders" placeholder="Bank, investor..."><datalist id="ln-lenders">';
      lenders.forEach(function(l){ah+='<option value="'+l+'">'});
      ah+='</datalist></div>';

function renderIncomeTab(){
  var el=document.getElementById('st-sinc');if(!el)return;
  var ih='<div class="tw"><div class="tw-h" style="display:flex;justify-content:space-between;align-items:center">Income Sources <button class="btn-p" id="btnAddInc" style="padding:6px 14px;font-size:11px">+ Add Client</button></div>';
  ih+='<div style="overflow-x:auto"><table><thead><tr><th>Client</th><th>Category</th><th>Currency</th><th>Invoices</th><th>VAT</th></tr></thead><tbody id="incTbl"></tbody></table></div></div>';
  el.innerHTML=ih;
  
  var sources=D.incomeSources||[];
  var invoiceTotals={};
  var loadPs=sources.map(function(s){
    return authFetch('/api/income-payments/'+s.id).then(function(r){return r.json()}).then(function(invs){
      invoiceTotals[s.id]={count:invs.length};
    }).catch(function(){invoiceTotals[s.id]={count:0}});
  });
  Promise.all(loadPs).then(function(){
    var rows=sources.map(function(s){
      var it=invoiceTotals[s.id]||{count:0};
      var invLabel=it.count>0?'<span style="color:var(--gn)">'+it.count+' invoice'+(it.count>1?'s':'')+'</span>':'<span style="color:var(--txM)">None</span>';
      return '<tr class="clickrow" data-iid="'+s.id+'"><td style="font-weight:600">'+s.client+'</td><td style="font-size:11px">'+(s.category||'\u2014')+'</td><td>'+s.currency+'</td><td>'+invLabel+'</td><td>'+(s.subjectToVat?'<span style="color:var(--gn)">18%</span>':'\u2014')+'</td></tr>';
    }).join('');
    document.getElementById('incTbl').innerHTML=rows||'<tr><td colspan="5" style="color:var(--txM);text-align:center;padding:20px">No income sources yet. Add a client above.</td></tr>';
    document.querySelectorAll('#incTbl .clickrow').forEach(function(r){
      r.addEventListener('click',function(){var s=sources.find(function(x){return x.id===r.dataset.iid});if(s)openIncomeCard(s)});
    });
  });
  
  document.getElementById('btnAddInc').addEventListener('click',function(){
    var ah='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="width:420px">';
    ah+='<div class="modal-head"><h2>Add Client</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
    ah+='<div class="modal-body"><div class="modal-grid">';
    ah+='<div class="mf"><label>Client Name *</label><input id="ni-client" placeholder="e.g. Ministry of Defence"></div>';
    ah+='<div class="mf"><label>Revenue Category *</label><input id="ni-cat" placeholder="e.g. Consulting, License, SaaS"></div>';
    ah+='<div class="mf"><label>Currency</label><select id="ni-cur"><option value="ILS">\u20AA ILS</option><option value="USD">$ USD</option><option value="EUR">\u20AC EUR</option></select></div>';
    ah+='<div class="mf"><label>VAT?</label><div style="display:flex;align-items:center;gap:8px;padding:10px 0"><input id="ni-vat" type="checkbox" style="width:18px;height:18px"><span style="font-size:12px">+ 18% VAT</span></div></div>';
    ah+='</div></div>';
    ah+='<div class="modal-foot"><button class="btn-ghost" id="niX">Cancel</button><button class="btn-p" id="niSave">Add Client</button></div></div></div>';
    document.body.insertAdjacentHTML('beforeend',ah);
    document.getElementById('modalClose').addEventListener('click',closeModal);
    document.getElementById('niX').addEventListener('click',closeModal);
    document.getElementById('modalOverlay').addEventListener('click',function(ev){if(ev.target===this)closeModal()});
    document.getElementById('niSave').addEventListener('click',function(){
      var client=document.getElementById('ni-client').value;
      var cat=document.getElementById('ni-cat').value;
      if(!client||!cat){toast('Fill client name and category');return}
      authFetch('/api/income',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        client:client,category:cat,currency:document.getElementById('ni-cur').value,
        subjectToVat:document.getElementById('ni-vat').checked
      })}).then(function(r){return r.json()}).then(function(res){
        if(res.ok){closeModal();toast('Client added');loadAll().then(function(){renderSettings(document.getElementById('mainContent'));setTimeout(function(){var t=document.querySelector('#setTabs .stab[data-st="sinc"]');if(t)t.click()},50)})}
      });
    });
  });
}

  h+='<div class="mf"><label>Revenue Category *</label><input id="ic-cat" value="'+(s.category||'')+'" placeholder="e.g. Consulting"><div class="hint">Appears as line item in P&L Revenue</div></div>';
  h+='<div class="mf"><label>Currency</label><select id="ic-cur"><option value="ILS"'+(s.currency==='ILS'?' selected':'')+'>\u20AA ILS</option><option value="USD"'+(s.currency==='USD'?' selected':'')+'>$ USD</option><option value="EUR"'+(s.currency==='EUR'?' selected':'')+'>\u20AC EUR</option></select></div>';

  h+='<div class="mf"><label>Phone</label><input id="ic-cp" value="'+(s.contactPhone||'')+'"></div>';
  h+='<div class="mf"><label>Email</label><input id="ic-ce" type="email" value="'+(s.contactEmail||'')+'"></div>';
  h+='</div>';
  h+='<div class="modal-grid">';

  h+='</div>';
  
  // Invoices section
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Invoices</div>';
  h+='<div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px">';
  h+='<div class="mf" style="margin:0;flex:1;min-width:90px"><label>Amount</label><input id="ic-amt" type="number" placeholder="0"></div>';
  h+='<div class="mf" style="margin:0;min-width:130px"><label>Invoice Date (P&L)</label><input id="ic-invdate" type="date"></div>';
  h+='<div class="mf" style="margin:0;min-width:130px"><label>Payment Date (CF)</label><input id="ic-paydate" type="date"></div>';
  h+='<button class="btn-p" id="ic-invsave" style="padding:8px 14px;font-size:11px;margin-bottom:2px">Add Invoice</button>';
  h+='</div>';
  h+='<div id="ic-invlist" style="font-size:11px;color:var(--txM)">Loading...</div>';
  
  h+='</div>';
  h+='<div class="modal-foot"><button class="btn-d" id="icDel">Delete</button>';
  h+='<button class="btn-ghost" id="icX">Cancel</button>';
  h+='<button class="btn-p" id="icSave">Save</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('icX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(ev){if(ev.target===this)closeModal()});
  
  // Load invoices
  function loadIncInvoices(){
    authFetch('/api/income-payments/'+s.id).then(function(r){return r.json()}).then(function(invoices){
      var pl=document.getElementById('ic-invlist');if(!pl)return;
      if(!invoices||!invoices.length){pl.innerHTML='No invoices yet. Add invoices above.';return}
      var ph='<table style="width:100%;font-size:11px"><thead><tr><th>Amount</th><th>Invoice Date</th><th>Payment Date</th><th></th></tr></thead><tbody>';
      var totalAmt=0;
      invoices.forEach(function(inv){
        totalAmt+=inv.amount||0;
        ph+='<tr>';
        ph+='<td class="mono" style="font-weight:600">'+fmt(inv.amount)+'</td>';
        ph+='<td style="color:var(--ac)">'+(inv.invoiceDate||'\u2014')+'</td>';
        ph+='<td style="color:var(--gn)">'+(inv.paymentDate||'same month')+'</td>';
        ph+='<td><button class="btn-ghost iinv-del" data-ipid="'+inv.id+'" style="padding:2px 6px;font-size:9px;color:var(--rd)">\u2715</button></td>';
        ph+='</tr>';
      });
      ph+='<tr style="border-top:2px solid var(--bd);font-weight:700"><td class="mono">'+fmt(totalAmt)+'</td><td colspan="3" style="color:var(--txM)">'+invoices.length+' invoice'+(invoices.length>1?'s':'')+'</td></tr>';
      ph+='</tbody></table>';
      pl.innerHTML=ph;
      pl.querySelectorAll('.iinv-del').forEach(function(btn){
        btn.addEventListener('click',function(){
          authFetch('/api/income-payment/'+this.dataset.ipid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok)loadIncInvoices()});
        });
      });
    }).catch(function(){});
  }
  loadIncInvoices();
  
  // Add invoice
  document.getElementById('ic-invsave').addEventListener('click',function(){
    var amt=parseFloat(document.getElementById('ic-amt').value);
    var invDate=document.getElementById('ic-invdate').value||'';
    if(!amt||!invDate){toast('Enter amount and invoice date');return}
    authFetch('/api/income-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      incomeId:s.id,amount:amt,invoiceDate:invDate,
      paymentDate:document.getElementById('ic-paydate').value||''
    })}).then(function(r){return r.json()}).then(function(res){
      if(res.ok){toast('Invoice added');document.getElementById('ic-amt').value='';document.getElementById('ic-invdate').value='';document.getElementById('ic-paydate').value='';loadIncInvoices()}
    });
  });
  
  document.getElementById('icDel').addEventListener('click',function(){
    if(!confirm('Delete "'+s.client+'" and all invoices?'))return;
    authFetch('/api/income/'+s.id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Deleted');loadAll().then(function(){renderSettings(document.getElementById('mainContent'));setTimeout(function(){var t=document.querySelector('#setTabs .stab[data-st="sinc"]');if(t)t.click()},50)})}});
  });
  
  document.getElementById('icSave').addEventListener('click',function(){
    if(!document.getElementById('ic-cat').value.trim()){toast('Revenue Category is required');return}
    authFetch('/api/income/'+s.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      client:document.getElementById('ic-client').value,
      category:document.getElementById('ic-cat').value,
      currency:document.getElementById('ic-cur').value,
      contactName:document.getElementById('ic-cn').value,
      contactPhone:document.getElementById('ic-cp').value,
      contactEmail:document.getElementById('ic-ce').value,
      isRecurring:document.getElementById('ic-recur').checked,
      subjectToVat:document.getElementById('ic-vat').checked
    })}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Saved!');loadAll().then(function(){renderSettings(document.getElementById('mainContent'));setTimeout(function(){var t=document.querySelector('#setTabs .stab[data-st="sinc"]');if(t)t.click()},50)})}});
  });
}
