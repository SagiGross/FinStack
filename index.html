        ph+='</tr>';
      });
      ph+='<tr style="border-top:2px solid var(--bd);font-weight:700"><td class="mono">'+fmt(totalAmt)+'</td><td colspan="3" style="color:var(--txM)">'+invoices.length+' invoice'+(invoices.length>1?'s':'')+'</td></tr>';
      ph+='</tbody></table>';
      pl.innerHTML=ph;
      // Delete handlers
      pl.querySelectorAll('.inv-del').forEach(function(btn){
        btn.addEventListener('click',function(){
          authFetch('/api/expense-payment/'+this.dataset.epid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok)loadExpInvoices()});
        });
      });
    }).catch(function(){});
  }
  loadExpInvoices();

  // Add invoice
  document.getElementById('mx-invsave').addEventListener('click',function(){
    var amt=parseFloat(document.getElementById('mx-am').value);
    var invDate=document.getElementById('mx-invdate').value||'';
    if(!amt||!invDate){toast('Enter amount and invoice date');return}
    var payDate=document.getElementById('mx-paydate').value||'';
    authFetch('/api/expense-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      expenseId:x.id,amount:amt,invoiceDate:invDate,paymentDate:payDate
    })}).then(function(r){return r.json()}).then(function(res){
      if(res.ok){toast('Invoice added');document.getElementById('mx-am').value='';document.getElementById('mx-invdate').value='';document.getElementById('mx-paydate').value='';loadExpInvoices()}
    });
  });

  document.getElementById('mxDel').addEventListener('click',function(){
    if(!confirm('Delete?'))return;
    authFetch('/api/expenses/'+x.id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Deleted');loadAll().then(renderAll)}});
  });
  document.getElementById('mxSave').addEventListener('click',function(){
    if(!document.getElementById('mx-sd').value.trim()){toast('Expense Category is required');return}
    authFetch('/api/expenses/'+x.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      vendor:document.getElementById('mx-vn').value,
      department:document.getElementById('mx-dp').value,
      monthlyAmount:parseFloat(document.getElementById('mx-am').value),
      isCogs:parseInt(document.getElementById('mx-cg').value),
      serviceDesc:document.getElementById('mx-sd').value,
      vendorContact:document.getElementById('mx-vc').value,
      vendorEmail:document.getElementById('mx-ve').value,
      vendorPhone:document.getElementById('mx-vp').value,
      frequency:document.getElementById('mx-fr').value,
      currency:document.getElementById('mx-cur').value,
      paymentMethod:document.getElementById('mx-pm').value,
      vendorBankNum:document.getElementById('mx-bn').value,
      vendorBranchNum:document.getElementById('mx-br').value,
      vendorAccountNum:document.getElementById('mx-ac').value,
      isFixed:document.getElementById('mx-fx').value==='1',
      isRecurring:document.getElementById('mx-recur').checked,
      subjectToVat:document.getElementById('mx-vat').checked
    })}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Saved!');loadAll().then(function(){renderSettings(document.getElementById('mainContent'));setTimeout(function(){var expTab=document.querySelector('#setTabs .stab[data-st="sexp"]');if(expTab)expTab.click()},50)})}});
  });
}

function openEmployeeCard(e){
  if(USER.role!=='admin')return;
  var pct=e.positionPct||100;
  var bonus=e.bonus||0;
  var cur=e.currency||'ILS';
  var curSym=cur==='ILS'?'\u20AA':'$';
  var labor=e.laborCost;
  var cb=e.costBreakdown||{};

  var h='<div class="modal-bg" id="modalOverlay"><div class="modal-card" style="max-height:90vh;overflow-y:auto">';
  h+='<div class="modal-head"><h2>'+e.name;
  h+=' <span class="mtag" style="background:var(--ac)18;color:var(--ac)">'+e.dept+'</span>';
  if(pct<100) h+=' <span class="mtag" style="background:var(--am)18;color:var(--am)">'+pct+'%</span>';
  h+=' <span class="mtag" style="background:'+(cur==='ILS'?'var(--am)':'var(--gn)')+'18;color:'+(cur==='ILS'?'var(--am)':'var(--gn)')+'">'+cur+'</span>';
  h+='</h2><button class="modal-close" id="modalClose">\u2715</button></div>';
  h+='<div class="modal-body">';

  // KPIs
  h+='<div class="kpi-row">';
  h+='<div class="kpi-mini"><div class="kv">'+curSym+Math.round(e.gross).toLocaleString()+'</div><div class="kl">Gross ('+cur+')</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--am)">'+pct+'%</div><div class="kl">Position</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--gn)">'+fmt(labor)+'</div><div class="kl">Total Cost/mo (USD)</div></div>';
  h+='<div class="kpi-mini"><div class="kv" style="color:var(--pu)">'+fmt(labor*12)+'</div><div class="kl">Annual (USD)</div></div>';
  h+='</div>';

  // Cost breakdown
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;padding:10px;background:var(--cardH);border-radius:8px;font-size:11px">';
  h+='<span style="color:var(--txM)">Gross: '+curSym+(cb.gross||0).toLocaleString()+'</span>';
  h+='<span style="color:var(--rd)">+ SS: '+curSym+(cb.socialSecurity||0).toLocaleString()+'</span>';
  h+='<span style="color:var(--ac)">+ Pension: '+curSym+(cb.pension||0).toLocaleString()+'</span>';
  h+='<span style="color:var(--cy)">+ Disability: '+curSym+(cb.disability||0).toLocaleString()+'</span>';
  h+='<span style="color:var(--am)">+ Study Fund: '+curSym+(cb.studyFund||0).toLocaleString()+'</span>';
  if(bonus>0) h+='<span style="color:var(--gn)">+ Bonus: '+curSym+bonus.toLocaleString()+'</span>';
  h+='</div>';

  // Basic info
  h+='<div class="section-label">Employee Details</div>';
  h+='<div class="modal-grid">';
  h+='<div class="mf"><label>Full Name</label><input id="me-nm" value="'+e.name+'"></div>';
  h+='<div class="mf"><label>Department</label><select id="me-dp">';
  h+='<option'+(e.dept==='R&D'?' selected':'')+'>R&D</option>';
  h+='<option'+(e.dept==='S&M'?' selected':'')+'>S&M</option>';
  h+='<option'+(e.dept==='G&A'?' selected':'')+'>G&A</option>';
  h+='<option'+(e.dept==='Training'?' selected':'')+'>Training</option><option'+(e.dept==='Finance'?' selected':'')+'>Finance</option></select></div>';
  h+='<div class="mf"><label>Currency</label><select id="me-cur">';
  h+='<option value="ILS"'+(cur==='ILS'?' selected':'')+'>\u20AA ILS</option>';
  h+='<option value="USD"'+(cur==='USD'?' selected':'')+'>$ USD</option><option value="EUR"'+(cur==='EUR'?' selected':'')+'>€ EUR</option>';
  h+='</select></div>';
  h+='<div class="mf"><label>Gross Salary</label><input id="me-gr" type="number" value="'+e.gross+'"></div>';
  h+='<div class="mf"><label>Position %</label><input id="me-pp" type="number" value="'+pct+'" min="0" max="100"></div>';
  h+='<div class="mf"><label>Bonus / Additions</label><input id="me-bn" type="number" value="'+bonus+'"></div>';
  h+='<div class="mf"><label>Study Fund Insured Salary</label><input id="me-sfs" type="number" value="'+(e.studyFundSalary||0)+'" placeholder="0 = use gross"><div class="hint">0 = same as gross \u00d7 position%</div></div>';
  h+='</div>';

  // Employer costs section
  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Employer Costs</div>';
  h+='<div class="modal-grid">';
  h+='<div class="mf"><label>Social Security (auto)</label><div style="padding:10px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;font-size:14px;color:var(--rd);font-weight:700">'+curSym+(cb.socialSecurity||0).toLocaleString()+'</div><div class="hint">Bituach Leumi: 4.51% up to \u20AA7,703 + 7.6% above</div></div>';
  h+='<div class="mf"><label>Pension %</label><div style="display:flex;gap:6px;align-items:center"><input id="me-pen" type="number" value="'+(e.pensionPct||8.33)+'" step="0.01" style="flex:1"><span style="font-size:11px;color:var(--ac);white-space:nowrap">= '+curSym+(cb.pension||0).toLocaleString()+'</span></div></div>';
  h+='<div class="mf"><label>Disability Insurance %</label><div style="display:flex;gap:6px;align-items:center"><input id="me-dis" type="number" value="'+(e.disabilityPct||2.5)+'" step="0.01" style="flex:1"><span style="font-size:11px;color:var(--cy);white-space:nowrap">= '+curSym+(cb.disability||0).toLocaleString()+'</span></div></div>';
  h+='<div class="mf"><label>Study Fund %</label><div style="display:flex;gap:6px;align-items:center"><input id="me-sf" type="number" value="'+(e.studyFundPct||7.5)+'" step="0.01" style="flex:1"><span style="font-size:11px;color:var(--am);white-space:nowrap">= '+curSym+(cb.studyFund||0).toLocaleString()+'</span></div></div>';
  h+='</div>';

  h+='<div class="modal-sep"></div>';
  h+='<div class="section-label">Payment Dates (Cash Flow Override)</div>';
  h+='<div style="font-size:10px;color:var(--txM);margin-bottom:6px">Override global defaults. Empty = use Save Payroll Month dates or defaults.</div>';
  h+='<div class="modal-grid">';
  h+='<div class="mf"><label>Net Salary Payment</label><input id="me-pnet" type="date" value="'+(e.payNetDate||'')+'"></div>';
  h+='<div class="mf"><label>Tax Payment</label><input id="me-ptax" type="date" value="'+(e.payTaxDate||'')+'"></div>';
  h+='<div class="mf"><label>Pension/SS/SF Payment</label><input id="me-ppen" type="date" value="'+(e.payPensionDate||'')+'"></div>';
  h+='</div>';

  h+='<div class="modal-sep"></div>';
  h+='<div class="mf"><label>Termination Date</label><input id="me-td" type="date" value="'+(e.termDate||'')+'"><div class="hint">Empty = active</div></div>';

  h+='</div>';
  h+='<div class="modal-foot"><button class="btn-d" id="meDel">Delete</button>';
  h+='<button class="btn-ghost" id="meX">Cancel</button>';
  h+='<button class="btn-p" id="meSave">Save</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('meX').addEventListener('click',closeModal);
  document.getElementById('modalOverlay').addEventListener('click',function(ev){if(ev.target===this)closeModal()});
  document.getElementById('meDel').addEventListener('click',function(){
    if(!confirm('Delete "'+e.name+'"?'))return;
    authFetch('/api/employees/'+e.id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){if(res.ok){closeModal();toast('Deleted');loadAll().then(renderAll)}});
  });
  document.getElementById('meSave').addEventListener('click',function(){
    var body={
      name:document.getElementById('me-nm').value,
      department:document.getElementById('me-dp').value,
      gross:parseFloat(document.getElementById('me-gr').value),
      positionPct:parseFloat(document.getElementById('me-pp').value),
      bonus:parseFloat(document.getElementById('me-bn').value)||0,
      currency:document.getElementById('me-cur').value,
      termDate:document.getElementById('me-td').value||null,
      pensionPct:parseFloat(document.getElementById('me-pen').value)||0,
      disabilityPct:parseFloat(document.getElementById('me-dis').value)||0,
      studyFundPct:parseFloat(document.getElementById('me-sf').value)||0,
      studyFundSalary:parseFloat(document.getElementById('me-sfs').value)||0,
      payNetDate:document.getElementById('me-pnet').value||'',
      payTaxDate:document.getElementById('me-ptax').value||'',
      payPensionDate:document.getElementById('me-ppen').value||''
    };
    authFetch('/api/employees/'+e.id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){if(!r.ok){return r.text().then(function(t){toast('Error: '+r.status);console.error(t);throw new Error(t)})}return r.json()})
      .then(function(res){if(res&&res.ok){closeModal();toast('Saved!');loadAll().then(function(){renderSettings(document.getElementById('mainContent'));setTimeout(function(){var et=document.querySelector('#setTabs .stab[data-st="semp"]');if(et)et.click()},50)})}})
      .catch(function(err){console.error('Employee save failed:',err)});
  });
}

// TEAM SETTINGS (sales_manager only)
// ══════════════════════════════════════════
function renderTeamSettings(el) {
  var h = '<div class="fc">';
  h += '<h3>Team Visibility Settings</h3>';
  h += '<p style="color:var(--txD);font-size:13px;margin-bottom:20px">';
  h += 'Control which team members can see all deals or only their own assigned deals.</p>';
  h += '<div id="teamList" style="border:1px solid var(--bd);border-radius:12px;overflow:hidden"></div>';
  h += '</div>';
  el.innerHTML = h;

  authFetch('/api/team').then(function(r) {
    return r.json();
  }).then(function(team) {
    var tl = '';
    team.forEach(function(m) {
      if (m.id === USER.id) return;
      var isOn = m.can_see_all;
      tl += '<div style="display:flex;align-items:center;';
      tl += 'justify-content:space-between;padding:14px 20px;';
      tl += 'border-bottom:1px solid var(--bd)">';
      tl += '<div>';
      tl += '<div style="font-weight:700;font-size:14px">';
      tl += m.display_name + '</div>';
      tl += '<div style="font-size:11px;color:var(--txM)">';
      tl += m.role + ' \u2022 @' + m.username + '</div>';
      tl += '</div>';
      tl += '<div style="display:flex;align-items:center;gap:10px">';
      tl += '<span style="font-size:12px;color:';
      tl += isOn ? 'var(--gn)' : 'var(--txM)';
      tl += ';font-weight:600">';
      tl += isOn ? 'Sees All Deals' : 'Own Deals Only';
      tl += '</span>';
      tl += '<button class="vis-tog" data-uid="' + m.id + '" ';
      tl += 'data-cur="' + (isOn ? 'true' : 'false') + '" ';
      tl += 'style="width:44px;height:24px;border-radius:12px;';
      tl += 'border:none;cursor:pointer;position:relative;';
      tl += 'background:' + (isOn ? 'var(--gn)' : 'var(--bd)');
      tl += ';transition:all .25s">';
      tl += '<div style="width:18px;height:18px;border-radius:9px;';
      tl += 'background:#fff;position:absolute;top:3px;';
      tl += 'left:' + (isOn ? '23px' : '3px');
      tl += ';transition:all .25s;box-shadow:0 1px 3px rgba(0,0,0,.3)">';
      tl += '</div></button></div></div>';
    });
    if (!tl) {
      tl = '<div style="padding:20px;text-align:center;color:var(--txM)">';
      tl += 'No team members to manage</div>';
    }
    document.getElementById('teamList').innerHTML = tl;

    document.querySelectorAll('.vis-tog').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var uid = this.dataset.uid;
        var cur = this.dataset.cur === 'true';
        authFetch('/api/users/visibility', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: uid, canSeeAll: !cur })
        }).then(function(r) {
          return r.json();
        }).then(function(res) {
          if (res.ok) {
            toast(cur ? 'Set to Own Deals Only' : 'Set to See All Deals');
            renderTeamSettings(el);
          }
        });
      });
    });
  });
}
</script>
